<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc"><title id="title">LoRA adds a low-rank update to a frozen matrix</title><desc id="desc">A frozen full matrix W zero is added to the product of two trainable thin matrices A and B. Their inner dimension r is the low rank, producing an update with the same shape as W zero.</desc><defs><style>.b{fill:#f7f8fa}.p{fill:#fff;stroke:#1f2933;stroke-width:2}.w{fill:#e8eef9;stroke:#355c9a;stroke-width:2}.a{fill:#dcefe5;stroke:#287052;stroke-width:2}.u{fill:#fff0d6;stroke:#9a6518;stroke-width:2}.t{font:700 30px Arial;fill:#17212b}.h{font:700 20px Arial;fill:#17212b}.s{font:400 15px Arial;fill:#44515d}</style></defs><rect class="b" width="1200" height="760"/><text class="t" x="65" y="60">LoRA represents adaptation as a low-rank matrix update</text><text class="s" x="65" y="90">Chapter notation: W′ = W₀ + A B, with the base W₀ frozen and A, B trainable.</text><rect class="p" x="65" y="135" width="1070" height="500" rx="6"/><rect class="w" x="125" y="245" width="260" height="260" rx="6"/><text class="h" x="230" y="355">W₀</text><text class="h" x="205" y="390">FROZEN</text><text class="s" x="190" y="425">full base matrix</text><text class="h" x="420" y="385">+</text><rect class="a" x="485" y="245" width="95" height="260" rx="6"/><text class="h" x="525" y="355">A</text><text class="s" x="505" y="390">trainable</text><text class="s" x="518" y="420">d × r</text><text class="h" x="610" y="385">×</text><rect class="a" x="675" y="320" width="260" height="95" rx="6"/><text class="h" x="795" y="360">B</text><text class="s" x="765" y="390">trainable · r × k</text><text class="h" x="965" y="385">=</text><rect class="u" x="1020" y="280" width="85" height="180" rx="6"/><text class="h" x="1040" y="355">W′</text><text class="s" x="1030" y="390">adapted</text><text class="s" x="485" y="555">low-rank bottleneck r is much smaller than the full matrix dimensions</text><text class="s" x="65" y="690">The low-rank equation is the mechanism; adapter placement, rank, storage, switching, and kernels determine the systems behavior.</text></svg>
