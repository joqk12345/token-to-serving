<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc"><title id="title">GPTQ-style quantization compensates remaining weights</title><desc id="desc">A weight matrix is processed from left to right. A selected column block is quantized, its output-relevant error is estimated from calibration information, and still-unquantized columns are updated before the loop continues.</desc><defs><style>.b{fill:#f7f8fa}.p{fill:#fff;stroke:#1f2933;stroke-width:2}.done{fill:#dcefe5;stroke:#287052;stroke-width:2}.now{fill:#fff0d6;stroke:#9a6518;stroke-width:3}.next{fill:#e8eef9;stroke:#355c9a;stroke-width:2}.c{fill:#f3e8fa;stroke:#70428e;stroke-width:2}.t{font:700 30px Arial;fill:#17212b}.h{font:700 18px Arial;fill:#17212b}.s{font:400 15px Arial;fill:#44515d}.a{stroke:#53616d;stroke-width:3;fill:none;marker-end:url(#m)}</style><marker id="m" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0L10 5L0 10z" fill="#53616d"/></marker></defs><rect class="b" width="1200" height="760"/><text class="t" x="65" y="60">GPTQ couples quantization with error compensation</text><text class="s" x="65" y="90">Mechanism sketch; exact Hessian and update formulas remain in the sourced technical treatment.</text><rect class="p" x="65" y="135" width="1070" height="500" rx="6"/><text class="h" x="95" y="185">WEIGHT MATRIX W</text><rect class="done" x="95" y="220" width="120" height="280"/><text class="h" x="122" y="360">DONE</text><rect class="now" x="215" y="220" width="120" height="280"/><text class="h" x="238" y="345">QUANTIZE</text><text class="s" x="247" y="375">current</text><text class="s" x="245" y="400">column block</text><rect class="next" x="335" y="220" width="300" height="280"/><text class="h" x="410" y="345">STILL UNQUANTIZED</text><text class="s" x="405" y="375">remaining columns</text><path class="a" d="M335 360L700 280"/><rect class="c" x="710" y="220" width="190" height="120" rx="6"/><text class="h" x="755" y="260">MEASURE ERROR</text><text class="s" x="750" y="295">calibration-derived</text><text class="s" x="755" y="320">importance information</text><path class="a" d="M805 340L805 395"/><rect class="c" x="710" y="405" width="190" height="120" rx="6"/><text class="h" x="745" y="445">COMPENSATE</text><text class="s" x="740" y="480">update remaining</text><text class="s" x="755" y="505">weights in block</text><path class="a" d="M710 465L645 430"/><path class="a" d="M900 465C1030 465 1030 200 275 200L275 215"/><text class="s" x="930" y="350">continue blockwise</text><text class="s" x="65" y="690">GPTQ is more than independent rounding: an earlier quantization decision changes how later weights are adjusted.</text></svg>
