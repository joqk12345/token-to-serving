<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc"><title id="title">Full fine-tuning and LoRA train different state</title><desc id="desc">The full fine-tuning panel marks base weights, full gradients, and full optimizer state as trainable. The LoRA panel keeps base weights frozen while adapter matrices, adapter gradients, and adapter optimizer state are trainable. Both retain activations.</desc><defs><style>.b{fill:#f7f8fa}.p{fill:#fff;stroke:#1f2933;stroke-width:2}.full{fill:#fff0d6;stroke:#9a6518;stroke-width:2}.frozen{fill:#e8eef9;stroke:#355c9a;stroke-width:2}.train{fill:#dcefe5;stroke:#287052;stroke-width:2}.t{font:700 30px Arial;fill:#17212b}.h{font:700 18px Arial;fill:#17212b}.s{font:400 15px Arial;fill:#44515d}</style></defs><rect class="b" width="1200" height="760"/><text class="t" x="65" y="60">LoRA changes which parameters carry training state</text><text class="s" x="65" y="90">Qualitative ledger; exact savings depend on rank, target modules, precision, optimizer, and activation assumptions.</text><rect class="p" x="65" y="135" width="510" height="500" rx="6"/><text class="h" x="95" y="180">FULL FINE-TUNING</text><rect class="full" x="125" y="220" width="390" height="75" rx="4"/><text class="h" x="240" y="265">base weights · trainable</text><rect class="full" x="125" y="315" width="390" height="75" rx="4"/><text class="h" x="235" y="360">full weight gradients</text><rect class="full" x="125" y="410" width="390" height="95" rx="4"/><text class="h" x="225" y="450">full optimizer state</text><text class="s" x="235" y="480">for trained base parameters</text><rect class="frozen" x="125" y="525" width="390" height="55" rx="4"/><text class="h" x="275" y="560">activations</text>
<rect class="p" x="625" y="135" width="510" height="500" rx="6"/><text class="h" x="655" y="180">LoRA FINE-TUNING</text><rect class="frozen" x="685" y="220" width="390" height="75" rx="4"/><text class="h" x="795" y="265">base weights · frozen</text><rect class="train" x="685" y="315" width="390" height="75" rx="4"/><text class="h" x="795" y="360">adapter A, B · trainable</text><rect class="train" x="685" y="410" width="390" height="95" rx="4"/><text class="h" x="785" y="450">adapter gradients + state</text><text class="s" x="805" y="480">rank and placement dependent</text><rect class="frozen" x="685" y="525" width="390" height="55" rx="4"/><text class="h" x="835" y="560">activations</text><text class="s" x="65" y="690">LoRA reduces trainable parameter state; it does not remove the frozen base model or activation memory.</text></svg>
