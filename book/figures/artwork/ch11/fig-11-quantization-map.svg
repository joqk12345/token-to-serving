<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc"><title id="title">Quantization maps real values to discrete codes</title><desc id="desc">Real values on a continuous line map through scale metadata and an optional zero point to a small set of integer codes, then reconstruct to nearby representable values.</desc><defs><style>.b{fill:#f7f8fa}.p{fill:#fff;stroke:#1f2933;stroke-width:2}.x{fill:#e8eef9;stroke:#355c9a;stroke-width:2}.y{fill:#dcefe5;stroke:#287052;stroke-width:2}.z{fill:#fff0d6;stroke:#9a6518;stroke-width:2}.t{font:700 30px Arial;fill:#17212b}.h{font:700 18px Arial;fill:#17212b}.s{font:400 15px Arial;fill:#44515d}.line{stroke:#53616d;stroke-width:3}.a{stroke:#53616d;stroke-width:3;fill:none;marker-end:url(#m)}</style><marker id="m" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0L10 5L0 10z" fill="#53616d"/></marker></defs><rect class="b" width="1200" height="760"/><text class="t" x="65" y="60">Quantization changes the tensor representation</text><text class="s" x="65" y="90">Scale is required in this example; a zero point is optional and is not used by every quantization scheme.</text><rect class="p" x="65" y="135" width="1070" height="500" rx="6"/><text class="h" x="95" y="190">HIGH-PRECISION VALUES</text><line class="line" x1="120" y1="260" x2="1080" y2="260"/><g class="x"><circle cx="205" cy="260" r="13"/><circle cx="395" cy="260" r="13"/><circle cx="610" cy="260" r="13"/><circle cx="795" cy="260" r="13"/><circle cx="1010" cy="260" r="13"/></g><text class="s" x="180" y="300">−1.7</text><text class="s" x="375" y="300">−0.8</text><text class="s" x="595" y="300">0.1</text><text class="s" x="775" y="300">0.9</text><text class="s" x="990" y="300">1.8</text><path class="a" d="M600 320L600 385"/><rect class="y" x="430" y="345" width="340" height="85" rx="6"/><text class="h" x="510" y="380">q = round(x / scale) + z</text><text class="s" x="510" y="408">z = optional zero point</text><text class="h" x="95" y="485">DISCRETE INTEGER LEVELS</text><g><rect class="z" x="180" y="510" width="100" height="70"/><text class="h" x="218" y="552">−2</text><rect class="z" x="355" y="510" width="100" height="70"/><text class="h" x="393" y="552">−1</text><rect class="z" x="530" y="510" width="100" height="70"/><text class="h" x="570" y="552">0</text><rect class="z" x="705" y="510" width="100" height="70"/><text class="h" x="745" y="552">1</text><rect class="z" x="880" y="510" width="100" height="70"/><text class="h" x="920" y="552">2</text></g><text class="s" x="65" y="690">The stored artifact becomes integer codes plus quantization metadata; reconstruction is approximate.</text></svg>
