<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc"><title id="title">Three qualitative sources of quantization error</title><desc id="desc">Three panels show rounding inside representable buckets, clipping of values outside the selected range, and a range estimate that allocates levels poorly for the data distribution.</desc><defs><style>.b{fill:#f7f8fa}.p{fill:#fff;stroke:#1f2933;stroke-width:2}.x{fill:#e8eef9;stroke:#355c9a;stroke-width:2}.bad{fill:#fff0d6;stroke:#9a6518;stroke-width:2}.t{font:700 30px Arial;fill:#17212b}.h{font:700 19px Arial;fill:#17212b}.s{font:400 15px Arial;fill:#44515d}.line{stroke:#53616d;stroke-width:3}.dash{stroke:#9a6518;stroke-width:2;stroke-dasharray:6 5}</style></defs><rect class="b" width="1200" height="760"/><text class="t" x="65" y="60">Low-bit mapping introduces several kinds of error</text><text class="s" x="65" y="90">Qualitative sketches only; no error metric or calibration setup is implied.</text><rect class="p" x="65" y="150" width="330" height="450" rx="6"/><text class="h" x="95" y="195">ROUNDING</text><line class="line" x1="105" y1="360" x2="355" y2="360"/><circle class="x" cx="185" cy="340" r="12"/><circle class="bad" cx="225" cy="360" r="12"/><line class="dash" x1="185" y1="340" x2="225" y2="360"/><text class="s" x="105" y="420">value maps to the nearest</text><text class="s" x="105" y="445">representable level</text><rect class="p" x="435" y="150" width="330" height="450" rx="6"/><text class="h" x="465" y="195">CLIPPING</text><line class="line" x1="475" y1="360" x2="725" y2="360"/><line class="dash" x1="515" y1="310" x2="515" y2="400"/><line class="dash" x1="680" y1="310" x2="680" y2="400"/><circle class="x" cx="720" cy="330" r="12"/><circle class="bad" cx="680" cy="360" r="12"/><text class="s" x="475" y="420">outside-range values collapse</text><text class="s" x="475" y="445">to an endpoint</text><rect class="p" x="805" y="150" width="330" height="450" rx="6"/><text class="h" x="835" y="195">RANGE MISMATCH</text><line class="line" x1="845" y1="360" x2="1095" y2="360"/><g class="bad"><circle cx="865" cy="360" r="9"/><circle cx="925" cy="360" r="9"/><circle cx="985" cy="360" r="9"/><circle cx="1045" cy="360" r="9"/></g><g class="x"><circle cx="970" cy="325" r="9"/><circle cx="980" cy="305" r="9"/><circle cx="990" cy="325" r="9"/></g><text class="s" x="835" y="420">levels are spread where few</text><text class="s" x="835" y="445">data values occur</text><text class="s" x="65" y="690">Calibration and granularity choices determine which errors dominate for a tensor and workload.</text></svg>
