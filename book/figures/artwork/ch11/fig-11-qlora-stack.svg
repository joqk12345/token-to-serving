<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc"><title id="title">QLoRA separates quantized base storage from adapter training</title><desc id="desc">A stacked layer shows a frozen quantized base model storing low-bit codes and metadata. Trainable LoRA adapter matrices sit beside selected modules, with adapter gradients and optimizer state. Backpropagation passes through base operations into adapters without training the base weights.</desc><defs><style>.b{fill:#f7f8fa}.p{fill:#fff;stroke:#1f2933;stroke-width:2}.base{fill:#e8eef9;stroke:#355c9a;stroke-width:2}.ad{fill:#dcefe5;stroke:#287052;stroke-width:2}.state{fill:#fff0d6;stroke:#9a6518;stroke-width:2}.t{font:700 30px Arial;fill:#17212b}.h{font:700 18px Arial;fill:#17212b}.s{font:400 15px Arial;fill:#44515d}.a{stroke:#53616d;stroke-width:3;fill:none;marker-end:url(#m)}</style><marker id="m" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0L10 5L0 10z" fill="#53616d"/></marker></defs><rect class="b" width="1200" height="760"/><text class="t" x="65" y="60">QLoRA combines compact base storage with low-rank training</text><text class="s" x="65" y="90">Structural view; concrete bitwidths, dtypes, quantizers, and memory managers vary by implementation.</text><rect class="p" x="65" y="135" width="1070" height="500" rx="6"/><rect class="base" x="120" y="210" width="620" height="320" rx="8"/><text class="h" x="310" y="255">FROZEN QUANTIZED BASE MODEL</text><text class="s" x="175" y="305">low-bit weight codes</text><text class="s" x="175" y="345">scales / quantization metadata</text><text class="s" x="175" y="385">base operations participate in forward/backward</text><text class="s" x="175" y="425">base weights receive no optimizer update</text><rect class="ad" x="480" y="300" width="210" height="145" rx="6"/><text class="h" x="530" y="340">LoRA A · B</text><text class="s" x="520" y="375">trainable adapters</text><text class="s" x="525" y="410">selected modules</text><path class="a" d="M740 370L825 370"/><rect class="state" x="835" y="260" width="240" height="220" rx="6"/><text class="h" x="880" y="305">ADAPTER TRAINING STATE</text><text class="s" x="885" y="350">adapter gradients</text><text class="s" x="885" y="390">adapter optimizer state</text><text class="s" x="885" y="430">activations still required</text><path class="a" d="M955 480C955 555 585 555 585 445"/><text class="s" x="680" y="585">gradients update adapters, not the frozen base</text><text class="s" x="65" y="690">QLoRA reduces base representation cost and trainable-state cost through separate mechanisms.</text></svg>
