<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc"><title id="title">LLM.int8-style execution separates outlier components</title><desc id="desc">An input is decomposed into typical components sent through an int8 matrix path and outlier components sent through a higher-precision path. The two partial results are combined.</desc><defs><style>.b{fill:#f7f8fa}.p{fill:#fff;stroke:#1f2933;stroke-width:2}.x{fill:#e8eef9;stroke:#355c9a;stroke-width:2}.i8{fill:#dcefe5;stroke:#287052;stroke-width:2}.hi{fill:#fff0d6;stroke:#9a6518;stroke-width:2}.c{fill:#f3e8fa;stroke:#70428e;stroke-width:2}.t{font:700 30px Arial;fill:#17212b}.h{font:700 18px Arial;fill:#17212b}.s{font:400 15px Arial;fill:#44515d}.a{stroke:#53616d;stroke-width:3;fill:none;marker-end:url(#m)}</style><marker id="m" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0L10 5L0 10z" fill="#53616d"/></marker></defs><rect class="b" width="1200" height="760"/><text class="t" x="65" y="60">LLM.int8 uses a mixed path for outlier components</text><text class="s" x="65" y="90">LLM.int8-style mechanism; this decomposition is not universal across all int8 methods.</text><rect class="p" x="65" y="135" width="1070" height="500" rx="6"/><rect class="x" x="95" y="315" width="150" height="100" rx="5"/><text class="h" x="145" y="355">INPUT</text><text class="s" x="125" y="385">activation vector</text><path class="a" d="M245 350L340 265M245 380L340 465"/><rect class="i8" x="350" y="205" width="250" height="130" rx="6"/><text class="h" x="405" y="250">TYPICAL COMPONENTS</text><text class="s" x="405" y="285">quantized int8 path</text><text class="s" x="405" y="312">compact matrix operation</text><rect class="hi" x="350" y="405" width="250" height="130" rx="6"/><text class="h" x="405" y="450">OUTLIER COMPONENTS</text><text class="s" x="405" y="485">higher-precision path</text><text class="s" x="405" y="512">selected dimensions</text><path class="a" d="M600 270L750 345M600 470L750 390"/><rect class="c" x="760" y="315" width="180" height="110" rx="55"/><text class="h" x="805" y="355">COMBINE</text><text class="s" x="795" y="390">sum partial results</text><path class="a" d="M940 370L1020 370"/><rect class="x" x="1030" y="330" width="75" height="80" rx="5"/><text class="h" x="1058" y="378">Y</text><text class="s" x="65" y="690">The mixed path preserves sensitive outlier contributions while keeping the typical path in a compact representation.</text></svg>
