<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Minimal CUDA host and device lifecycle</title><desc id="desc">The CPU host allocates device memory, copies input to the GPU, launches a kernel, copies output back, and frees device memory.</desc>
  <defs><style>.bg{fill:#f7f8fa}.panel{fill:#fff;stroke:#1f2933;stroke-width:2}.host{fill:#e8eef9;stroke:#355c9a;stroke-width:2}.device{fill:#dcefe5;stroke:#287052;stroke-width:2}.transfer{fill:#fff0d6;stroke:#9a6518;stroke-width:2}.title{font:700 30px Arial,sans-serif;fill:#17212b}.section{font:700 20px Arial,sans-serif;fill:#17212b}.label{font:600 18px Arial,sans-serif;fill:#17212b}.small{font:400 15px Arial,sans-serif;fill:#44515d}.life{stroke:#8b98a5;stroke-width:3;stroke-dasharray:8 7}.arrow{stroke:#53616d;stroke-width:3;fill:none;marker-end:url(#arrow)}.back{stroke:#9a6518;stroke-width:3;fill:none;marker-end:url(#orange)}</style><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#53616d"/></marker><marker id="orange" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#9a6518"/></marker></defs>
  <rect class="bg" width="1200" height="760"/><text class="title" x="65" y="60">The host orchestrates; the device executes</text><text class="small" x="65" y="90">A minimal CUDA lifecycle crosses the host-device boundary twice.</text>
  <rect class="host" x="105" y="125" width="360" height="70" rx="6"/><text class="section" x="214" y="168">CPU / HOST</text><rect class="device" x="735" y="125" width="360" height="70" rx="6"/><text class="section" x="842" y="168">GPU / DEVICE</text><line class="life" x1="285" y1="195" x2="285" y2="665"/><line class="life" x1="915" y1="195" x2="915" y2="665"/>
  <rect class="panel" x="125" y="225" width="320" height="60" rx="5"/><text class="label" x="160" y="261">1. Prepare input in host memory</text>
  <path class="arrow" d="M445 315 L905 315"/><text class="label" x="500" y="302">2. cudaMalloc</text><rect class="device" x="780" y="335" width="270" height="55" rx="5"/><text class="label" x="826" y="369">device buffers</text>
  <path class="back" d="M295 425 L905 425"/><text class="label" x="495" y="412">3. cudaMemcpy: host to device</text>
  <path class="arrow" d="M445 490 L905 490"/><text class="label" x="520" y="477">4. kernel launch</text><rect class="device" x="780" y="510" width="270" height="65" rx="5"/><text class="label" x="820" y="549">many GPU threads run</text>
  <path class="back" d="M905 615 L295 615"/><text class="label" x="495" y="602">5. cudaMemcpy: device to host</text><text class="small" x="125" y="650">result available to host code</text><path class="arrow" d="M755 675 L915 675"/><text class="label" x="505" y="681">6. cudaFree device buffers</text>
  <rect class="transfer" x="535" y="215" width="130" height="55" rx="5"/><text class="small" x="559" y="248">API boundary</text><text class="small" x="65" y="725">Copies and launches are explicit orchestration steps; data placement is part of the program.</text>
</svg>
