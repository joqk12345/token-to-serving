<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">GPU memory and data movement paths</title><desc id="desc">Data travels from host memory across PCIe or NVLink to GPU global memory, through L2 cache, into block-scoped shared memory, and into thread-scoped registers.</desc>
  <defs><style>.bg{fill:#f7f8fa}.panel{fill:#fff;stroke:#1f2933;stroke-width:2}.host{fill:#e8eef9;stroke:#355c9a;stroke-width:2}.inter{fill:#fff0d6;stroke:#9a6518;stroke-width:2}.gpu{fill:#dcefe5;stroke:#287052;stroke-width:2}.local{fill:#ece8f3;stroke:#65517e;stroke-width:2}.title{font:700 30px Arial,sans-serif;fill:#17212b}.section{font:700 20px Arial,sans-serif;fill:#17212b}.label{font:600 18px Arial,sans-serif;fill:#17212b}.small{font:400 15px Arial,sans-serif;fill:#44515d}.arrow{stroke:#53616d;stroke-width:4;fill:none;marker-end:url(#arrow)}.bi{stroke:#9a6518;stroke-width:4;fill:none;marker-start:url(#back);marker-end:url(#orange)}</style><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#53616d"/></marker><marker id="orange" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#9a6518"/></marker><marker id="back" markerWidth="10" markerHeight="10" refX="2" refY="5" orient="auto"><path d="M10,0 L0,5 L10,10 z" fill="#9a6518"/></marker></defs>
  <rect class="bg" width="1200" height="760"/><text class="title" x="65" y="60">Performance depends on where data lives and moves</text><text class="small" x="65" y="90">Conceptual hierarchy; capacity and bandwidth depend on the specific GPU and server.</text>
  <rect class="host" x="65" y="220" width="200" height="230" rx="6"/><text class="section" x="100" y="265">HOST MEMORY</text><text class="small" x="103" y="300">CPU-visible tensors</text><rect class="panel" x="100" y="335" width="130" height="65" rx="5"/><text class="label" x="128" y="374">system RAM</text>
  <path class="bi" d="M275 335 L390 335"/><rect class="inter" x="300" y="245" width="150" height="70" rx="5"/><text class="label" x="326" y="275">PCIe / NVLink</text><text class="small" x="329" y="298">host-device path</text>
  <rect class="panel" x="460" y="135" width="675" height="455" rx="6"/><text class="section" x="490" y="175">GPU DEVICE</text><rect class="gpu" x="500" y="215" width="180" height="275" rx="6"/><text class="section" x="530" y="255">GPU MEMORY</text><text class="section" x="568" y="280">/ HBM</text><text class="small" x="530" y="320">weights</text><text class="small" x="530" y="350">activations</text><text class="small" x="530" y="380">outputs</text><text class="small" x="530" y="410">kernel-visible global state</text>
  <path class="arrow" d="M680 350 L740 350"/><rect class="gpu" x="750" y="265" width="130" height="170" rx="6"/><text class="section" x="800" y="310">L2</text><text class="small" x="775" y="345">device-wide</text><text class="small" x="784" y="370">cache path</text>
  <path class="arrow" d="M880 350 L930 350"/><rect class="local" x="940" y="210" width="160" height="135" rx="6"/><text class="section" x="967" y="252">SHARED</text><text class="section" x="965" y="278">MEMORY</text><text class="small" x="970" y="315">visible to block</text><path class="arrow" d="M1020 345 L1020 395"/><rect class="local" x="940" y="405" width="160" height="135" rx="6"/><text class="section" x="968" y="447">REGISTERS</text><text class="small" x="974" y="480">private to thread</text><rect class="panel" x="975" y="500" width="90" height="25" rx="3"/><text class="small" x="998" y="518">thread</text>
  <rect class="inter" x="65" y="625" width="1070" height="60" rx="6"/><text class="label" x="115" y="662">SYSTEM QUESTION:</text><text class="small" x="310" y="660">How often does each tensor cross a boundary, and how much reuse occurs before it moves again?</text>
  <text class="small" x="65" y="725">Closer storage is more limited and scoped more narrowly; useful reuse reduces repeated movement from farther levels.</text>
</svg>
