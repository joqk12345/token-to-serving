<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">CUDA grid, block, thread hierarchy and global index</title><desc id="desc">A one-dimensional grid contains blocks, a selected block contains threads, and one selected thread computes its global index from block dimension, block index, and thread index.</desc>
  <defs><style>.bg{fill:#f7f8fa}.panel{fill:#fff;stroke:#1f2933;stroke-width:2}.block{fill:#e8eef9;stroke:#355c9a;stroke-width:2}.thread{fill:#dcefe5;stroke:#287052;stroke-width:2}.selected{fill:#fff0d6;stroke:#9a6518;stroke-width:3}.formula{fill:#ece8f3;stroke:#65517e;stroke-width:2}.title{font:700 30px Arial,sans-serif;fill:#17212b}.section{font:700 20px Arial,sans-serif;fill:#17212b}.label{font:600 18px Arial,sans-serif;fill:#17212b}.small{font:400 15px Arial,sans-serif;fill:#44515d}.math{font:600 20px Arial,sans-serif;fill:#17212b}.arrow{stroke:#53616d;stroke-width:3;fill:none;marker-end:url(#arrow)}</style><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#53616d"/></marker></defs>
  <rect class="bg" width="1200" height="760"/><text class="title" x="65" y="60">Launch geometry maps each thread to data</text><text class="small" x="65" y="90">One-dimensional indexing shown; the same hierarchy extends to two- and three-dimensional launches.</text>
  <rect class="panel" x="65" y="130" width="1070" height="225" rx="6"/><text class="section" x="95" y="170">GRID</text><text class="small" x="95" y="198">one kernel launch</text>
  <g><rect class="block" x="235" y="180" width="180" height="120" rx="5"/><text class="label" x="271" y="220">BLOCK 0</text><text class="small" x="272" y="255">blockIdx.x = 0</text><rect class="selected" x="455" y="180" width="180" height="120" rx="5"/><text class="label" x="491" y="220">BLOCK 1</text><text class="small" x="492" y="255">blockIdx.x = 1</text><rect class="block" x="675" y="180" width="180" height="120" rx="5"/><text class="label" x="711" y="220">BLOCK 2</text><text class="small" x="712" y="255">blockIdx.x = 2</text><rect class="block" x="895" y="180" width="180" height="120" rx="5"/><text class="label" x="931" y="220">BLOCK 3</text><text class="small" x="932" y="255">blockIdx.x = 3</text></g>
  <path class="arrow" d="M545 300 L545 390"/><rect class="panel" x="180" y="400" width="730" height="175" rx="6"/><text class="section" x="210" y="440">ZOOM: BLOCK 1</text><text class="small" x="210" y="468">blockDim.x = 8 threads</text>
  <g class="label"><rect class="thread" x="210" y="495" width="70" height="55" rx="4"/><text x="237" y="529">0</text><rect class="thread" x="290" y="495" width="70" height="55" rx="4"/><text x="317" y="529">1</text><rect class="thread" x="370" y="495" width="70" height="55" rx="4"/><text x="397" y="529">2</text><rect class="selected" x="450" y="495" width="70" height="55" rx="4"/><text x="477" y="529">3</text><rect class="thread" x="530" y="495" width="70" height="55" rx="4"/><text x="557" y="529">4</text><rect class="thread" x="610" y="495" width="70" height="55" rx="4"/><text x="637" y="529">5</text><rect class="thread" x="690" y="495" width="70" height="55" rx="4"/><text x="717" y="529">6</text><rect class="thread" x="770" y="495" width="70" height="55" rx="4"/><text x="797" y="529">7</text></g>
  <text class="small" x="438" y="598">selected thread: threadIdx.x = 3</text><path class="arrow" d="M520 523 L955 523"/><rect class="formula" x="930" y="410" width="205" height="205" rx="6"/><text class="section" x="970" y="450">GLOBAL INDEX</text><text class="math" x="956" y="492">i = blockDim.x</text><text class="math" x="972" y="525">* blockIdx.x</text><text class="math" x="972" y="558">+ threadIdx.x</text><text class="label" x="992" y="592">i = 8 * 1 + 3 = 11</text>
  <text class="small" x="65" y="680">Thread identity -> global data index -> guarded computation.</text><text class="small" x="65" y="710">A bounds check is still required when the launch is rounded up beyond the data length.</text>
</svg>
