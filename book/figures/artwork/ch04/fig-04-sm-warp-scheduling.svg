<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Thread blocks assigned to streaming multiprocessors and scheduled as warps</title><desc id="desc">Grid blocks are assigned to GPU streaming multiprocessors. One SM is expanded to show a warp scheduler, resident warps, registers, and shared memory.</desc>
  <defs><style>.bg{fill:#f7f8fa}.panel{fill:#fff;stroke:#1f2933;stroke-width:2}.block{fill:#e8eef9;stroke:#355c9a;stroke-width:2}.sm{fill:#dcefe5;stroke:#287052;stroke-width:2}.warp{fill:#fff0d6;stroke:#9a6518;stroke-width:2}.resource{fill:#ece8f3;stroke:#65517e;stroke-width:2}.title{font:700 30px Arial,sans-serif;fill:#17212b}.section{font:700 20px Arial,sans-serif;fill:#17212b}.label{font:600 18px Arial,sans-serif;fill:#17212b}.small{font:400 15px Arial,sans-serif;fill:#44515d}.arrow{stroke:#53616d;stroke-width:3;fill:none;marker-end:url(#arrow)}</style><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#53616d"/></marker></defs>
  <rect class="bg" width="1200" height="760"/><text class="title" x="65" y="60">Hardware schedules threads in structured groups</text><text class="small" x="65" y="90">NVIDIA CUDA terminology: blocks reside on SMs; threads execute in 32-thread warps.</text>
  <rect class="panel" x="65" y="135" width="270" height="500" rx="6"/><text class="section" x="95" y="175">LAUNCHED GRID</text><text class="small" x="95" y="202">thread blocks wait for placement</text>
  <g class="label"><rect class="block" x="100" y="235" width="90" height="75" rx="5"/><text x="130" y="280">B0</text><rect class="block" x="210" y="235" width="90" height="75" rx="5"/><text x="240" y="280">B1</text><rect class="block" x="100" y="330" width="90" height="75" rx="5"/><text x="130" y="375">B2</text><rect class="block" x="210" y="330" width="90" height="75" rx="5"/><text x="240" y="375">B3</text><rect class="block" x="100" y="425" width="90" height="75" rx="5"/><text x="130" y="470">B4</text><rect class="block" x="210" y="425" width="90" height="75" rx="5"/><text x="240" y="470">B5</text></g><text class="small" x="95" y="555">A block is assigned as a unit.</text>
  <path class="arrow" d="M335 285 L420 230"/><path class="arrow" d="M335 370 L420 370"/><path class="arrow" d="M335 455 L420 510"/>
  <rect class="sm" x="430" y="160" width="180" height="130" rx="6"/><text class="section" x="497" y="200">SM 0</text><text class="small" x="462" y="235">resident blocks</text><text class="label" x="480" y="265">B0  B1</text><rect class="sm" x="430" y="315" width="180" height="130" rx="6"/><text class="section" x="497" y="355">SM 1</text><text class="small" x="462" y="390">resident blocks</text><text class="label" x="480" y="420">B2  B3</text><rect class="sm" x="430" y="470" width="180" height="130" rx="6"/><text class="section" x="497" y="510">SM 2</text><text class="small" x="462" y="545">resident blocks</text><text class="label" x="480" y="575">B4  B5</text>
  <path class="arrow" d="M610 380 L690 380"/><rect class="panel" x="700" y="135" width="435" height="500" rx="6"/><text class="section" x="730" y="175">ZOOM: ONE SM</text><rect class="resource" x="730" y="205" width="375" height="60" rx="5"/><text class="label" x="843" y="242">WARP SCHEDULER</text>
  <text class="small" x="730" y="300">ready warps from resident blocks</text><g><rect class="warp" x="730" y="320" width="175" height="55" rx="5"/><text class="label" x="765" y="353">warp 0: 32 threads</text><rect class="warp" x="930" y="320" width="175" height="55" rx="5"/><text class="label" x="965" y="353">warp 1: 32 threads</text><rect class="warp" x="730" y="395" width="175" height="55" rx="5"/><text class="label" x="765" y="428">warp 2: 32 threads</text><rect class="warp" x="930" y="395" width="175" height="55" rx="5"/><text class="label" x="965" y="428">warp 3: 32 threads</text></g>
  <path class="arrow" d="M917 265 L917 310"/><rect class="resource" x="730" y="485" width="175" height="90" rx="5"/><text class="label" x="775" y="522">REGISTERS</text><text class="small" x="768" y="550">per-thread state</text><rect class="resource" x="930" y="485" width="175" height="90" rx="5"/><text class="label" x="958" y="522">SHARED MEMORY</text><text class="small" x="971" y="550">per-block state</text>
  <text class="small" x="65" y="695">Finite registers and shared memory constrain how many blocks and warps can reside on an SM.</text>
</svg>
