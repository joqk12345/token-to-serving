<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc"><title id="title">Synchronous replicated data-parallel training step</title><desc id="desc">Three workers hold identical model replicas, process different data shards, compute local gradients, participate in all-reduce, and apply the same synchronized optimizer update.</desc><defs><style>.b{fill:#f7f8fa}.p{fill:#fff;stroke:#1f2933;stroke-width:2}.d{fill:#e8eef9;stroke:#355c9a;stroke-width:2}.m{fill:#dcefe5;stroke:#287052;stroke-width:2}.g{fill:#fff0d6;stroke:#9a6518;stroke-width:2}.r{fill:#f3e8fa;stroke:#70428e;stroke-width:2}.t{font:700 30px Arial;fill:#17212b}.h{font:700 18px Arial;fill:#17212b}.s{font:400 15px Arial;fill:#44515d}.a{stroke:#53616d;stroke-width:3;fill:none;marker-end:url(#x)}</style><marker id="x" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0L10 5L0 10z" fill="#53616d"/></marker></defs><rect class="b" width="1200" height="760"/><text class="t" x="65" y="60">Data parallelism synchronizes replicated models</text><text class="s" x="65" y="90">Parameters are replicated here, not sharded; each worker applies an equivalent synchronized update.</text><rect class="p" x="65" y="135" width="1070" height="500" rx="6"/>
<g><text class="h" x="105" y="185">WORKER 0</text><rect class="d" x="95" y="210" width="130" height="65" rx="5"/><text class="h" x="125" y="250">data shard 0</text><path class="a" d="M225 242L275 242"/><rect class="m" x="285" y="205" width="155" height="75" rx="5"/><text class="h" x="315" y="240">model replica θ</text><text class="s" x="322" y="263">forward/backward</text><path class="a" d="M440 242L490 242"/><rect class="g" x="500" y="210" width="130" height="65" rx="5"/><text class="h" x="525" y="250">local g₀</text>
<text class="h" x="105" y="345">WORKER 1</text><rect class="d" x="95" y="370" width="130" height="65" rx="5"/><text class="h" x="125" y="410">data shard 1</text><path class="a" d="M225 402L275 402"/><rect class="m" x="285" y="365" width="155" height="75" rx="5"/><text class="h" x="315" y="400">model replica θ</text><text class="s" x="322" y="423">forward/backward</text><path class="a" d="M440 402L490 402"/><rect class="g" x="500" y="370" width="130" height="65" rx="5"/><text class="h" x="525" y="410">local g₁</text>
<text class="h" x="105" y="505">WORKER 2</text><rect class="d" x="95" y="530" width="130" height="65" rx="5"/><text class="h" x="125" y="570">data shard 2</text><path class="a" d="M225 562L275 562"/><rect class="m" x="285" y="525" width="155" height="75" rx="5"/><text class="h" x="315" y="560">model replica θ</text><text class="s" x="322" y="583">forward/backward</text><path class="a" d="M440 562L490 562"/><rect class="g" x="500" y="530" width="130" height="65" rx="5"/><text class="h" x="525" y="570">local g₂</text></g>
<path class="a" d="M630 242L720 355M630 402L720 402M630 562L720 445"/><rect class="r" x="730" y="335" width="170" height="135" rx="68"/><text class="h" x="775" y="385">ALL-REDUCE</text><text class="s" x="760" y="415">sum + training-scale</text><text class="s" x="778" y="440">shared gradient</text><path class="a" d="M900 402L955 402"/><rect class="m" x="965" y="345" width="140" height="115" rx="5"/><text class="h" x="985" y="385">LOCAL UPDATE</text><text class="s" x="990" y="415">same optimizer</text><text class="s" x="996" y="440">on every worker</text><text class="s" x="65" y="690">The collective may sum; the training algorithm applies the scaling needed for the intended synchronized gradient.</text></svg>
