<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc"><title id="title">Ring all-reduce has scatter-reduce and all-gather phases</title><desc id="desc">Four logical workers form a ring. During scatter-reduce, chunks circulate and combine until each worker owns one reduced chunk. During all-gather, reduced chunks circulate until every worker has the full reduced tensor.</desc><defs><style>.b{fill:#f7f8fa}.p{fill:#fff;stroke:#1f2933;stroke-width:2}.w{fill:#e8eef9;stroke:#355c9a;stroke-width:2}.r{fill:#dcefe5;stroke:#287052;stroke-width:2}.t{font:700 30px Arial;fill:#17212b}.h{font:700 18px Arial;fill:#17212b}.s{font:400 15px Arial;fill:#44515d}.a{stroke:#53616d;stroke-width:3;fill:none;marker-end:url(#m)}</style><marker id="m" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0L10 5L0 10z" fill="#53616d"/></marker></defs><rect class="b" width="1200" height="760"/><text class="t" x="65" y="60">Ring all-reduce is a two-phase schedule</text><text class="s" x="65" y="90">The logical ring is an algorithmic ordering; it need not match the physical network topology.</text><rect class="p" x="65" y="135" width="515" height="500" rx="6"/><text class="h" x="95" y="175">1 · SCATTER-REDUCE</text><circle class="w" cx="320" cy="250" r="55"/><text class="h" x="290" y="257">worker 0</text><circle class="w" cx="455" cy="385" r="55"/><text class="h" x="425" y="392">worker 1</text><circle class="w" cx="320" cy="520" r="55"/><text class="h" x="290" y="527">worker 2</text><circle class="w" cx="185" cy="385" r="55"/><text class="h" x="155" y="392">worker 3</text><path class="a" d="M360 285L415 345M415 425L360 480M280 480L225 425M225 345L280 285"/><text class="s" x="255" y="375">chunks circulate</text><text class="s" x="260" y="405">and are reduced</text><text class="s" x="95" y="590">End state: each worker owns one fully reduced chunk.</text>
<rect class="p" x="620" y="135" width="515" height="500" rx="6"/><text class="h" x="650" y="175">2 · ALL-GATHER</text><circle class="r" cx="875" cy="250" r="55"/><text class="h" x="845" y="257">worker 0</text><circle class="r" cx="1010" cy="385" r="55"/><text class="h" x="980" y="392">worker 1</text><circle class="r" cx="875" cy="520" r="55"/><text class="h" x="845" y="527">worker 2</text><circle class="r" cx="740" cy="385" r="55"/><text class="h" x="710" y="392">worker 3</text><path class="a" d="M915 285L970 345M970 425L915 480M835 480L780 425M780 345L835 285"/><text class="s" x="815" y="375">reduced chunks</text><text class="s" x="822" y="405">are replicated</text><text class="s" x="650" y="590">End state: every worker owns the full reduced tensor.</text><text class="s" x="65" y="690">Performance depends on message size, rank count, topology, links, and implementation; no bandwidth formula is implied here.</text></svg>
