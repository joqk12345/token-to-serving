<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc"><title id="title">Collective operations change tensor ownership</title><desc id="desc">Five rows compare broadcast, reduce, all-reduce, reduce-scatter, and all-gather across four workers using symbolic full tensors and shards before and after communication.</desc><defs><style>.b{fill:#f7f8fa}.p{fill:#fff;stroke:#1f2933;stroke-width:2}.f{fill:#dcefe5;stroke:#287052;stroke-width:2}.sh{fill:#e8eef9;stroke:#355c9a;stroke-width:2}.e{fill:#fff;stroke:#9aa3aa;stroke-width:1.5;stroke-dasharray:5 4}.t{font:700 30px Arial;fill:#17212b}.h{font:700 17px Arial;fill:#17212b}.s{font:400 14px Arial;fill:#44515d}.a{stroke:#53616d;stroke-width:2.5;fill:none;marker-end:url(#m)}</style><marker id="m" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0L10 5L0 10z" fill="#53616d"/></marker></defs><rect class="b" width="1200" height="760"/><text class="t" x="65" y="60">Collectives differ by input and output ownership</text><text class="s" x="65" y="90">Four symbolic workers; no communication-volume or topology claim is encoded.</text><rect class="p" x="65" y="130" width="1070" height="530" rx="6"/><text class="h" x="240" y="170">BEFORE: workers 0 · 1 · 2 · 3</text><text class="h" x="810" y="170">AFTER: workers 0 · 1 · 2 · 3</text>
<g><text class="h" x="95" y="225">broadcast</text><rect class="f" x="235" y="195" width="65" height="45"/><rect class="e" x="310" y="195" width="65" height="45"/><rect class="e" x="385" y="195" width="65" height="45"/><rect class="e" x="460" y="195" width="65" height="45"/><path class="a" d="M550 218L640 218"/><rect class="f" x="690" y="195" width="65" height="45"/><rect class="f" x="765" y="195" width="65" height="45"/><rect class="f" x="840" y="195" width="65" height="45"/><rect class="f" x="915" y="195" width="65" height="45"/>
<text class="h" x="95" y="310">reduce</text><rect class="sh" x="235" y="280" width="65" height="45"/><rect class="sh" x="310" y="280" width="65" height="45"/><rect class="sh" x="385" y="280" width="65" height="45"/><rect class="sh" x="460" y="280" width="65" height="45"/><path class="a" d="M550 303L640 303"/><rect class="f" x="690" y="280" width="65" height="45"/><rect class="e" x="765" y="280" width="65" height="45"/><rect class="e" x="840" y="280" width="65" height="45"/><rect class="e" x="915" y="280" width="65" height="45"/>
<text class="h" x="95" y="395">all-reduce</text><rect class="sh" x="235" y="365" width="65" height="45"/><rect class="sh" x="310" y="365" width="65" height="45"/><rect class="sh" x="385" y="365" width="65" height="45"/><rect class="sh" x="460" y="365" width="65" height="45"/><path class="a" d="M550 388L640 388"/><rect class="f" x="690" y="365" width="65" height="45"/><rect class="f" x="765" y="365" width="65" height="45"/><rect class="f" x="840" y="365" width="65" height="45"/><rect class="f" x="915" y="365" width="65" height="45"/>
<text class="h" x="95" y="480">reduce-scatter</text><rect class="sh" x="235" y="450" width="65" height="45"/><rect class="sh" x="310" y="450" width="65" height="45"/><rect class="sh" x="385" y="450" width="65" height="45"/><rect class="sh" x="460" y="450" width="65" height="45"/><path class="a" d="M550 473L640 473"/><rect class="sh" x="690" y="450" width="65" height="45"/><rect class="sh" x="765" y="450" width="65" height="45"/><rect class="sh" x="840" y="450" width="65" height="45"/><rect class="sh" x="915" y="450" width="65" height="45"/>
<text class="h" x="95" y="565">all-gather</text><rect class="sh" x="235" y="535" width="65" height="45"/><rect class="sh" x="310" y="535" width="65" height="45"/><rect class="sh" x="385" y="535" width="65" height="45"/><rect class="sh" x="460" y="535" width="65" height="45"/><path class="a" d="M550 558L640 558"/><rect class="f" x="690" y="535" width="65" height="45"/><rect class="f" x="765" y="535" width="65" height="45"/><rect class="f" x="840" y="535" width="65" height="45"/><rect class="f" x="915" y="535" width="65" height="45"/></g><text class="s" x="245" y="625">outlined = no owned tensor · blue = contribution/shard · green = full result</text><text class="s" x="65" y="710">All-reduce can be implemented as reduce-scatter followed by all-gather, but the physical schedule depends on the collective implementation.</text></svg>
