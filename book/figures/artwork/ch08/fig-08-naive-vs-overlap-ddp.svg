<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc"><title id="title">Bucketed DDP can overlap backward compute and all-reduce</title><desc id="desc">A naive timeline completes all backward layers before one gradient all-reduce. A bucketed timeline starts asynchronous all-reduce for bucket A while later backward computation continues, then launches bucket B. The final communication tail remains exposed.</desc><defs><style>.b{fill:#f7f8fa}.p{fill:#fff;stroke:#1f2933;stroke-width:2}.c{fill:#e8eef9;stroke:#355c9a;stroke-width:2}.n{fill:#fff0d6;stroke:#9a6518;stroke-width:2}.o{fill:#dcefe5;stroke:#287052;stroke-width:2}.t{font:700 30px Arial;fill:#17212b}.h{font:700 18px Arial;fill:#17212b}.s{font:400 15px Arial;fill:#44515d}.axis{stroke:#53616d;stroke-width:2;fill:none;marker-end:url(#m)}</style><marker id="m" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0L10 5L0 10z" fill="#53616d"/></marker></defs><rect class="b" width="1200" height="760"/><text class="t" x="65" y="60">Buckets move communication earlier in backward</text><text class="s" x="65" y="90">Overlap is conditional; bucket order, tensor sizes, worker readiness, and network conditions determine exposed communication.</text><rect class="p" x="65" y="135" width="1070" height="500" rx="6"/>
<text class="h" x="95" y="190">NAIVE</text><text class="s" x="95" y="230">compute</text><rect class="c" x="220" y="205" width="180" height="55" rx="4"/><text class="h" x="275" y="240">backward L3</text><rect class="c" x="400" y="205" width="180" height="55" rx="4"/><text class="h" x="455" y="240">backward L2</text><rect class="c" x="580" y="205" width="180" height="55" rx="4"/><text class="h" x="635" y="240">backward L1</text><text class="s" x="95" y="300">network</text><rect class="n" x="760" y="275" width="270" height="55" rx="4"/><text class="h" x="815" y="310">all-reduce all gradients</text><text class="s" x="800" y="355">communication begins after backward</text>
<text class="h" x="95" y="420">BUCKETED DDP</text><text class="s" x="95" y="460">compute</text><rect class="c" x="220" y="435" width="180" height="55" rx="4"/><text class="h" x="275" y="470">backward L3</text><rect class="c" x="400" y="435" width="180" height="55" rx="4"/><text class="h" x="455" y="470">backward L2</text><rect class="c" x="580" y="435" width="180" height="55" rx="4"/><text class="h" x="635" y="470">backward L1</text><text class="s" x="95" y="530">network</text><rect class="o" x="400" y="505" width="270" height="55" rx="4"/><text class="h" x="455" y="540">async all-reduce A</text><rect class="o" x="670" y="505" width="260" height="55" rx="4"/><text class="h" x="725" y="540">async all-reduce B</text><rect class="n" x="930" y="505" width="100" height="55" rx="4"/><text class="s" x="947" y="538">tail</text><path class="axis" d="M200 595L1060 595"/><text class="s" x="1025" y="620">time</text><text class="s" x="65" y="690">Starting communication at bucket readiness can reduce the exposed network interval; it does not promise perfect hiding.</text></svg>
