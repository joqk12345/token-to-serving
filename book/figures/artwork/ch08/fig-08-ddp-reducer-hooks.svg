<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc"><title id="title">PyTorch DDP reducer responds to gradient readiness</title><desc id="desc">The PyTorch autograd engine emits parameter gradient-ready events. Hooks notify the DDP reducer, which decrements a bucket pending count. When the count reaches zero, the reducer launches asynchronous all-reduce and writes synchronized gradients on completion.</desc><defs><style>.b{fill:#f7f8fa}.p{fill:#fff;stroke:#1f2933;stroke-width:2}.x{fill:#e8eef9;stroke:#355c9a;stroke-width:2}.y{fill:#dcefe5;stroke:#287052;stroke-width:2}.z{fill:#fff0d6;stroke:#9a6518;stroke-width:2}.v{fill:#f3e8fa;stroke:#70428e;stroke-width:2}.t{font:700 30px Arial;fill:#17212b}.h{font:700 18px Arial;fill:#17212b}.s{font:400 15px Arial;fill:#44515d}.a{stroke:#53616d;stroke-width:3;fill:none;marker-end:url(#m)}</style><marker id="m" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0L10 5L0 10z" fill="#53616d"/></marker></defs><rect class="b" width="1200" height="760"/><text class="t" x="65" y="60">PyTorch DDP ties communication to gradient readiness</text><text class="s" x="65" y="90">PyTorch-specific control-flow sketch; other data-parallel systems may coordinate communication differently.</text><rect class="p" x="65" y="135" width="1070" height="500" rx="6"/>
<rect class="x" x="95" y="250" width="185" height="170" rx="6"/><text class="h" x="125" y="290">AUTOGRAD ENGINE</text><text class="s" x="125" y="330">gradient p₃ ready</text><text class="s" x="125" y="365">gradient p₂ ready</text><text class="s" x="125" y="400">gradient p₁ ready</text><path class="a" d="M280 335L365 335"/><rect class="y" x="375" y="250" width="175" height="170" rx="6"/><text class="h" x="410" y="290">AUTOGRAD HOOK</text><text class="s" x="405" y="335">mark parameter ready</text><text class="s" x="405" y="370">find assigned bucket</text><text class="s" x="405" y="400">notify reducer</text><path class="a" d="M550 335L635 335"/><rect class="z" x="645" y="220" width="200" height="230" rx="6"/><text class="h" x="705" y="260">REDUCER</text><text class="s" x="680" y="305">bucket A pending: 2</text><text class="s" x="680" y="340">gradient ready → 1</text><text class="s" x="680" y="375">gradient ready → 0</text><text class="h" x="680" y="415">BUCKET READY</text><path class="a" d="M845 335L920 335"/><rect class="v" x="930" y="250" width="175" height="170" rx="6"/><text class="h" x="958" y="290">ASYNC ALL-REDUCE</text><text class="s" x="965" y="335">communicate bucket</text><text class="s" x="962" y="370">completion callback</text><text class="s" x="960" y="400">reduced gradients</text><path class="a" d="M1018 420C1018 520 745 540 745 450"/><text class="s" x="820" y="535">completion publishes synchronized bucket</text><text class="s" x="65" y="690">Buckets make communication coarse enough to amortize launch latency while allowing earlier readiness than one end-of-backward buffer.</text></svg>
