<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc"><title id="title">A block table maps logical KV blocks to noncontiguous physical blocks</title><desc id="desc">Logical blocks zero through three map through a request block table to physical blocks seven, two, nine, and four in a noncontiguous physical-memory pool.</desc><defs><style>.b{fill:#f7f8fa}.p{fill:#fff;stroke:#1f2933;stroke-width:2}.l{fill:#e8eef9;stroke:#355c9a;stroke-width:2}.tab{fill:#dcefe5;stroke:#287052;stroke-width:2}.phys{fill:#fff0d6;stroke:#9a6518;stroke-width:2}.t{font:700 30px Arial;fill:#17212b}.h{font:700 18px Arial;fill:#17212b}.s{font:400 15px Arial;fill:#44515d}.a{stroke:#53616d;stroke-width:2.5;fill:none;marker-end:url(#m)}</style><marker id="m" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0L10 5L0 10z" fill="#53616d"/></marker></defs><rect class="b" width="1200" height="760"/><text class="t" x="65" y="60">Block tables separate logical order from physical placement</text><text class="s" x="65" y="90">Virtual-memory analogy only; a KV block table is not identical to an operating-system page table.</text><rect class="p" x="65" y="135" width="1070" height="500" rx="6"/><text class="h" x="95" y="190">LOGICAL SEQUENCE</text><g class="l"><rect x="95" y="225" width="120" height="65"/><rect x="95" y="305" width="120" height="65"/><rect x="95" y="385" width="120" height="65"/><rect x="95" y="465" width="120" height="65"/></g><text class="h" x="135" y="265">L0</text><text class="h" x="135" y="345">L1</text><text class="h" x="135" y="425">L2</text><text class="h" x="135" y="505">L3</text><rect class="tab" x="355" y="220" width="250" height="315" rx="6"/><text class="h" x="420" y="260">BLOCK TABLE</text><text class="h" x="410" y="315">L0 → P7</text><text class="h" x="410" y="370">L1 → P2</text><text class="h" x="410" y="425">L2 → P9</text><text class="h" x="410" y="480">L3 → P4</text><path class="a" d="M215 257L345 290M215 337L345 345M215 417L345 400M215 497L345 455"/><text class="h" x="745" y="190">PHYSICAL KV POOL</text><g class="phys"><rect x="720" y="225" width="100" height="65"/><rect x="840" y="225" width="100" height="65"/><rect x="960" y="225" width="100" height="65"/><rect x="720" y="320" width="100" height="65"/><rect x="840" y="320" width="100" height="65"/><rect x="960" y="320" width="100" height="65"/><rect x="720" y="415" width="100" height="65"/><rect x="840" y="415" width="100" height="65"/><rect x="960" y="415" width="100" height="65"/></g><text class="h" x="755" y="265">P2</text><text class="h" x="875" y="265">P7</text><text class="h" x="995" y="265">P4</text><text class="h" x="755" y="360">P9</text><text class="s" x="755" y="520">other blocks belong to other requests</text><path class="a" d="M605 315L830 257M605 370L710 257M605 425L710 352M605 480L950 257"/><text class="s" x="65" y="690">The table preserves sequence order while the allocator places blocks wherever physical capacity is available.</text></svg>
