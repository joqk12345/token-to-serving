<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc"><title id="title">Fixed-size blocks bound unused space to the final block</title><desc id="desc">A contiguous reservation has a long unused tail. A fixed-block allocation has three full blocks and one final partial block, concentrating unused space at the end.</desc><defs><style>.b{fill:#f7f8fa}.p{fill:#fff;stroke:#1f2933;stroke-width:2}.u{fill:#dcefe5;stroke:#287052;stroke-width:2}.w{fill:#fff0d6;stroke:#9a6518;stroke-width:2;stroke-dasharray:6 5}.t{font:700 30px Arial;fill:#17212b}.h{font:700 18px Arial;fill:#17212b}.s{font:400 15px Arial;fill:#44515d}</style></defs><rect class="b" width="1200" height="760"/><text class="t" x="65" y="60">Fixed-size allocation changes the fragmentation boundary</text><text class="s" x="65" y="90">Assumption: KV memory is allocated in equal-size blocks.</text><rect class="p" x="65" y="135" width="1070" height="500" rx="6"/><text class="h" x="95" y="220">MAX-LENGTH CONTIGUOUS RESERVATION</text><rect class="u" x="95" y="250" width="430" height="100"/><rect class="w" x="525" y="250" width="520" height="100"/><text class="s" x="245" y="307">used context</text><text class="s" x="720" y="307">unused reserved tail</text><text class="h" x="95" y="440">FIXED-SIZE KV BLOCKS</text><rect class="u" x="95" y="470" width="200" height="100"/><rect class="u" x="310" y="470" width="200" height="100"/><rect class="u" x="525" y="470" width="200" height="100"/><rect class="u" x="740" y="470" width="90" height="100"/><rect class="w" x="830" y="470" width="110" height="100"/><text class="s" x="120" y="530">full</text><text class="s" x="335" y="530">full</text><text class="s" x="550" y="530">full</text><text class="s" x="755" y="530">used</text><text class="s" x="845" y="530">final-block waste</text><text class="s" x="65" y="690">The block allocator avoids reserving an entire predicted maximum length; unused space remains possible in the last allocated block.</text></svg>
