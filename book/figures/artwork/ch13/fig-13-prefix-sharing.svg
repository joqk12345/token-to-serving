<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc"><title id="title">Continuations can share prefix KV blocks before divergence</title><desc id="desc">Two sequences reference the same three prompt-prefix blocks. After divergence, each sequence owns separate continuation blocks.</desc><defs><style>.b{fill:#f7f8fa}.p{fill:#fff;stroke:#1f2933;stroke-width:2}.sh{fill:#e8eef9;stroke:#355c9a;stroke-width:2}.a{fill:#dcefe5;stroke:#287052;stroke-width:2}.c{fill:#fff0d6;stroke:#9a6518;stroke-width:2}.t{font:700 30px Arial;fill:#17212b}.h{font:700 18px Arial;fill:#17212b}.s{font:400 15px Arial;fill:#44515d}.line{stroke:#53616d;stroke-width:3;fill:none}</style></defs><rect class="b" width="1200" height="760"/><text class="t" x="65" y="60">KV block references enable prefix sharing</text><text class="s" x="65" y="90">Sharing stops at divergence unless explicit copy-on-write or reference behavior preserves a common block.</text><rect class="p" x="65" y="135" width="1070" height="500" rx="6"/><text class="h" x="95" y="210">SHARED PROMPT PREFIX</text><rect class="sh" x="95" y="250" width="150" height="90" rx="5"/><text class="h" x="145" y="302">P0</text><rect class="sh" x="275" y="250" width="150" height="90" rx="5"/><text class="h" x="325" y="302">P1</text><rect class="sh" x="455" y="250" width="150" height="90" rx="5"/><text class="h" x="505" y="302">P2</text><path class="line" d="M605 295L705 220M605 295L705 450"/><text class="h" x="720" y="190">CONTINUATION A</text><rect class="a" x="720" y="220" width="150" height="90" rx="5"/><text class="h" x="770" y="272">A3</text><rect class="a" x="900" y="220" width="150" height="90" rx="5"/><text class="h" x="950" y="272">A4</text><text class="h" x="720" y="420">CONTINUATION B</text><rect class="c" x="720" y="450" width="150" height="90" rx="5"/><text class="h" x="770" y="502">B3</text><rect class="c" x="900" y="450" width="150" height="90" rx="5"/><text class="h" x="950" y="502">B4</text><text class="s" x="120" y="390">reference-counted/shared prompt blocks</text><text class="s" x="725" y="590">separate blocks after outputs diverge</text><text class="s" x="65" y="690">Sharing reduces duplicate prefix state while preserving independent continuation ownership.</text></svg>
