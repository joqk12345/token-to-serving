<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc"><title id="title">PagedAttention sits inside the vLLM serving engine</title><desc id="desc">Requests pass through an API layer and scheduler. A KV manager maintains block tables and allocation. Workers run model kernels, with PagedAttention using KV blocks. Tokens return through the API.</desc><defs><style>.b{fill:#f7f8fa}.p{fill:#fff;stroke:#1f2933;stroke-width:2}.x{fill:#e8eef9;stroke:#355c9a;stroke-width:2}.y{fill:#dcefe5;stroke:#287052;stroke-width:2}.z{fill:#fff0d6;stroke:#9a6518;stroke-width:2}.v{fill:#f3e8fa;stroke:#70428e;stroke-width:3}.t{font:700 30px Arial;fill:#17212b}.h{font:700 18px Arial;fill:#17212b}.s{font:400 15px Arial;fill:#44515d}.a{stroke:#53616d;stroke-width:3;fill:none;marker-end:url(#m)}</style><marker id="m" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0L10 5L0 10z" fill="#53616d"/></marker></defs><rect class="b" width="1200" height="760"/><text class="t" x="65" y="60">PagedAttention is one mechanism inside a serving engine</text><text class="s" x="65" y="90">Conceptual vLLM boundary aligned to API, scheduling, KV management, workers, and kernels.</text><rect class="p" x="65" y="135" width="1070" height="500" rx="6"/><rect class="x" x="95" y="295" width="145" height="110" rx="6"/><text class="h" x="135" y="335">API LAYER</text><text class="s" x="125" y="370">requests / tokens</text><path class="a" d="M240 350L320 350"/><rect class="y" x="330" y="275" width="170" height="150" rx="6"/><text class="h" x="375" y="315">SCHEDULER</text><text class="s" x="365" y="350">admission + batch</text><text class="s" x="370" y="380">preemption policy</text><path class="a" d="M500 325L590 250M500 375L590 475"/><rect class="z" x="600" y="195" width="205" height="135" rx="6"/><text class="h" x="645" y="235">KV MANAGER</text><text class="s" x="635" y="270">block allocation</text><text class="s" x="635" y="300">block tables + sharing</text><rect class="x" x="600" y="405" width="205" height="135" rx="6"/><text class="h" x="670" y="445">WORKER</text><text class="s" x="645" y="480">model execution</text><text class="s" x="650" y="510">device kernels</text><path class="a" d="M805 265L890 325M805 470L890 390"/><rect class="v" x="900" y="290" width="190" height="140" rx="6"/><text class="h" x="930" y="335">PAGEDATTENTION</text><text class="s" x="945" y="370">block-table reads</text><text class="s" x="950" y="400">KV block access</text><path class="a" d="M995 430C995 555 165 555 165 405"/><text class="s" x="65" y="690">Scheduling decides which requests run; KV management decides where state lives; kernels consume that state to execute attention.</text></svg>
