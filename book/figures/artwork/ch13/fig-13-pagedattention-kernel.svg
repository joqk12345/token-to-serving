<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc"><title id="title">PagedAttention follows block-table indirection</title><desc id="desc">A query enters the attention kernel. The kernel reads the request block table and gathers key and value blocks from noncontiguous physical locations before producing the attention output.</desc><defs><style>.b{fill:#f7f8fa}.p{fill:#fff;stroke:#1f2933;stroke-width:2}.q{fill:#e8eef9;stroke:#355c9a;stroke-width:2}.k{fill:#dcefe5;stroke:#287052;stroke-width:2}.tab{fill:#f3e8fa;stroke:#70428e;stroke-width:2}.mem{fill:#fff0d6;stroke:#9a6518;stroke-width:2}.t{font:700 30px Arial;fill:#17212b}.h{font:700 18px Arial;fill:#17212b}.s{font:400 15px Arial;fill:#44515d}.a{stroke:#53616d;stroke-width:3;fill:none;marker-end:url(#m)}</style><marker id="m" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0L10 5L0 10z" fill="#53616d"/></marker></defs><rect class="b" width="1200" height="760"/><text class="t" x="65" y="60">The attention kernel gathers KV through a block table</text><text class="s" x="65" y="90">Conceptual dataflow; kernel scheduling and hardware-specific implementation details are omitted.</text><rect class="p" x="65" y="135" width="1070" height="500" rx="6"/><rect class="q" x="95" y="315" width="130" height="90" rx="5"/><text class="h" x="135" y="355">QUERY</text><text class="s" x="125" y="382">current token</text><path class="a" d="M225 360L320 360"/><rect class="k" x="330" y="285" width="210" height="150" rx="6"/><text class="h" x="370" y="325">PAGEDATTENTION</text><text class="h" x="395" y="352">KERNEL</text><text class="s" x="375" y="390">score + softmax + mix</text><rect class="tab" x="620" y="195" width="185" height="135" rx="6"/><text class="h" x="660" y="235">BLOCK TABLE</text><text class="s" x="660" y="270">L0→P7 · L1→P2</text><text class="s" x="660" y="298">L2→P9 · L3→P4</text><path class="a" d="M620 265L540 315"/><text class="h" x="875" y="180">PHYSICAL KV BLOCKS</text><g class="mem"><rect x="850" y="215" width="110" height="75"/><rect x="980" y="215" width="110" height="75"/><rect x="850" y="325" width="110" height="75"/><rect x="980" y="325" width="110" height="75"/><rect x="850" y="435" width="110" height="75"/><rect x="980" y="435" width="110" height="75"/></g><text class="h" x="885" y="260">P7 K/V</text><text class="h" x="1015" y="260">P2 K/V</text><text class="h" x="885" y="370">P9 K/V</text><text class="h" x="1015" y="370">P4 K/V</text><path class="a" d="M850 250L550 330M980 250L550 350M850 360L550 375M980 360L550 395"/><path class="a" d="M540 420L660 505"/><rect class="q" x="670" y="470" width="150" height="85" rx="5"/><text class="h" x="710" y="520">OUTPUT</text><text class="s" x="65" y="690">Indirection lets attention preserve logical token order while reading physically scattered KV blocks.</text></svg>
