<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc"><title id="title">A sequence KV cache is divided into fixed-size logical blocks</title><desc id="desc">A token sequence is grouped into logical blocks zero through three. The first three are full and the last block is partially filled.</desc><defs><style>.b{fill:#f7f8fa}.p{fill:#fff;stroke:#1f2933;stroke-width:2}.blk{fill:#e8eef9;stroke:#355c9a;stroke-width:2}.last{fill:#dcefe5;stroke:#287052;stroke-width:2}.empty{fill:#fff;stroke:#9aa3aa;stroke-width:1.5;stroke-dasharray:5 4}.t{font:700 30px Arial;fill:#17212b}.h{font:700 18px Arial;fill:#17212b}.s{font:400 15px Arial;fill:#44515d}</style></defs><rect class="b" width="1200" height="760"/><text class="t" x="65" y="60">Paged KV storage uses fixed-size logical blocks</text><text class="s" x="65" y="90">Symbolic block size; only the final block may be partially filled for this sequence.</text><rect class="p" x="65" y="135" width="1070" height="500" rx="6"/><text class="h" x="95" y="215">SEQUENCE TOKENS</text><g class="blk"><rect x="95" y="245" width="55" height="55"/><rect x="150" y="245" width="55" height="55"/><rect x="205" y="245" width="55" height="55"/><rect x="260" y="245" width="55" height="55"/><rect x="345" y="245" width="55" height="55"/><rect x="400" y="245" width="55" height="55"/><rect x="455" y="245" width="55" height="55"/><rect x="510" y="245" width="55" height="55"/><rect x="595" y="245" width="55" height="55"/><rect x="650" y="245" width="55" height="55"/><rect x="705" y="245" width="55" height="55"/><rect x="760" y="245" width="55" height="55"/></g><g class="last"><rect x="845" y="245" width="55" height="55"/><rect x="900" y="245" width="55" height="55"/></g><g class="empty"><rect x="955" y="245" width="55" height="55"/><rect x="1010" y="245" width="55" height="55"/></g><text class="h" x="175" y="345">logical block 0</text><text class="h" x="425" y="345">logical block 1</text><text class="h" x="675" y="345">logical block 2</text><text class="h" x="900" y="345">logical block 3</text><text class="s" x="875" y="390">final partial block</text><text class="s" x="95" y="500">Each block contains KV entries for a fixed number of token positions; logical order does not require physical contiguity.</text><text class="s" x="65" y="690">Fixed-size allocation changes the unit of growth, mapping, sharing, and reclamation from whole sequences to blocks.</text></svg>
