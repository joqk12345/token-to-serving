<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc"><title id="title">Preempted requests can recover KV state by restore or recompute</title><desc id="desc">Memory pressure preempts a request. One recovery lane swaps KV blocks to CPU memory and restores them later. The other drops KV state and recomputes the prefix before resuming.</desc><defs><style>.b{fill:#f7f8fa}.p{fill:#fff;stroke:#1f2933;stroke-width:2}.x{fill:#e8eef9;stroke:#355c9a;stroke-width:2}.s{fill:#dcefe5;stroke:#287052;stroke-width:2}.r{fill:#fff0d6;stroke:#9a6518;stroke-width:2}.t{font:700 30px Arial;fill:#17212b}.h{font:700 18px Arial;fill:#17212b}.sm{font:400 15px Arial;fill:#44515d}.a{stroke:#53616d;stroke-width:3;fill:none;marker-end:url(#m)}</style><marker id="m" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0L10 5L0 10z" fill="#53616d"/></marker></defs><rect class="b" width="1200" height="760"/><text class="t" x="65" y="60">Preemption moves cost into recovery</text><text class="sm" x="65" y="90">Swap versus recompute depends on interconnect, CPU memory, compute headroom, prefix length, and request state.</text><rect class="p" x="65" y="135" width="1070" height="500" rx="6"/><rect class="x" x="95" y="305" width="170" height="110" rx="6"/><text class="h" x="125" y="345">MEMORY PRESSURE</text><text class="sm" x="135" y="380">preempt request</text><path class="a" d="M265 340L365 255M265 380L365 480"/><rect class="s" x="375" y="195" width="220" height="130" rx="6"/><text class="h" x="445" y="235">SWAP PATH</text><text class="sm" x="420" y="270">copy KV to CPU</text><text class="sm" x="420" y="300">restore before resume</text><path class="a" d="M595 260L760 260"/><rect class="x" x="770" y="210" width="220" height="100" rx="6"/><text class="h" x="825" y="250">RESTORE KV</text><text class="sm" x="815" y="280">then resume decode</text><rect class="r" x="375" y="425" width="220" height="130" rx="6"/><text class="h" x="425" y="465">RECOMPUTE PATH</text><text class="sm" x="420" y="500">drop KV state</text><text class="sm" x="420" y="530">rerun needed prefix</text><path class="a" d="M595 490L760 490"/><rect class="x" x="770" y="440" width="220" height="100" rx="6"/><text class="h" x="815" y="480">REBUILD KV</text><text class="sm" x="815" y="510">then resume decode</text><path class="a" d="M990 260L1080 350M990 490L1080 390"/><text class="h" x="1035" y="375">RESUME</text><text class="sm" x="65" y="690">Neither recovery path is universally better; the scheduler chooses under current memory and resource conditions.</text></svg>
