<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc"><title id="title">Contiguous KV reservations create internal and external fragmentation</title><desc id="desc">Three max-length contiguous request allocations contain unused reserved tails. After one request is freed, a hole appears between live allocations.</desc><defs><style>.b{fill:#f7f8fa}.p{fill:#fff;stroke:#1f2933;stroke-width:2}.use{fill:#dcefe5;stroke:#287052;stroke-width:2}.waste{fill:#fff0d6;stroke:#9a6518;stroke-width:2;stroke-dasharray:6 5}.free{fill:#fff;stroke:#9aa3aa;stroke-width:2;stroke-dasharray:6 5}.t{font:700 30px Arial;fill:#17212b}.h{font:700 18px Arial;fill:#17212b}.s{font:400 15px Arial;fill:#44515d}</style></defs><rect class="b" width="1200" height="760"/><text class="t" x="65" y="60">Max-length reservations can waste contiguous KV memory</text><text class="s" x="65" y="90">Illustrative allocation shape; no waste percentage is implied.</text><rect class="p" x="65" y="135" width="1070" height="500" rx="6"/><text class="h" x="95" y="200">BEFORE COMPLETION</text><rect class="use" x="95" y="230" width="190" height="80"/><rect class="waste" x="285" y="230" width="130" height="80"/><text class="s" x="155" y="275">request A used</text><text class="s" x="300" y="275">unused tail</text><rect class="use" x="415" y="230" width="270" height="80"/><rect class="waste" x="685" y="230" width="90" height="80"/><text class="s" x="500" y="275">request B used</text><rect class="use" x="775" y="230" width="130" height="80"/><rect class="waste" x="905" y="230" width="200" height="80"/><text class="s" x="935" y="275">unused reserved tail</text><text class="h" x="95" y="405">AFTER REQUEST B FREES</text><rect class="use" x="95" y="435" width="190" height="80"/><rect class="waste" x="285" y="435" width="130" height="80"/><rect class="free" x="415" y="435" width="360" height="80"/><text class="s" x="535" y="480">free hole</text><rect class="use" x="775" y="435" width="130" height="80"/><rect class="waste" x="905" y="435" width="200" height="80"/><text class="s" x="95" y="565">cream tails = internal waste · outlined hole = external fragmentation between live allocations</text><text class="s" x="65" y="690">A new contiguous request may not fit even when total free memory is sufficient but split across holes.</text></svg>
