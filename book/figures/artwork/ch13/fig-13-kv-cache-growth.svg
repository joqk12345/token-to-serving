<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc"><title id="title">KV cache grows with active sequence context</title><desc id="desc">Token columns extend to the right across four model-layer rows. Each token contributes key and value state at every layer.</desc><defs><style>.b{fill:#f7f8fa}.p{fill:#fff;stroke:#1f2933;stroke-width:2}.k{fill:#e8eef9;stroke:#355c9a;stroke-width:2}.v{fill:#dcefe5;stroke:#287052;stroke-width:2}.t{font:700 30px Arial;fill:#17212b}.h{font:700 18px Arial;fill:#17212b}.s{font:400 15px Arial;fill:#44515d}</style></defs><rect class="b" width="1200" height="760"/><text class="t" x="65" y="60">KV cache is per-request serving state</text><text class="s" x="65" y="90">Size depends on active context, layers, head structure, dimensions, precision, and layout.</text><rect class="p" x="65" y="135" width="1070" height="500" rx="6"/><text class="h" x="95" y="230">layer 0</text><text class="h" x="95" y="320">layer 1</text><text class="h" x="95" y="410">layer 2</text><text class="h" x="95" y="500">layer 3</text><g><text class="s" x="245" y="180">prompt</text><text class="s" x="580" y="180">generated context grows →</text></g><g id="cells"><rect class="k" x="210" y="200" width="80" height="45"/><rect class="v" x="290" y="200" width="80" height="45"/><rect class="k" x="390" y="200" width="80" height="45"/><rect class="v" x="470" y="200" width="80" height="45"/><rect class="k" x="570" y="200" width="80" height="45"/><rect class="v" x="650" y="200" width="80" height="45"/><rect class="k" x="750" y="200" width="80" height="45"/><rect class="v" x="830" y="200" width="80" height="45"/><rect class="k" x="930" y="200" width="80" height="45"/><rect class="v" x="1010" y="200" width="80" height="45"/></g><use href="#cells" transform="translate(0 90)"/><use href="#cells" transform="translate(0 180)"/><use href="#cells" transform="translate(0 270)"/><text class="s" x="220" y="565">blue K · green V · each new token adds state across all layers</text><text class="s" x="65" y="690">The scheduler must budget persistent KV state for every active request, not only model weights and temporary kernels.</text></svg>
