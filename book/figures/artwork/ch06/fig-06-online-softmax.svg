<?xml version="1.0"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Online softmax merges running statistics</title>
  <desc id="desc">A normalized running output and a new unnormalized block contribution are rescaled to a common maximum and merged exactly.</desc>
  <defs>
    <style>.b{fill:#f7f8fa}.p{fill:#fff;stroke:#1f2933;stroke-width:2}.x{fill:#e8eef9;stroke:#355c9a;stroke-width:2}.y{fill:#fff0d6;stroke:#9a6518;stroke-width:2}.z{fill:#dcefe5;stroke:#287052;stroke-width:2}.r{fill:#f3e8fa;stroke:#70428e;stroke-width:2}.t{font:700 30px Arial;fill:#17212b}.h{font:700 19px Arial;fill:#17212b}.l{font:600 18px Arial;fill:#17212b}.f{font:400 17px Arial;fill:#17212b}.s{font:400 15px Arial;fill:#44515d}.a{stroke:#53616d;stroke-width:3;fill:none;marker-end:url(#m)}</style>
    <marker id="m" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0 0L10 5L0 10z" fill="#53616d"/>
    </marker>
  </defs>
  <rect class="b" width="1200" height="760"/>
  <text class="t" x="65" y="60">Online softmax merges blocks exactly</text>
  <text class="s" x="65" y="90">One row, one merge: O_old is normalized; O_block is an unnormalized weighted-value sum.</text>
  <rect class="p" x="65" y="130" width="1070" height="500" rx="6"/>
  <rect class="x" x="95" y="190" width="285" height="175" rx="6"/>
  <text class="h" x="125" y="228">RUNNING STATE</text>
  <text class="f" x="125" y="275">m_old &#x2014; running maximum</text>
  <text class="f" x="125" y="310">l_old &#x2014; normalization sum</text>
  <text class="f" x="125" y="345">O_old &#x2014; normalized output</text>
  <rect class="y" x="95" y="405" width="285" height="180" rx="6"/>
  <text class="h" x="125" y="443">NEW SCORE BLOCK</text>
  <text class="f" x="125" y="490">m_block &#x2014; block maximum</text>
  <text class="f" x="125" y="525">l_block &#x2014; block sum</text>
  <text class="f" x="125" y="560">O_block &#x2014; unnormalized &#x3A3;e&#x2E2;v</text>
  <path class="a" d="M380 280L470 330M380 495L470 400"/>
  <rect class="z" x="480" y="215" width="400" height="310" rx="6"/>
  <text class="h" x="515" y="255">RESCALE TO A COMMON MAXIMUM</text>
  <text class="f" x="515" y="305">m_new = max(m_old, m_block)</text>
  <text class="f" x="515" y="355">&#x3B1; = exp(m_old &#x2212; m_new)</text>
  <text class="f" x="515" y="395">&#x3B2; = exp(m_block &#x2212; m_new)</text>
  <text class="f" x="515" y="445">l_new = &#x3B1; l_old + &#x3B2; l_block</text>
  <text class="f" x="515" y="490">O_new = (&#x3B1; l_old O_old + &#x3B2; O_block) / l_new</text>
  <path class="a" d="M880 370L930 370"/>
  <rect class="r" x="940" y="275" width="165" height="190" rx="6"/>
  <text class="h" x="975" y="315">MERGED</text>
  <text class="l" x="976" y="360">m_new</text>
  <text class="l" x="982" y="400">l_new</text>
  <text class="l" x="973" y="440">O_new</text>
  <text class="s" x="65" y="690">Rescaling before addition gives the same row-wise softmax result as processing all scores together.</text>
</svg>
