<?xml version="1.0"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">FlashAttention computes exact dense attention with on-chip tiles</title>
  <desc id="desc">Full Q K and V remain in HBM. Q K and V tiles move into SRAM, where score blocks and online softmax update an output tile without storing a full attention matrix.</desc>
  <defs>
    <style>.b{fill:#f7f8fa}.p{fill:#fff;stroke:#1f2933;stroke-width:2}.hbm{fill:#fff0d6;stroke:#9a6518;stroke-width:2}.sram{fill:#dcefe5;stroke:#287052;stroke-width:3}.tile{fill:#e8eef9;stroke:#355c9a;stroke-width:2}.tmp{fill:#f3e8fa;stroke:#70428e;stroke-width:2;stroke-dasharray:7 5}.t{font:700 30px Arial;fill:#17212b}.h{font:700 19px Arial;fill:#17212b}.l{font:600 18px Arial;fill:#17212b}.s{font:400 15px Arial;fill:#44515d}.a{stroke:#53616d;stroke-width:3;fill:none;marker-end:url(#m)}.g{stroke:#287052;stroke-width:3;fill:none;marker-end:url(#n)}</style>
    <marker id="m" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0 0L10 5L0 10z" fill="#53616d"/>
    </marker>
    <marker id="n" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0 0L10 5L0 10z" fill="#287052"/>
    </marker>
  </defs>
  <rect class="b" width="1200" height="760"/>
  <text class="t" x="65" y="60">FlashAttention computes dense attention in tiles</text>
  <text class="s" x="65" y="90">Tiles move through on-chip SRAM; no full N &#xD7; N attention matrix is materialized in HBM.</text>
  <rect class="p" x="65" y="130" width="1070" height="500" rx="6"/>
  <text class="h" x="95" y="170">HBM &#x2014; FULL INPUTS AND FINAL OUTPUT</text>
  <rect class="hbm" x="95" y="205" width="220" height="330" rx="5"/>
  <text class="l" x="190" y="240">Q</text>
  <text class="s" x="125" y="285">Q&#x2081;</text>
  <text class="s" x="125" y="335">Q&#x2082;</text>
  <text class="s" x="125" y="385">Q&#x2083;</text>
  <rect class="tile" x="155" y="310" width="130" height="48" rx="3"/>
  <text class="s" x="190" y="340">Q block i</text>
  <rect class="hbm" x="345" y="205" width="220" height="330" rx="5"/>
  <text class="l" x="400" y="240">K</text>
  <text class="l" x="500" y="240">V</text>
  <text class="s" x="375" y="285">K&#x2081;</text>
  <text class="s" x="475" y="285">V&#x2081;</text>
  <text class="s" x="375" y="335">K&#x2082;</text>
  <text class="s" x="475" y="335">V&#x2082;</text>
  <rect class="tile" x="365" y="360" width="80" height="48" rx="3"/>
  <rect class="tile" x="465" y="360" width="80" height="48" rx="3"/>
  <text class="s" x="378" y="390">K block j</text>
  <text class="s" x="478" y="390">V block j</text>
  <rect class="sram" x="645" y="205" width="350" height="330" rx="6"/>
  <text class="h" x="750" y="240">ON-CHIP SRAM</text>
  <rect class="tile" x="685" y="275" width="125" height="65" rx="5"/>
  <text class="l" x="705" y="315">Q block i</text>
  <rect class="tile" x="835" y="275" width="125" height="65" rx="5"/>
  <text class="l" x="850" y="305">K/V block j</text>
  <text class="s" x="875" y="328">tile loop</text>
  <rect class="tmp" x="720" y="385" width="220" height="80" rx="5"/>
  <text class="l" x="755" y="418">score block +</text>
  <text class="s" x="755" y="445">online softmax update</text>
  <path class="a" d="M750 340L785 385M895 340L870 385M285 334C460 150 585 280 685 300M545 384C600 384 610 320 645 320"/>
  <path class="g" d="M940 425C1020 425 1020 300 960 300"/>
  <text class="s" x="970" y="375">next j</text>
  <rect class="hbm" x="1040" y="280" width="65" height="170" rx="5"/>
  <text class="l" x="1062" y="325">O</text>
  <text class="s" x="1053" y="355">output</text>
  <text class="s" x="1055" y="378">block i</text>
  <path class="a" d="M995 465L1040 410"/>
  <text class="s" x="65" y="690">Every Q block still interacts with every K/V block: the attention computation remains exact and dense.</text>
</svg>
