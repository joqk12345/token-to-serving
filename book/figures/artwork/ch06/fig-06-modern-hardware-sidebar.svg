<?xml version="1.0"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">FlashAttention evolves with the active hardware bottleneck</title>
  <desc id="desc">FA2 responds to work partitioning, FA3 targets Hopper asynchrony and low precision, and FA4 responds to asymmetric scaling in Blackwell-era hardware.</desc>
  <defs>
    <style>.b{fill:#f7f8fa}.p{fill:#fff;stroke:#1f2933;stroke-width:2}.x{fill:#e8eef9;stroke:#355c9a;stroke-width:2}.y{fill:#dcefe5;stroke:#287052;stroke-width:2}.z{fill:#f3e8fa;stroke:#70428e;stroke-width:2}.t{font:700 30px Arial;fill:#17212b}.h{font:700 22px Arial;fill:#17212b}.l{font:600 18px Arial;fill:#17212b}.s{font:400 15px Arial;fill:#44515d}.c{font:700 14px Arial;fill:#53616d}.a{stroke:#53616d;stroke-width:4;fill:none;marker-end:url(#m)}</style>
    <marker id="m" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0 0L10 5L0 10z" fill="#53616d"/>
    </marker>
  </defs>
  <rect class="b" width="1200" height="760"/>
  <text class="t" x="65" y="60">FlashAttention follows the hardware bottleneck</text>
  <text class="s" x="65" y="90">Later versions preserve IO-aware exact attention while responding to a different active bottleneck.</text>
  <rect class="p" x="65" y="135" width="1070" height="480" rx="6"/>
  <path class="a" d="M180 245L1015 245"/>
  <circle cx="285" cy="245" r="15" fill="#355c9a"/>
  <circle cx="600" cy="245" r="15" fill="#287052"/>
  <circle cx="915" cy="245" r="15" fill="#70428e"/>
  <rect class="x" x="145" y="300" width="280" height="245" rx="6"/>
  <text class="h" x="255" y="340">FA2</text>
  <text class="c" x="180" y="380">ACTIVE BOTTLENECK</text>
  <text class="l" x="180" y="410">Work partitioning</text>
  <text class="s" x="180" y="435">and parallelism</text>
  <text class="c" x="180" y="480">DESIGN RESPONSE</text>
  <text class="s" x="180" y="510">Repartition work to improve</text>
  <text class="s" x="180" y="533">parallel execution and efficiency.</text>
  <rect class="y" x="460" y="300" width="280" height="245" rx="6"/>
  <text class="h" x="570" y="340">FA3</text>
  <text class="c" x="495" y="380">ACTIVE BOTTLENECK</text>
  <text class="l" x="495" y="410">Hopper execution</text>
  <text class="s" x="495" y="435">asynchrony and low precision</text>
  <text class="c" x="495" y="480">DESIGN RESPONSE</text>
  <text class="s" x="495" y="510">Overlap work and target</text>
  <text class="s" x="495" y="533">Hopper-era FP8 capabilities.</text>
  <rect class="z" x="775" y="300" width="280" height="245" rx="6"/>
  <text class="h" x="885" y="340">FA4</text>
  <text class="c" x="810" y="380">ACTIVE BOTTLENECK</text>
  <text class="l" x="810" y="410">Asymmetric scaling</text>
  <text class="s" x="810" y="435">in Blackwell-era hardware</text>
  <text class="c" x="810" y="480">DESIGN RESPONSE</text>
  <text class="s" x="810" y="510">Restructure pipelining around</text>
  <text class="s" x="810" y="533">uneven resource improvements.</text>
  <text class="s" x="65" y="680">Mechanism timeline, not a benchmark comparison; no universal speedup is implied.</text>
</svg>
