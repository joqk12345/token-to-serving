<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Causal attention mask blocking future token positions</title>
  <desc id="desc">A five-by-five attention matrix shows each query position allowed to attend to itself and earlier keys, while all future key positions in the upper triangle are masked before softmax.</desc>
  <defs><style>.bg{fill:#f7f8fa}.panel{fill:#fff;stroke:#1f2933;stroke-width:2}.allowed{fill:#dcefe5;stroke:#fff;stroke-width:2}.masked{fill:#ece8f3;stroke:#fff;stroke-width:2}.title{font:700 30px Arial,sans-serif;fill:#17212b}.section{font:700 20px Arial,sans-serif;fill:#17212b}.label{font:600 18px Arial,sans-serif;fill:#17212b}.small{font:400 15px Arial,sans-serif;fill:#44515d}.cell{font:700 18px Arial,sans-serif;fill:#44515d}.arrow{stroke:#53616d;stroke-width:3;fill:none;marker-end:url(#arrow)}</style><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#53616d"/></marker></defs>
  <rect class="bg" width="1200" height="760"/><text class="title" x="65" y="62">The causal mask prevents attention from looking right</text><text class="small" x="65" y="91">Masking is applied to attention scores before softmax.</text>
  <text class="section" x="372" y="140">KEY POSITION (information read from)</text><text class="section" transform="translate(98 490) rotate(-90)">QUERY POSITION</text>
  <g class="label"><text x="312" y="180">1</text><text x="392" y="180">2</text><text x="472" y="180">3</text><text x="552" y="180">4</text><text x="632" y="180">5</text><text x="225" y="232">1</text><text x="225" y="312">2</text><text x="225" y="392">3</text><text x="225" y="472">4</text><text x="225" y="552">5</text></g>
  <g>
    <rect class="allowed" x="270" y="190" width="80" height="80"/><rect class="masked" x="350" y="190" width="80" height="80"/><rect class="masked" x="430" y="190" width="80" height="80"/><rect class="masked" x="510" y="190" width="80" height="80"/><rect class="masked" x="590" y="190" width="80" height="80"/>
    <rect class="allowed" x="270" y="270" width="80" height="80"/><rect class="allowed" x="350" y="270" width="80" height="80"/><rect class="masked" x="430" y="270" width="80" height="80"/><rect class="masked" x="510" y="270" width="80" height="80"/><rect class="masked" x="590" y="270" width="80" height="80"/>
    <rect class="allowed" x="270" y="350" width="80" height="80"/><rect class="allowed" x="350" y="350" width="80" height="80"/><rect class="allowed" x="430" y="350" width="80" height="80"/><rect class="masked" x="510" y="350" width="80" height="80"/><rect class="masked" x="590" y="350" width="80" height="80"/>
    <rect class="allowed" x="270" y="430" width="80" height="80"/><rect class="allowed" x="350" y="430" width="80" height="80"/><rect class="allowed" x="430" y="430" width="80" height="80"/><rect class="allowed" x="510" y="430" width="80" height="80"/><rect class="masked" x="590" y="430" width="80" height="80"/>
    <rect class="allowed" x="270" y="510" width="80" height="80"/><rect class="allowed" x="350" y="510" width="80" height="80"/><rect class="allowed" x="430" y="510" width="80" height="80"/><rect class="allowed" x="510" y="510" width="80" height="80"/><rect class="allowed" x="590" y="510" width="80" height="80"/>
  </g>
  <g class="cell"><text x="301" y="239">OK</text><text x="382" y="239">X</text><text x="462" y="239">X</text><text x="542" y="239">X</text><text x="622" y="239">X</text><text x="301" y="319">OK</text><text x="381" y="319">OK</text><text x="462" y="319">X</text><text x="542" y="319">X</text><text x="622" y="319">X</text><text x="301" y="399">OK</text><text x="381" y="399">OK</text><text x="461" y="399">OK</text><text x="542" y="399">X</text><text x="622" y="399">X</text><text x="301" y="479">OK</text><text x="381" y="479">OK</text><text x="461" y="479">OK</text><text x="541" y="479">OK</text><text x="622" y="479">X</text><text x="301" y="559">OK</text><text x="381" y="559">OK</text><text x="461" y="559">OK</text><text x="541" y="559">OK</text><text x="621" y="559">OK</text></g>
  <rect class="panel" x="750" y="190" width="385" height="400" rx="6"/><text class="section" x="785" y="235">AT QUERY POSITION 3</text><rect class="allowed" x="785" y="270" width="55" height="55"/><text class="label" x="804" y="304">1</text><rect class="allowed" x="850" y="270" width="55" height="55"/><text class="label" x="869" y="304">2</text><rect class="allowed" x="915" y="270" width="55" height="55"/><text class="label" x="934" y="304">3</text><rect class="masked" x="980" y="270" width="55" height="55"/><text class="label" x="999" y="304">4</text><rect class="masked" x="1045" y="270" width="55" height="55"/><text class="label" x="1064" y="304">5</text>
  <text class="small" x="785" y="355">positions 1-3: score remains</text><text class="small" x="785" y="385">positions 4-5: score becomes -infinity</text><path class="arrow" d="M940 415 L940 465"/><text class="section" x="845" y="505">SOFTMAX</text><text class="small" x="785" y="540">future positions receive zero probability</text>
  <rect class="allowed" x="270" y="630" width="30" height="30"/><text class="small" x="310" y="651">allowed: self or earlier position</text><rect class="masked" x="565" y="630" width="30" height="30"/><text class="small" x="605" y="651">masked: future position</text>
  <text class="small" x="65" y="710">For query t, only key positions less than or equal to t can contribute.</text>
</svg>
