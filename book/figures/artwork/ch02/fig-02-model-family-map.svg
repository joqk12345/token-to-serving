<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Comparison of encoder-only, encoder-decoder, and decoder-only Transformer families</title>
  <desc id="desc">Three columns compare information flow, training objective, and typical use for encoder-only, encoder-decoder, and decoder-only Transformer architectures.</desc>
  <defs><style>.bg{fill:#f7f8fa}.panel{fill:#fff;stroke:#1f2933;stroke-width:2}.enc{fill:#e8eef9;stroke:#355c9a;stroke-width:2}.cross{fill:#fff0d6;stroke:#9a6518;stroke-width:2}.dec{fill:#dcefe5;stroke:#287052;stroke-width:2}.title{font:700 30px Arial,sans-serif;fill:#17212b}.section{font:700 20px Arial,sans-serif;fill:#17212b}.label{font:600 18px Arial,sans-serif;fill:#17212b}.small{font:400 15px Arial,sans-serif;fill:#44515d}.arrow{stroke:#53616d;stroke-width:3;fill:none;marker-end:url(#arrow)}.bi{stroke:#355c9a;stroke-width:3;fill:none;marker-start:url(#back);marker-end:url(#blue)}</style><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#53616d"/></marker><marker id="blue" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#355c9a"/></marker><marker id="back" markerWidth="10" markerHeight="10" refX="2" refY="5" orient="auto"><path d="M10,0 L0,5 L10,10 z" fill="#355c9a"/></marker></defs>
  <rect class="bg" width="1200" height="760"/><text class="title" x="65" y="62">Transformer families differ in how information can flow</text><text class="small" x="65" y="91">The architecture determines what context is visible and whether a separate output sequence is generated.</text>
  <rect class="panel" x="65" y="125" width="335" height="540" rx="6"/><rect class="enc" x="65" y="125" width="335" height="70" rx="6"/><text class="section" x="158" y="169">ENCODER-ONLY</text>
  <text class="label" x="95" y="235">Information flow</text><rect class="enc" x="100" y="265" width="55" height="50" rx="4"/><rect class="enc" x="175" y="265" width="55" height="50" rx="4"/><rect class="enc" x="250" y="265" width="55" height="50" rx="4"/><rect class="enc" x="325" y="265" width="45" height="50" rx="4"/><path class="bi" d="M145 340 L335 340"/><text class="small" x="106" y="296">x1</text><text class="small" x="181" y="296">x2</text><text class="small" x="256" y="296">x3</text><text class="small" x="331" y="296">x4</text><text class="small" x="112" y="375">bidirectional context</text>
  <text class="label" x="95" y="425">Training objective</text><text class="small" x="95" y="455">masked-token prediction</text><text class="label" x="95" y="505">Typical role</text><text class="small" x="95" y="535">sequence understanding</text><text class="label" x="95" y="585">Example</text><text class="small" x="95" y="615">BERT-style encoder</text>
  <rect class="panel" x="432" y="125" width="335" height="540" rx="6"/><rect class="cross" x="432" y="125" width="335" height="70" rx="6"/><text class="section" x="492" y="169">ENCODER-DECODER</text>
  <text class="label" x="462" y="235">Information flow</text><text class="small" x="500" y="260">source x</text><rect class="enc" x="470" y="275" width="115" height="65" rx="4"/><text class="label" x="489" y="314">Encoder</text><rect class="dec" x="615" y="275" width="115" height="65" rx="4"/><text class="label" x="634" y="314">Decoder</text><path class="arrow" d="M585 307 L606 307"/><path class="arrow" d="M672 340 L672 365"/><text class="small" x="645" y="388">target y</text>
  <text class="label" x="462" y="425">Training objective</text><text class="small" x="462" y="455">conditional next-token prediction</text><text class="label" x="462" y="505">Typical role</text><text class="small" x="462" y="535">source-to-target generation</text><text class="label" x="462" y="585">Example</text><text class="small" x="462" y="615">T5 text-to-text</text>
  <rect class="panel" x="799" y="125" width="336" height="540" rx="6"/><rect class="dec" x="799" y="125" width="336" height="70" rx="6"/><text class="section" x="889" y="169">DECODER-ONLY</text>
  <text class="label" x="829" y="235">Information flow</text><rect class="dec" x="835" y="265" width="55" height="50" rx="4"/><rect class="dec" x="910" y="265" width="55" height="50" rx="4"/><rect class="dec" x="985" y="265" width="55" height="50" rx="4"/><rect class="dec" x="1060" y="265" width="45" height="50" rx="4"/><path class="arrow" d="M862 340 L1080 340"/><text class="small" x="841" y="296">t1</text><text class="small" x="916" y="296">t2</text><text class="small" x="991" y="296">t3</text><text class="small" x="1066" y="296">t4</text><text class="small" x="848" y="375">causal, left-to-right context</text>
  <text class="label" x="829" y="425">Training objective</text><text class="small" x="829" y="455">autoregressive next-token prediction</text><text class="label" x="829" y="505">Typical role</text><text class="small" x="829" y="535">continuation and generation</text><text class="label" x="829" y="585">Example</text><text class="small" x="829" y="615">LLaMA-style decoder</text>
  <text class="small" x="65" y="710">These are architectural families, not quality rankings; each imposes a different conditioning pattern.</text>
</svg>
