<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc"><title id="title">An MoE router selects expert FFN paths per token</title><desc id="desc">Four token representations enter a router. Colored routing arrows send them to selected expert FFNs. Expert outputs return to a combine step that restores sequence order.</desc><defs><style>.b{fill:#f7f8fa}.p{fill:#fff;stroke:#1f2933;stroke-width:2}.tok{fill:#e8eef9;stroke:#355c9a;stroke-width:2}.r{fill:#f3e8fa;stroke:#70428e;stroke-width:2}.e{fill:#dcefe5;stroke:#287052;stroke-width:2}.c{fill:#fff0d6;stroke:#9a6518;stroke-width:2}.t{font:700 30px Arial;fill:#17212b}.h{font:700 18px Arial;fill:#17212b}.s{font:400 15px Arial;fill:#44515d}.a{stroke:#53616d;stroke-width:3;fill:none;marker-end:url(#m)}</style><marker id="m" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0L10 5L0 10z" fill="#53616d"/></marker></defs><rect class="b" width="1200" height="760"/><text class="t" x="65" y="60">MoE routing converts tokens into conditional FFN work</text><text class="s" x="65" y="90">Mechanism only: no quality or universal sparse-efficiency claim is implied.</text><rect class="p" x="65" y="135" width="1070" height="500" rx="6"/><text class="h" x="95" y="190">TOKEN REPRESENTATIONS</text><rect class="tok" x="105" y="230" width="110" height="55" rx="4"/><text class="h" x="145" y="265">t₀</text><rect class="tok" x="105" y="310" width="110" height="55" rx="4"/><text class="h" x="145" y="345">t₁</text><rect class="tok" x="105" y="390" width="110" height="55" rx="4"/><text class="h" x="145" y="425">t₂</text><rect class="tok" x="105" y="470" width="110" height="55" rx="4"/><text class="h" x="145" y="505">t₃</text><path class="a" d="M215 257L330 330M215 337L330 345M215 417L330 365M215 497L330 385"/><rect class="r" x="340" y="285" width="170" height="145" rx="6"/><text class="h" x="390" y="325">ROUTER</text><text class="s" x="375" y="365">score experts</text><text class="s" x="370" y="395">select path(s)</text><path class="a" d="M510 335L620 245M510 355L620 355M510 380L620 475"/><rect class="e" x="630" y="205" width="190" height="90" rx="6"/><text class="h" x="680" y="245">EXPERT 0</text><text class="s" x="690" y="272">expert FFN</text><rect class="e" x="630" y="320" width="190" height="90" rx="6"/><text class="h" x="680" y="360">EXPERT 1</text><text class="s" x="690" y="387">expert FFN</text><rect class="e" x="630" y="435" width="190" height="90" rx="6"/><text class="h" x="680" y="475">EXPERT 2</text><text class="s" x="690" y="502">expert FFN</text><path class="a" d="M820 250L910 335M820 365L910 365M820 480L910 395"/><rect class="c" x="920" y="305" width="170" height="120" rx="6"/><text class="h" x="960" y="345">COMBINE</text><text class="s" x="950" y="380">restore token order</text><text class="s" x="960" y="405">merge outputs</text><text class="s" x="65" y="690">The router is both a learned model component and a scheduler for token work across expert paths.</text></svg>
