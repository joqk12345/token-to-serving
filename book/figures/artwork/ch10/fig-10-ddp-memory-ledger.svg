<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc"><title id="title">A DDP worker stores more than model weights</title><desc id="desc">A qualitative stacked memory ledger contains model parameters, gradients, optimizer state and precision copies, activations, communication and temporary buffers, and fragmentation. Parameters are only one part of training memory.</desc><defs><style>.b{fill:#f7f8fa}.p{fill:#fff;stroke:#1f2933;stroke-width:2}.a{fill:#e8eef9;stroke:#355c9a;stroke-width:2}.g{fill:#dcefe5;stroke:#287052;stroke-width:2}.o{fill:#fff0d6;stroke:#9a6518;stroke-width:2}.v{fill:#f3e8fa;stroke:#70428e;stroke-width:2}.t{font:700 30px Arial;fill:#17212b}.h{font:700 18px Arial;fill:#17212b}.s{font:400 15px Arial;fill:#44515d}</style></defs><rect class="b" width="1200" height="760"/><text class="t" x="65" y="60">Training fit requires a full per-worker memory ledger</text><text class="s" x="65" y="90">Qualitative DDP view; byte totals require model, optimizer, precision, batch, sequence, and implementation assumptions.</text><rect class="p" x="65" y="135" width="1070" height="500" rx="6"/><text class="h" x="125" y="185">ONE REPLICATED DDP WORKER</text><rect class="a" x="155" y="215" width="500" height="65"/><text class="h" x="320" y="255">MODEL PARAMETERS</text><rect class="g" x="155" y="280" width="500" height="65"/><text class="h" x="345" y="320">GRADIENTS</text><rect class="o" x="155" y="345" width="500" height="100"/><text class="h" x="295" y="385">OPTIMIZER STATE</text><text class="s" x="285" y="417">momentum · variance · precision copies</text><rect class="v" x="155" y="445" width="500" height="75"/><text class="h" x="335" y="488">ACTIVATIONS</text><rect class="a" x="155" y="520" width="500" height="55"/><text class="h" x="250" y="555">COMMUNICATION + TEMP BUFFERS</text><rect class="p" x="735" y="230" width="330" height="290" rx="6"/><text class="h" x="785" y="275">ALSO AFFECTS FIT</text><text class="s" x="785" y="320">allocator fragmentation</text><text class="s" x="785" y="360">workspace peaks</text><text class="s" x="785" y="400">bucket and flatten buffers</text><text class="s" x="785" y="440">activation lifetime</text><text class="s" x="785" y="480">temporary collectives</text><text class="s" x="65" y="690">“N parameters” is not a training-memory estimate; persistent state, activations, transient buffers, and fragmentation also matter.</text></svg>
