<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc"><title id="title">Router skew changes expert utilization</title><desc id="desc">A skewed panel routes most illustrative tokens to expert zero, overloading it while experts two and three are underused. A controlled-load panel spreads work more broadly while stating that perfectly uniform routing is not necessarily the modeling objective.</desc><defs><style>.b{fill:#f7f8fa}.p{fill:#fff;stroke:#1f2933;stroke-width:2}.hot{fill:#fff0d6;stroke:#9a6518;stroke-width:2}.cool{fill:#e8eef9;stroke:#355c9a;stroke-width:2}.bal{fill:#dcefe5;stroke:#287052;stroke-width:2}.t{font:700 30px Arial;fill:#17212b}.h{font:700 18px Arial;fill:#17212b}.s{font:400 15px Arial;fill:#44515d}</style></defs><rect class="b" width="1200" height="760"/><text class="t" x="65" y="60">Router load determines expert-device pressure</text><text class="s" x="65" y="90">Illustrative token counts; perfectly uniform routing is not asserted as the universal modeling target.</text><rect class="p" x="65" y="135" width="510" height="500" rx="6"/><text class="h" x="95" y="180">SKEWED ROUTING</text><text class="s" x="95" y="210">one expert receives most token work</text><rect class="hot" x="125" y="250" width="300" height="70" rx="4"/><text class="h" x="145" y="292">expert 0 · many tokens · queue</text><rect class="cool" x="125" y="345" width="140" height="70" rx="4"/><text class="h" x="145" y="387">expert 1</text><rect class="cool" x="125" y="440" width="70" height="70" rx="4"/><text class="s" x="140" y="482">E2</text><rect class="cool" x="125" y="535" width="45" height="45" rx="4"/><text class="s" x="135" y="563">E3</text><text class="s" x="320" y="390">underused capacity</text><text class="s" x="320" y="475">idle or lightly loaded</text>
<rect class="p" x="625" y="135" width="510" height="500" rx="6"/><text class="h" x="655" y="180">CONTROLLED LOAD</text><text class="s" x="655" y="210">router regularization and capacity policy</text><rect class="bal" x="685" y="250" width="280" height="65" rx="4"/><text class="h" x="705" y="290">expert 0 · bounded load</text><rect class="bal" x="685" y="335" width="240" height="65" rx="4"/><text class="h" x="705" y="375">expert 1 · active</text><rect class="bal" x="685" y="420" width="265" height="65" rx="4"/><text class="h" x="705" y="460">expert 2 · active</text><rect class="bal" x="685" y="505" width="220" height="65" rx="4"/><text class="h" x="705" y="545">expert 3 · active</text><text class="s" x="980" y="330">goal:</text><text class="s" x="980" y="360">avoid collapse</text><text class="s" x="980" y="390">and overload</text><text class="s" x="65" y="690">Load balancing is a systems and optimization constraint: routing affects queueing, device utilization, communication, and learning behavior.</text></svg>
