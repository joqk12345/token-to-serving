<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc"><title id="title">ZeRO-3 schedules parameter residency around layer use</title><desc id="desc">A timeline starts with parameter shards resident on four workers. Before a layer runs, shards are gathered to make the layer parameters available. Forward or backward computes, then unowned full parameters are released and workers return to shard residency.</desc><defs><style>.b{fill:#f7f8fa}.p{fill:#fff;stroke:#1f2933;stroke-width:2}.sh{fill:#e8eef9;stroke:#355c9a;stroke-width:2}.g{fill:#f3e8fa;stroke:#70428e;stroke-width:2}.c{fill:#dcefe5;stroke:#287052;stroke-width:2}.r{fill:#fff0d6;stroke:#9a6518;stroke-width:2}.t{font:700 30px Arial;fill:#17212b}.h{font:700 18px Arial;fill:#17212b}.s{font:400 15px Arial;fill:#44515d}.a{stroke:#53616d;stroke-width:3;fill:none;marker-end:url(#m)}</style><marker id="m" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0L10 5L0 10z" fill="#53616d"/></marker></defs><rect class="b" width="1200" height="760"/><text class="t" x="65" y="60">ZeRO-3 turns parameter residency into a schedule</text><text class="s" x="65" y="90">Parameter gathering reduces permanent residency but adds communication and coordination around layer execution.</text><rect class="p" x="65" y="135" width="1070" height="500" rx="6"/><rect class="sh" x="95" y="265" width="200" height="180" rx="6"/><text class="h" x="130" y="305">BETWEEN USES</text><text class="s" x="130" y="345">worker 0: shard 0</text><text class="s" x="130" y="375">worker 1: shard 1</text><text class="s" x="130" y="405">worker 2/3: shards</text><path class="a" d="M295 355L375 355"/><rect class="g" x="385" y="285" width="170" height="140" rx="6"/><text class="h" x="420" y="325">ALL-GATHER</text><text class="s" x="415" y="365">make layer θ</text><text class="s" x="420" y="395">temporarily available</text><path class="a" d="M555 355L635 355"/><rect class="c" x="645" y="285" width="170" height="140" rx="6"/><text class="h" x="690" y="325">COMPUTE</text><text class="s" x="680" y="365">forward or backward</text><text class="s" x="685" y="395">for current layer</text><path class="a" d="M815 355L895 355"/><rect class="r" x="905" y="285" width="170" height="140" rx="6"/><text class="h" x="945" y="325">RELEASE</text><text class="s" x="935" y="365">drop unowned full θ</text><text class="s" x="935" y="395">retain local shard</text><path class="a" d="M990 425C990 540 195 540 195 445"/><text class="s" x="520" y="565">repeat for the next layer and during backward</text><text class="s" x="65" y="690">The runtime must prefetch, gather, compute, and release at the right time; gathering is part of the critical design tradeoff.</text></svg>
