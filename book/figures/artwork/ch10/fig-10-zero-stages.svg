<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc"><title id="title">ZeRO stages progressively partition training state</title><desc id="desc">Four rows compare DDP, ZeRO-1, ZeRO-2, and ZeRO-3 across optimizer state, gradients, and parameters. DDP replicates all three; stage one shards optimizer state, stage two also shards gradients, and stage three also shards parameters.</desc><defs><style>.b{fill:#f7f8fa}.p{fill:#fff;stroke:#1f2933;stroke-width:2}.rep{fill:#e8eef9;stroke:#355c9a;stroke-width:2}.sh{fill:#dcefe5;stroke:#287052;stroke-width:2}.t{font:700 30px Arial;fill:#17212b}.h{font:700 17px Arial;fill:#17212b}.s{font:400 15px Arial;fill:#44515d}</style></defs><rect class="b" width="1200" height="760"/><text class="t" x="65" y="60">ZeRO changes ownership of persistent training state</text><text class="s" x="65" y="90">Stage numbers describe algorithm structure, not a guaranteed performance ranking.</text><rect class="p" x="65" y="135" width="1070" height="500" rx="6"/><text class="h" x="95" y="190">SCHEME</text><text class="h" x="310" y="190">OPTIMIZER STATE</text><text class="h" x="610" y="190">GRADIENTS</text><text class="h" x="875" y="190">PARAMETERS</text>
<text class="h" x="95" y="270">DDP</text><rect class="rep" x="285" y="230" width="220" height="60" rx="4"/><text class="h" x="350" y="267">replicated</text><rect class="rep" x="570" y="230" width="220" height="60" rx="4"/><text class="h" x="635" y="267">replicated</text><rect class="rep" x="855" y="230" width="220" height="60" rx="4"/><text class="h" x="920" y="267">replicated</text>
<text class="h" x="95" y="365">ZeRO-1</text><rect class="sh" x="285" y="325" width="220" height="60" rx="4"/><text class="h" x="360" y="362">sharded</text><rect class="rep" x="570" y="325" width="220" height="60" rx="4"/><text class="h" x="635" y="362">replicated</text><rect class="rep" x="855" y="325" width="220" height="60" rx="4"/><text class="h" x="920" y="362">replicated</text>
<text class="h" x="95" y="460">ZeRO-2</text><rect class="sh" x="285" y="420" width="220" height="60" rx="4"/><text class="h" x="360" y="457">sharded</text><rect class="sh" x="570" y="420" width="220" height="60" rx="4"/><text class="h" x="645" y="457">sharded</text><rect class="rep" x="855" y="420" width="220" height="60" rx="4"/><text class="h" x="920" y="457">replicated</text>
<text class="h" x="95" y="555">ZeRO-3</text><rect class="sh" x="285" y="515" width="220" height="60" rx="4"/><text class="h" x="360" y="552">sharded</text><rect class="sh" x="570" y="515" width="220" height="60" rx="4"/><text class="h" x="645" y="552">sharded</text><rect class="sh" x="855" y="515" width="220" height="60" rx="4"/><text class="h" x="930" y="552">sharded</text><text class="s" x="65" y="690">Deeper partitioning reduces permanent replication but changes communication, availability, and lifetime of training state.</text></svg>
