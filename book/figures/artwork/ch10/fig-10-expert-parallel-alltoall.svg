<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc"><title id="title">Expert parallelism uses all-to-all dispatch and return</title><desc id="desc">Tokens begin on two source devices, pass through an all-to-all dispatch based on router assignments, run on expert-owning devices, and return through a second all-to-all to their source sequence positions.</desc><defs><style>.b{fill:#f7f8fa}.p{fill:#fff;stroke:#1f2933;stroke-width:2}.d{fill:#e8eef9;stroke:#355c9a;stroke-width:2}.a2a{fill:#f3e8fa;stroke:#70428e;stroke-width:2}.e{fill:#dcefe5;stroke:#287052;stroke-width:2}.t{font:700 30px Arial;fill:#17212b}.h{font:700 17px Arial;fill:#17212b}.s{font:400 15px Arial;fill:#44515d}.a{stroke:#53616d;stroke-width:3;fill:none;marker-end:url(#m)}</style><marker id="m" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0L10 5L0 10z" fill="#53616d"/></marker></defs><rect class="b" width="1200" height="760"/><text class="t" x="65" y="60">Expert parallelism moves token representations twice</text><text class="s" x="65" y="90">Communication volume and destinations depend on the batch's router assignments.</text><rect class="p" x="65" y="135" width="1070" height="500" rx="6"/><text class="h" x="95" y="185">SOURCE DEVICES</text><rect class="d" x="95" y="240" width="155" height="95" rx="5"/><text class="h" x="125" y="280">device A tokens</text><text class="s" x="125" y="310">a₀ · a₁ · a₂</text><rect class="d" x="95" y="410" width="155" height="95" rx="5"/><text class="h" x="125" y="450">device B tokens</text><text class="s" x="125" y="480">b₀ · b₁ · b₂</text><path class="a" d="M250 287L340 345M250 457L340 385"/><rect class="a2a" x="350" y="300" width="155" height="125" rx="60"/><text class="h" x="385" y="345">ALL-TO-ALL</text><text class="s" x="392" y="375">dispatch</text><text class="s" x="380" y="400">by expert owner</text><path class="a" d="M505 350L590 275M505 385L590 465"/><rect class="e" x="600" y="220" width="170" height="110" rx="6"/><text class="h" x="635" y="260">EXPERT DEVICE 0</text><text class="s" x="635" y="292">experts 0 · 1</text><rect class="e" x="600" y="410" width="170" height="110" rx="6"/><text class="h" x="635" y="450">EXPERT DEVICE 1</text><text class="s" x="635" y="482">experts 2 · 3</text><path class="a" d="M770 275L850 350M770 465L850 385"/><rect class="a2a" x="860" y="300" width="155" height="125" rx="60"/><text class="h" x="895" y="345">ALL-TO-ALL</text><text class="s" x="910" y="375">return</text><text class="s" x="890" y="400">to source order</text><path class="a" d="M1015 363L1090 363"/><text class="h" x="1040" y="340">outputs</text><text class="s" x="65" y="690">Sparse expert activation becomes a data-dependent token-exchange schedule; dispatch and return are both part of the layer.</text></svg>
