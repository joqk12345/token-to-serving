<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="2400" viewBox="0 0 1600 2400" role="img" aria-labelledby="title desc">
  <title id="title">Large Language Model Systems book cover</title>
  <desc id="desc">A professional technical nonfiction book cover with precise typography and an abstract systems diagram motif.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1117"/>
      <stop offset=".58" stop-color="#111827"/>
      <stop offset="1" stop-color="#18212b"/>
    </linearGradient>
    <linearGradient id="mesh" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7dd3fc" stop-opacity=".92"/>
      <stop offset=".52" stop-color="#c4b5fd" stop-opacity=".82"/>
      <stop offset="1" stop-color="#f2c078" stop-opacity=".92"/>
    </linearGradient>
    <radialGradient id="halo" cx=".62" cy=".42" r=".72">
      <stop offset="0" stop-color="#2dd4bf" stop-opacity=".22"/>
      <stop offset=".36" stop-color="#60a5fa" stop-opacity=".12"/>
      <stop offset="1" stop-color="#0b1117" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
    <style>
      .paper{fill:url(#bg)}
      .halo{fill:url(#halo)}
      .cream{fill:#f8fafc}
      .muted{fill:#a8b3c1}
      .quiet{fill:#7d8a99}
      .rule{stroke:#f2c078;stroke-width:6}
      .hair{stroke:#526071;stroke-width:2;fill:none}
      .mesh{stroke:url(#mesh);stroke-width:5;fill:none;stroke-linecap:round;stroke-linejoin:round}
      .mesh2{stroke:#7dd3fc;stroke-width:3;fill:none;stroke-opacity:.36}
      .node{fill:#f8fafc}
      .nodeA{fill:#7dd3fc}
      .nodeB{fill:#f2c078}
      .titleText{font:700 118px Arial, Helvetica, sans-serif;letter-spacing:-2px;fill:#f8fafc}
      .subtitleText{font:400 42px Arial, Helvetica, sans-serif;fill:#cbd5e1}
      .eyebrow{font:700 24px Arial, Helvetica, sans-serif;letter-spacing:4px;fill:#f2c078}
      .author{font:700 34px Arial, Helvetica, sans-serif;letter-spacing:3px;fill:#f8fafc}
      .small{font:400 22px Arial, Helvetica, sans-serif;fill:#a8b3c1}
      .mono{font:400 22px Menlo, Consolas, monospace;fill:#cbd5e1}
    </style>
  </defs>

  <rect class="paper" width="1600" height="2400"/>
  <rect class="halo" x="0" y="0" width="1600" height="2400"/>

  <g opacity=".23">
    <path class="hair" d="M290 250V2040M430 250V2040M570 250V2040M710 250V2040M850 250V2040M990 250V2040M1130 250V2040M1270 250V2040"/>
    <path class="hair" d="M170 470H1430M170 610H1430M170 750H1430M170 890H1430M170 1030H1430M170 1170H1430M170 1310H1430M170 1450H1430M170 1590H1430M170 1730H1430"/>
  </g>

  <path class="rule" d="M124 216V2190"/>

  <text class="eyebrow" x="196" y="300">TECHNICAL SYSTEMS</text>
  <text class="titleText" x="190" y="500">Large Language</text>
  <text class="titleText" x="190" y="635">Model Systems</text>
  <text class="subtitleText" x="196" y="735">From Tokens to Serving Infrastructure</text>

  <g transform="translate(190 925)">
    <path class="mesh2" d="M80 430C210 250 360 525 500 350S720 135 900 300S1060 500 1185 275"/>
    <path class="mesh2" d="M95 690C270 520 430 780 610 605S870 395 1040 560S1130 710 1220 610"/>
    <path class="mesh" d="M80 550C205 465 320 470 430 535S650 675 795 555S1040 290 1215 390"/>
    <path class="mesh" d="M120 300C280 405 410 255 560 360S770 565 930 430S1110 205 1235 265"/>

    <g filter="url(#soft)" opacity=".42">
      <circle class="nodeA" cx="430" cy="535" r="34"/>
      <circle class="nodeB" cx="795" cy="555" r="38"/>
      <circle class="nodeA" cx="930" cy="430" r="32"/>
    </g>

    <circle class="nodeA" cx="80" cy="550" r="13"/>
    <circle class="node" cx="210" cy="475" r="9"/>
    <circle class="node" cx="320" cy="470" r="9"/>
    <circle class="nodeA" cx="430" cy="535" r="15"/>
    <circle class="node" cx="650" cy="675" r="10"/>
    <circle class="nodeB" cx="795" cy="555" r="16"/>
    <circle class="node" cx="1040" cy="290" r="10"/>
    <circle class="nodeB" cx="1215" cy="390" r="14"/>

    <circle class="node" cx="120" cy="300" r="9"/>
    <circle class="nodeA" cx="280" cy="405" r="13"/>
    <circle class="node" cx="410" cy="255" r="9"/>
    <circle class="nodeB" cx="560" cy="360" r="13"/>
    <circle class="node" cx="770" cy="565" r="10"/>
    <circle class="nodeA" cx="930" cy="430" r="15"/>
    <circle class="node" cx="1110" cy="205" r="9"/>
    <circle class="nodeB" cx="1235" cy="265" r="13"/>

    <rect x="0" y="820" width="1240" height="170" rx="2" fill="#0b1117" opacity=".72" stroke="#526071" stroke-width="2"/>
    <text class="mono" x="42" y="882">tokens → tensor programs → kernels → distributed state → serving</text>
    <text class="small" x="42" y="936">A systems-first guide to the compute, memory, bandwidth, communication, and scheduling constraints behind LLMs.</text>
  </g>

  <g transform="translate(196 2048)">
    <path d="M0 0H1210" stroke="#526071" stroke-width="2"/>
    <text class="author" x="0" y="118">GIZAMO</text>
  </g>
</svg>
