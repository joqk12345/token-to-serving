<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc"><title id="title">Serving placement maps roles and parallel groups to hardware</title><desc id="desc">An illustrative cluster has three nodes with GPUs. Prefill instances, decode instances, and a tensor-parallel group are placed across them, with inter-node transfer paths.</desc><defs><style>.b{fill:#f7f8fa}.p{fill:#fff;stroke:#1f2933;stroke-width:2}.n{fill:#fff;stroke:#53616d;stroke-width:2}.pf{fill:#e8eef9;stroke:#355c9a;stroke-width:2}.de{fill:#dcefe5;stroke:#287052;stroke-width:2}.tp{fill:#fff0d6;stroke:#9a6518;stroke-width:2}.t{font:700 30px Arial;fill:#17212b}.h{font:700 18px Arial;fill:#17212b}.s{font:400 15px Arial;fill:#44515d}.line{stroke:#53616d;stroke-width:3}</style></defs><rect class="b" width="1200" height="760"/><text class="t" x="65" y="60">Placement couples instances, parallelism, and physical links</text><text class="s" x="65" y="90">Illustrative topology only; no concrete cluster size is prescribed.</text><rect class="p" x="65" y="135" width="1070" height="500" rx="6"/><rect class="n" x="95" y="210" width="300" height="320" rx="8"/><text class="h" x="200" y="250">NODE A</text><rect class="pf" x="135" y="290" width="220" height="80" rx="5"/><text class="h" x="190" y="338">prefill instance</text><rect class="tp" x="135" y="400" width="100" height="80" rx="5"/><rect class="tp" x="255" y="400" width="100" height="80" rx="5"/><text class="s" x="155" y="445">TP 0</text><text class="s" x="275" y="445">TP 1</text><rect class="n" x="450" y="210" width="300" height="320" rx="8"/><text class="h" x="555" y="250">NODE B</text><rect class="de" x="490" y="290" width="220" height="80" rx="5"/><text class="h" x="545" y="338">decode instance</text><rect class="de" x="490" y="400" width="220" height="80" rx="5"/><text class="h" x="545" y="448">decode instance</text><rect class="n" x="805" y="210" width="300" height="320" rx="8"/><text class="h" x="910" y="250">NODE C</text><rect class="pf" x="845" y="290" width="220" height="80" rx="5"/><text class="h" x="900" y="338">prefill instance</text><rect class="de" x="845" y="400" width="220" height="80" rx="5"/><text class="h" x="900" y="448">decode instance</text><line class="line" x1="395" y1="370" x2="450" y2="370"/><line class="line" x1="750" y1="370" x2="805" y2="370"/><text class="s" x="95" y="590">placement objective includes phase capacity, parallel-group locality, transfer paths, failure domains, and service objectives</text><text class="s" x="65" y="690">A valid placement must fit memory and compute while keeping its communication and scheduling plan feasible.</text></svg>
