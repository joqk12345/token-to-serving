<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc"><title id="title">Prefill-decode disaggregation transfers KV state between pools</title><desc id="desc">Requests enter a router, prompt processing runs in a prefill worker pool, KV state crosses a visible transfer path, and decode workers stream output tokens.</desc><defs><style>.b{fill:#f7f8fa}.p{fill:#fff;stroke:#1f2933;stroke-width:2}.x{fill:#e8eef9;stroke:#355c9a;stroke-width:2}.y{fill:#dcefe5;stroke:#287052;stroke-width:2}.kv{fill:#fff0d6;stroke:#9a6518;stroke-width:3}.t{font:700 30px Arial;fill:#17212b}.h{font:700 18px Arial;fill:#17212b}.s{font:400 15px Arial;fill:#44515d}.a{stroke:#53616d;stroke-width:3;fill:none;marker-end:url(#m)}</style><marker id="m" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0L10 5L0 10z" fill="#53616d"/></marker></defs><rect class="b" width="1200" height="760"/><text class="t" x="65" y="60">Disaggregation separates phase-specific worker pools</text><text class="s" x="65" y="90">KV transfer is explicit and consumes bandwidth, latency, buffers, and coordination.</text><rect class="p" x="65" y="135" width="1070" height="500" rx="6"/><rect class="x" x="95" y="315" width="140" height="100" rx="5"/><text class="h" x="135" y="355">ROUTER</text><text class="s" x="120" y="385">incoming prompt</text><path class="a" d="M235 365L330 365"/><rect class="x" x="340" y="265" width="230" height="200" rx="6"/><text class="h" x="390" y="310">PREFILL POOL</text><text class="s" x="390" y="350">prompt processing</text><text class="s" x="390" y="385">produce initial KV</text><path class="a" d="M570 365L675 365"/><rect class="kv" x="685" y="300" width="170" height="130" rx="6"/><text class="h" x="725" y="342">KV TRANSFER</text><text class="s" x="715" y="378">network / memory path</text><text class="s" x="735" y="405">not free</text><path class="a" d="M855 365L930 365"/><rect class="y" x="940" y="265" width="165" height="200" rx="6"/><text class="h" x="975" y="310">DECODE POOL</text><text class="s" x="970" y="350">iterative generation</text><text class="s" x="975" y="385">stream tokens</text><text class="s" x="65" y="690">Disaggregation can specialize phases but introduces placement, transfer, queueing, and fault-handling decisions.</text></svg>
