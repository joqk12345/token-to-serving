<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc"><title id="title">Colocated prefill and decode can interfere</title><desc id="desc">A shared-resource timeline alternates large prefill work with small latency-sensitive decode steps, causing decode gaps and resource contention.</desc><defs><style>.b{fill:#f7f8fa}.p{fill:#fff;stroke:#1f2933;stroke-width:2}.pf{fill:#e8eef9;stroke:#355c9a;stroke-width:2}.de{fill:#dcefe5;stroke:#287052;stroke-width:2}.gap{fill:#fff0d6;stroke:#9a6518;stroke-width:2}.t{font:700 30px Arial;fill:#17212b}.h{font:700 18px Arial;fill:#17212b}.s{font:400 15px Arial;fill:#44515d}</style></defs><rect class="b" width="1200" height="760"/><text class="t" x="65" y="60">Prefill and decode compete when they share resources</text><text class="s" x="65" y="90">Colocation is not categorically poor; interference depends on workload, batching, hardware, and policy.</text><rect class="p" x="65" y="135" width="1070" height="500" rx="6"/><text class="h" x="95" y="255">PREFILL</text><rect class="pf" x="230" y="210" width="300" height="80" rx="4"/><text class="h" x="335" y="258">large prompt batch</text><rect class="pf" x="690" y="210" width="330" height="80" rx="4"/><text class="h" x="800" y="258">prefill work</text><text class="h" x="95" y="405">DECODE</text><rect class="de" x="230" y="360" width="90" height="70" rx="4"/><rect class="gap" x="320" y="360" width="210" height="70" rx="4"/><rect class="de" x="530" y="360" width="90" height="70" rx="4"/><rect class="gap" x="620" y="360" width="70" height="70" rx="4"/><rect class="de" x="690" y="360" width="90" height="70" rx="4"/><rect class="gap" x="780" y="360" width="240" height="70" rx="4"/><text class="s" x="350" y="402">decode waits / slows</text><text class="s" x="820" y="402">interference gap</text><text class="s" x="230" y="510">different work shapes place different pressure on compute, memory bandwidth, and scheduling</text><text class="s" x="65" y="690">A scheduler must decide when sharing improves utilization and when phase interference harms service objectives.</text></svg>
