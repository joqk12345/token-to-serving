<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc"><title id="title">TTFT and TPOT measure different parts of streaming latency</title><desc id="desc">A request arrives, waits through queueing and prefill until the first output token, then later output tokens appear at repeated intervals.</desc><defs><style>.b{fill:#f7f8fa}.p{fill:#fff;stroke:#1f2933;stroke-width:2}.wait{fill:#fff0d6;stroke:#9a6518;stroke-width:2}.tok{fill:#dcefe5;stroke:#287052;stroke-width:2}.t{font:700 30px Arial;fill:#17212b}.h{font:700 18px Arial;fill:#17212b}.s{font:400 15px Arial;fill:#44515d}.line{stroke:#53616d;stroke-width:3}</style></defs><rect class="b" width="1200" height="760"/><text class="t" x="65" y="60">Streaming latency has a first-token phase and a token cadence</text><text class="s" x="65" y="90">No numeric latency is shown; conditions depend on workload, model, hardware, and scheduler.</text><rect class="p" x="65" y="135" width="1070" height="500" rx="6"/><line class="line" x1="120" y1="360" x2="1080" y2="360"/><circle cx="150" cy="360" r="14" fill="#355c9a"/><text class="h" x="110" y="320">request</text><rect class="wait" x="165" y="310" width="350" height="100" rx="5"/><text class="h" x="270" y="350">QUEUE + PREFILL</text><text class="s" x="285" y="383">time to first token</text><g class="tok"><circle cx="560" cy="360" r="28"/><circle cx="700" cy="360" r="28"/><circle cx="840" cy="360" r="28"/><circle cx="980" cy="360" r="28"/></g><text class="h" x="550" y="367">1</text><text class="h" x="690" y="367">2</text><text class="h" x="830" y="367">3</text><text class="h" x="970" y="367">4</text><text class="h" x="520" y="450">TTFT</text><text class="s" x="655" y="450">TPOT / inter-token cadence</text><text class="s" x="65" y="690">TTFT governs when streaming begins; TPOT describes the pace of subsequent generated tokens.</text></svg>
