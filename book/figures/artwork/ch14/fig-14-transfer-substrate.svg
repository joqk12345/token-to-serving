<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc"><title id="title">A transfer substrate connects KV memory domains</title><desc id="desc">GPU memory, host memory, remote nodes, and storage services connect through a central transfer layer that handles KV block movement.</desc><defs><style>.b{fill:#f7f8fa}.p{fill:#fff;stroke:#1f2933;stroke-width:2}.d{fill:#e8eef9;stroke:#355c9a;stroke-width:2}.tr{fill:#f3e8fa;stroke:#70428e;stroke-width:3}.t{font:700 30px Arial;fill:#17212b}.h{font:700 18px Arial;fill:#17212b}.s{font:400 15px Arial;fill:#44515d}.a{stroke:#53616d;stroke-width:3;fill:none;marker-end:url(#m)}</style><marker id="m" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0L10 5L0 10z" fill="#53616d"/></marker></defs><rect class="b" width="1200" height="760"/><text class="t" x="65" y="60">Disaggregated serving needs an explicit KV transfer layer</text><text class="s" x="65" y="90">Protocol and zero-copy details vary by system and are not specified here.</text><rect class="p" x="65" y="135" width="1070" height="500" rx="6"/><rect class="tr" x="430" y="270" width="340" height="200" rx="8"/><text class="h" x="505" y="315">TRANSFER SUBSTRATE</text><text class="s" x="500" y="355">address / registration</text><text class="s" x="500" y="390">move KV blocks</text><text class="s" x="500" y="425">completion + lifecycle</text><g class="d"><rect x="95" y="190" width="220" height="100" rx="6"/><rect x="95" y="450" width="220" height="100" rx="6"/><rect x="885" y="190" width="220" height="100" rx="6"/><rect x="885" y="450" width="220" height="100" rx="6"/></g><text class="h" x="150" y="248">GPU MEMORY</text><text class="h" x="150" y="508">HOST MEMORY</text><text class="h" x="940" y="248">REMOTE NODE</text><text class="h" x="925" y="508">STORAGE SERVICE</text><path class="a" d="M315 240L420 315M315 500L420 425M780 315L875 240M780 425L875 500"/><text class="s" x="65" y="690">The substrate turns placement decisions into data movement and exposes bandwidth, latency, registration, and failure constraints.</text></svg>
