<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc"><title id="title">KV state can span a memory hierarchy</title><desc id="desc">A tiered pyramid shows GPU HBM, CPU DRAM, local SSD, and remote storage, with capacity increasing and locality decreasing downward.</desc><defs><style>.b{fill:#f7f8fa}.p{fill:#fff;stroke:#1f2933;stroke-width:2}.a{fill:#dcefe5;stroke:#287052;stroke-width:2}.c{fill:#e8eef9;stroke:#355c9a;stroke-width:2}.s{fill:#fff0d6;stroke:#9a6518;stroke-width:2}.r{fill:#f3e8fa;stroke:#70428e;stroke-width:2}.t{font:700 30px Arial;fill:#17212b}.h{font:700 19px Arial;fill:#17212b}.sm{font:400 15px Arial;fill:#44515d}</style></defs><rect class="b" width="1200" height="760"/><text class="t" x="65" y="60">KV management can span multiple memory tiers</text><text class="sm" x="65" y="90">No latency or bandwidth values are implied; hardware and transfer paths determine tier behavior.</text><rect class="p" x="65" y="135" width="1070" height="500" rx="6"/><rect class="a" x="400" y="190" width="400" height="80" rx="5"/><text class="h" x="545" y="238">GPU HBM</text><rect class="c" x="330" y="290" width="540" height="80" rx="5"/><text class="h" x="535" y="338">CPU DRAM</text><rect class="s" x="260" y="390" width="680" height="80" rx="5"/><text class="h" x="545" y="438">LOCAL SSD</text><rect class="r" x="190" y="490" width="820" height="80" rx="5"/><text class="h" x="515" y="538">REMOTE / DISTRIBUTED KV STORAGE</text><text class="sm" x="100" y="230">closer to active compute</text><text class="sm" x="945" y="540">larger / less local</text><text class="sm" x="65" y="690">Offload expands effective capacity but adds transfer, placement, eviction, and recovery policy.</text></svg>
