<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc"><title id="title">KV-aware routing balances locality and load</title><desc id="desc">A router compares three workers by matching prefix cache and current load before assigning a request.</desc><defs><style>.b{fill:#f7f8fa}.p{fill:#fff;stroke:#1f2933;stroke-width:2}.r{fill:#f3e8fa;stroke:#70428e;stroke-width:2}.hit{fill:#dcefe5;stroke:#287052;stroke-width:2}.load{fill:#fff0d6;stroke:#9a6518;stroke-width:2}.t{font:700 30px Arial;fill:#17212b}.h{font:700 18px Arial;fill:#17212b}.s{font:400 15px Arial;fill:#44515d}.a{stroke:#53616d;stroke-width:3;fill:none;marker-end:url(#m)}</style><marker id="m" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0L10 5L0 10z" fill="#53616d"/></marker></defs><rect class="b" width="1200" height="760"/><text class="t" x="65" y="60">KV-aware routing uses more than queue length</text><text class="s" x="65" y="90">Cache locality is one signal; it need not dominate load, fairness, capacity, or SLO constraints.</text><rect class="p" x="65" y="135" width="1070" height="500" rx="6"/><rect class="r" x="95" y="295" width="190" height="120" rx="6"/><text class="h" x="135" y="335">ROUTER</text><text class="s" x="125" y="370">prefix match + load</text><path class="a" d="M285 335L440 235M285 355L440 355M285 375L440 475"/><rect class="hit" x="450" y="190" width="260" height="100" rx="6"/><text class="h" x="500" y="230">WORKER A · cache hit</text><text class="s" x="520" y="265">moderate load</text><rect class="load" x="450" y="310" width="260" height="100" rx="6"/><text class="h" x="500" y="350">WORKER B · miss</text><text class="s" x="520" y="385">low load</text><rect class="load" x="450" y="430" width="260" height="100" rx="6"/><text class="h" x="500" y="470">WORKER C · hit</text><text class="s" x="520" y="505">high load</text><path class="a" d="M710 240L900 350"/><rect class="hit" x="910" y="300" width="190" height="120" rx="6"/><text class="h" x="955" y="340">ASSIGNMENT</text><text class="s" x="950" y="375">policy-selected</text><text class="s" x="945" y="400">under constraints</text><text class="s" x="65" y="690">Routing trades saved prefill work against current queueing and resource pressure.</text></svg>
