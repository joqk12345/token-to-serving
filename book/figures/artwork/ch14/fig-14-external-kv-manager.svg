<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc"><title id="title">An external KV manager serves multiple inference engines</title><desc id="desc">Three inference engines connect to an external KV manager that indexes shared state and accesses CPU memory or a remote KV pool.</desc><defs><style>.b{fill:#f7f8fa}.p{fill:#fff;stroke:#1f2933;stroke-width:2}.e{fill:#e8eef9;stroke:#355c9a;stroke-width:2}.m{fill:#dcefe5;stroke:#287052;stroke-width:3}.s{fill:#fff0d6;stroke:#9a6518;stroke-width:2}.t{font:700 30px Arial;fill:#17212b}.h{font:700 18px Arial;fill:#17212b}.sm{font:400 15px Arial;fill:#44515d}.line{stroke:#53616d;stroke-width:3}</style></defs><rect class="b" width="1200" height="760"/><text class="t" x="65" y="60">External KV management separates state from one engine process</text><text class="sm" x="65" y="90">Conceptual design; LMCache and other systems differ in APIs, ownership, and transport.</text><rect class="p" x="65" y="135" width="1070" height="500" rx="6"/><g class="e"><rect x="95" y="210" width="220" height="95" rx="5"/><rect x="95" y="340" width="220" height="95" rx="5"/><rect x="95" y="470" width="220" height="95" rx="5"/></g><text class="h" x="135" y="265">INFERENCE ENGINE A</text><text class="h" x="135" y="395">INFERENCE ENGINE B</text><text class="h" x="135" y="525">INFERENCE ENGINE C</text><line class="line" x1="315" y1="257" x2="500" y2="350"/><line class="line" x1="315" y1="387" x2="500" y2="387"/><line class="line" x1="315" y1="517" x2="500" y2="425"/><rect class="m" x="510" y="275" width="260" height="220" rx="8"/><text class="h" x="555" y="320">EXTERNAL KV MANAGER</text><text class="sm" x="560" y="360">lookup · share · offload</text><text class="sm" x="560" y="395">reuse · reference state</text><text class="sm" x="560" y="430">coordinate ownership</text><line class="line" x1="770" y1="350" x2="890" y2="280"/><line class="line" x1="770" y1="420" x2="890" y2="490"/><rect class="s" x="900" y="220" width="190" height="115" rx="6"/><text class="h" x="945" y="265">CPU MEMORY</text><text class="sm" x="940" y="300">shared/offloaded KV</text><rect class="s" x="900" y="435" width="190" height="115" rx="6"/><text class="h" x="940" y="480">REMOTE KV POOL</text><text class="sm" x="945" y="515">distributed state</text><text class="sm" x="65" y="690">Externalization can enable reuse across engines while adding consistency, transfer, lifecycle, and failure-handling work.</text></svg>
