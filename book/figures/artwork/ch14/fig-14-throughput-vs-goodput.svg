<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc"><title id="title">Throughput and goodput count different completions</title><desc id="desc">Ten completed requests count toward throughput. Six finish inside an illustrative serving objective and count toward goodput; four miss it.</desc><defs><style>.b{fill:#f7f8fa}.p{fill:#fff;stroke:#1f2933;stroke-width:2}.ok{fill:#dcefe5;stroke:#287052;stroke-width:2}.late{fill:#fff0d6;stroke:#9a6518;stroke-width:2}.t{font:700 30px Arial;fill:#17212b}.h{font:700 19px Arial;fill:#17212b}.s{font:400 15px Arial;fill:#44515d}</style></defs><rect class="b" width="1200" height="760"/><text class="t" x="65" y="60">Goodput applies a serving objective to completed work</text><text class="s" x="65" y="90">Illustrative counts only; the objective must be defined for the workload being evaluated.</text><rect class="p" x="65" y="135" width="1070" height="500" rx="6"/><text class="h" x="95" y="205">ALL COMPLETIONS → THROUGHPUT</text><g class="ok"><circle cx="160" cy="290" r="35"/><circle cx="250" cy="290" r="35"/><circle cx="340" cy="290" r="35"/><circle cx="430" cy="290" r="35"/><circle cx="520" cy="290" r="35"/><circle cx="610" cy="290" r="35"/></g><g class="late"><circle cx="700" cy="290" r="35"/><circle cx="790" cy="290" r="35"/><circle cx="880" cy="290" r="35"/><circle cx="970" cy="290" r="35"/></g><text class="h" x="95" y="405">WITHIN DEFINED SLO → GOODPUT</text><rect class="ok" x="130" y="440" width="520" height="90" rx="6"/><text class="h" x="225" y="493">six completions satisfy the objective</text><rect class="late" x="700" y="440" width="330" height="90" rx="6"/><text class="h" x="750" y="493">four complete but miss it</text><text class="s" x="65" y="690">Raw completion rate and objective-qualified completion rate answer different operational questions.</text></svg>
