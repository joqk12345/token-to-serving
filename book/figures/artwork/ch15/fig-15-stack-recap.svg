<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc"><title id="title">The book stack connects objective to serving infrastructure</title><desc id="desc">A layered stack descends from next-token objective and tokenization through Transformer computation, kernels and compilers, distributed training and compression, inference scheduling and KV cache, to hardware network and storage infrastructure.</desc><defs><style>.b{fill:#f7f8fa}.p{fill:#fff;stroke:#1f2933;stroke-width:2}.x{fill:#e8eef9;stroke:#355c9a;stroke-width:2}.y{fill:#dcefe5;stroke:#287052;stroke-width:2}.z{fill:#fff0d6;stroke:#9a6518;stroke-width:2}.v{fill:#f3e8fa;stroke:#70428e;stroke-width:2}.t{font:700 30px Arial;fill:#17212b}.h{font:700 18px Arial;fill:#17212b}.s{font:400 15px Arial;fill:#44515d}</style></defs><rect class="b" width="1200" height="760"/><text class="t" x="65" y="60">One objective expands into one connected systems stack</text><text class="s" x="65" y="90">The layers are interfaces, not isolated topics.</text><rect class="p" x="65" y="135" width="1070" height="500" rx="6"/><rect class="x" x="230" y="170" width="740" height="65" rx="5"/><text class="h" x="425" y="210">NEXT-TOKEN OBJECTIVE · TOKENS · DECODING</text><rect class="y" x="210" y="245" width="780" height="65" rx="5"/><text class="h" x="430" y="285">TRANSFORMER COMPUTATION · ATTENTION</text><rect class="z" x="190" y="320" width="820" height="65" rx="5"/><text class="h" x="405" y="360">GPU KERNELS · MEMORY · COMPILERS</text><rect class="v" x="170" y="395" width="860" height="65" rx="5"/><text class="h" x="350" y="435">DISTRIBUTED TRAINING · PARALLELISM · COMPRESSION</text><rect class="y" x="150" y="470" width="900" height="65" rx="5"/><text class="h" x="345" y="510">INFERENCE SCHEDULER · KV CACHE · ROUTING</text><rect class="x" x="130" y="545" width="940" height="65" rx="5"/><text class="h" x="350" y="585">HARDWARE · NETWORK · STORAGE · SERVING INFRASTRUCTURE</text><text class="s" x="65" y="690">Each abstraction eventually becomes a question of representation, residency, movement, ownership, scheduling, or reliability.</text></svg>
