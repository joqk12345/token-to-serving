<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc"><title id="title">LLM system co-design is a feedback loop</title><desc id="desc">Model architecture, algorithm, software and runtime, and hardware form a cycle. Cross-cutting pressures include memory, communication, scheduling, and precision.</desc><defs><style>.b{fill:#f7f8fa}.p{fill:#fff;stroke:#1f2933;stroke-width:2}.m{fill:#e8eef9;stroke:#355c9a;stroke-width:2}.a{fill:#dcefe5;stroke:#287052;stroke-width:2}.s{fill:#fff0d6;stroke:#9a6518;stroke-width:2}.h{fill:#f3e8fa;stroke:#70428e;stroke-width:2}.t{font:700 30px Arial;fill:#17212b}.hh{font:700 19px Arial;fill:#17212b}.sm{font:400 15px Arial;fill:#44515d}.line{stroke:#53616d;stroke-width:3;fill:none;marker-end:url(#x)}</style><marker id="x" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0L10 5L0 10z" fill="#53616d"/></marker></defs><rect class="b" width="1200" height="760"/><text class="t" x="65" y="60">Co-design links every layer through feedback</text><text class="sm" x="65" y="90">No layer is permanently primary; the active bottleneck determines which constraint leads.</text><rect class="p" x="65" y="135" width="1070" height="500" rx="6"/><rect class="m" x="455" y="185" width="290" height="100" rx="50"/><text class="hh" x="520" y="243">MODEL ARCHITECTURE</text><rect class="a" x="775" y="320" width="260" height="100" rx="50"/><text class="hh" x="855" y="378">ALGORITHM</text><rect class="s" x="455" y="455" width="290" height="100" rx="50"/><text class="hh" x="505" y="513">SOFTWARE / RUNTIME</text><rect class="h" x="165" y="320" width="260" height="100" rx="50"/><text class="hh" x="245" y="378">HARDWARE</text><path class="line" d="M745 235C860 235 900 270 905 315M905 420C900 470 850 505 750 505M455 505C350 505 300 470 295 425M295 320C300 270 350 235 450 235"/><text class="sm" x="500" y="350">memory · communication</text><text class="sm" x="500" y="380">scheduling · precision</text><text class="sm" x="65" y="690">A design change modifies the constraints seen by the other three layers and may move the bottleneck.</text></svg>
