<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc"><title id="title">An optimization can expose the next bottleneck</title><desc id="desc">Before optimization, compute dominates a resource-pressure chart. A compute optimization lowers compute pressure. Afterward, communication and scheduling become the largest exposed pressures.</desc><defs><style>.b{fill:#f7f8fa}.p{fill:#fff;stroke:#1f2933;stroke-width:2}.hot{fill:#fff0d6;stroke:#9a6518;stroke-width:2}.cool{fill:#e8eef9;stroke:#355c9a;stroke-width:2}.new{fill:#dcefe5;stroke:#287052;stroke-width:2}.op{fill:#f3e8fa;stroke:#70428e;stroke-width:2}.t{font:700 30px Arial;fill:#17212b}.h{font:700 18px Arial;fill:#17212b}.s{font:400 15px Arial;fill:#44515d}.a{stroke:#53616d;stroke-width:3;fill:none;marker-end:url(#m)}</style><marker id="m" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0L10 5L0 10z" fill="#53616d"/></marker></defs><rect class="b" width="1200" height="760"/><text class="t" x="65" y="60">Successful optimization changes the limiting resource</text><text class="s" x="65" y="90">Generic co-design pattern; bar heights are qualitative and do not represent measured speedups.</text><rect class="p" x="65" y="135" width="1070" height="500" rx="6"/><text class="h" x="95" y="190">BEFORE</text><rect class="hot" x="110" y="240" width="90" height="280"/><rect class="cool" x="220" y="370" width="90" height="150"/><rect class="cool" x="330" y="405" width="90" height="115"/><text class="s" x="120" y="550">compute</text><text class="s" x="225" y="550">memory</text><text class="s" x="320" y="550">network</text><path class="a" d="M450 380L590 380"/><rect class="op" x="465" y="300" width="110" height="70" rx="35"/><text class="h" x="482" y="342">OPTIMIZE</text><text class="h" x="650" y="190">AFTER</text><rect class="cool" x="665" y="400" width="90" height="120"/><rect class="cool" x="775" y="350" width="90" height="170"/><rect class="new" x="885" y="250" width="90" height="270"/><rect class="new" x="995" y="300" width="90" height="220"/><text class="s" x="675" y="550">compute</text><text class="s" x="780" y="550">memory</text><text class="s" x="875" y="550">network</text><text class="s" x="985" y="550">scheduler</text><text class="s" x="660" y="590">communication or scheduling is now exposed</text><text class="s" x="65" y="690">The next engineering question is not “did the optimization work?” but “which bottleneck owns the target now?”</text></svg>
