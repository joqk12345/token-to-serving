<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc"><title id="title">Diagnose the active bottleneck before choosing an intervention</title><desc id="desc">An observed symptom passes through measurement and branches to compute, memory, communication, scheduling or reliability, and abstraction bottlenecks, each with representative interventions.</desc><defs><style>.b{fill:#f7f8fa}.p{fill:#fff;stroke:#1f2933;stroke-width:2}.start{fill:#f3e8fa;stroke:#70428e;stroke-width:2}.c{fill:#e8eef9;stroke:#355c9a;stroke-width:2}.m{fill:#dcefe5;stroke:#287052;stroke-width:2}.o{fill:#fff0d6;stroke:#9a6518;stroke-width:2}.t{font:700 30px Arial;fill:#17212b}.h{font:700 17px Arial;fill:#17212b}.s{font:400 14px Arial;fill:#44515d}.line{stroke:#53616d;stroke-width:2.5;fill:none}</style></defs><rect class="b" width="1200" height="760"/><text class="t" x="65" y="60">Route interventions from evidence, not tool names</text><text class="s" x="65" y="90">Diagnostic aid, not a deterministic recipe; measurement and iteration may change the classification.</text><rect class="p" x="65" y="135" width="1070" height="500" rx="6"/><rect class="start" x="440" y="170" width="320" height="90" rx="45"/><text class="h" x="500" y="208">OBSERVED SYMPTOM</text><text class="s" x="485" y="235">measure profile, queue, memory, links</text><path class="line" d="M600 260L600 320M170 320L1030 320"/><g><path class="line" d="M170 320L170 365M385 320L385 365M600 320L600 365M815 320L815 365M1030 320L1030 365"/></g><rect class="c" x="90" y="365" width="160" height="160" rx="6"/><text class="h" x="135" y="405">COMPUTE</text><text class="s" x="115" y="445">kernel · fusion</text><text class="s" x="115" y="475">precision · algorithm</text><rect class="m" x="305" y="365" width="160" height="160" rx="6"/><text class="h" x="345" y="405">MEMORY</text><text class="s" x="330" y="445">layout · shard</text><text class="s" x="330" y="475">cache · recompute</text><rect class="o" x="520" y="365" width="160" height="160" rx="6"/><text class="h" x="535" y="405">COMMUNICATION</text><text class="s" x="545" y="445">overlap · topology</text><text class="s" x="545" y="475">partition · transfer</text><rect class="c" x="735" y="365" width="160" height="160" rx="6"/><text class="h" x="765" y="405">SCHEDULING</text><text class="s" x="760" y="445">batch · placement</text><text class="s" x="760" y="475">admission · routing</text><rect class="m" x="950" y="365" width="160" height="160" rx="6"/><text class="h" x="975" y="405">ABSTRACTION</text><text class="s" x="975" y="445">compiler boundary</text><text class="s" x="975" y="475">API · reliability</text><text class="s" x="65" y="690">Choose a mechanism only after showing how it can affect the measured limiting resource or control path.</text></svg>
