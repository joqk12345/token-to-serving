<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Generic speculative decoding proposal and validation pipeline</title><desc id="desc">A draft model proposes several tokens, the target model validates them together, accepted prefixes advance generation, and a rejection triggers correction before the next proposal round.</desc>
  <defs><style>.bg{fill:#f7f8fa}.panel{fill:#fff;stroke:#1f2933;stroke-width:2}.draft{fill:#e8eef9;stroke:#355c9a;stroke-width:2}.target{fill:#fff0d6;stroke:#9a6518;stroke-width:2}.accept{fill:#dcefe5;stroke:#287052;stroke-width:2}.reject{fill:#f5dede;stroke:#9b3d3d;stroke-width:2}.title{font:700 30px Arial,sans-serif;fill:#17212b}.section{font:700 20px Arial,sans-serif;fill:#17212b}.label{font:600 18px Arial,sans-serif;fill:#17212b}.small{font:400 15px Arial,sans-serif;fill:#44515d}.arrow{stroke:#53616d;stroke-width:3;fill:none;marker-end:url(#arrow)}.loop{stroke:#65517e;stroke-width:3;fill:none;marker-end:url(#purple)}</style><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#53616d"/></marker><marker id="purple" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#65517e"/></marker></defs>
  <rect class="bg" width="1200" height="760"/><text class="title" x="65" y="60">Speculative decoding proposes first, then validates in a batch</text><text class="small" x="65" y="90">Generic control flow; acceptance rules depend on the exact algorithm.</text>
  <rect class="panel" x="65" y="250" width="160" height="125" rx="6"/><text class="section" x="95" y="290">PREFIX</text><text class="label" x="95" y="330">... the model</text><path class="arrow" d="M225 312 L295 312"/>
  <rect class="draft" x="305" y="205" width="230" height="215" rx="6"/><text class="section" x="355" y="248">DRAFT MODEL</text><text class="small" x="350" y="278">propose multiple tokens</text><g class="label"><rect class="panel" x="335" y="310" width="48" height="48" rx="4"/><text x="350" y="341">can</text><rect class="panel" x="393" y="310" width="48" height="48" rx="4"/><text x="407" y="341">run</text><rect class="panel" x="451" y="310" width="48" height="48" rx="4"/><text x="464" y="341">fast</text></g><path class="arrow" d="M535 312 L605 312"/>
  <rect class="target" x="615" y="205" width="245" height="215" rx="6"/><text class="section" x="650" y="248">TARGET MODEL</text><text class="small" x="650" y="278">validate proposed positions</text><rect class="panel" x="650" y="308" width="175" height="60" rx="4"/><text class="label" x="674" y="344">one validation pass</text><path class="arrow" d="M860 312 L925 312"/>
  <rect class="panel" x="935" y="175" width="200" height="300" rx="6"/><text class="section" x="975" y="215">DECISION</text><rect class="accept" x="965" y="250" width="140" height="75" rx="5"/><text class="label" x="996" y="280">ACCEPT</text><text class="small" x="984" y="307">advance prefix</text><rect class="reject" x="965" y="355" width="140" height="85" rx="5"/><text class="label" x="996" y="387">REJECT</text><text class="small" x="985" y="414">correct at first</text><text class="small" x="1003" y="433">mismatch</text>
  <path class="loop" d="M1035 475 C1035 605 415 605 415 430"/><text class="label" x="600" y="580">next proposal round</text>
  <rect class="accept" x="250" y="500" width="260" height="75" rx="6"/><text class="label" x="280" y="532">accepted prefix: can run</text><text class="small" x="280" y="557">several positions may advance</text><rect class="reject" x="805" y="500" width="260" height="75" rx="6"/><text class="label" x="838" y="532">rejected token: fast</text><text class="small" x="835" y="557">target supplies a correction</text>
  <text class="small" x="65" y="705">The useful work depends on how often draft proposals agree with the target model.</text>
</svg>
