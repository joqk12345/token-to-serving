<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Greedy, sampling, and beam-search decoding</title><desc id="desc">Three panels begin from the same prompt. Greedy follows the highest-probability branch, sampling makes a stochastic choice, and beam search retains several high-scoring partial sequences.</desc>
  <defs><style>.bg{fill:#f7f8fa}.panel{fill:#fff;stroke:#1f2933;stroke-width:2}.blue{fill:#e8eef9;stroke:#355c9a;stroke-width:2}.orange{fill:#fff0d6;stroke:#9a6518;stroke-width:2}.green{fill:#dcefe5;stroke:#287052;stroke-width:2}.muted{fill:#eceff2;stroke:#8b98a5;stroke-width:1}.title{font:700 30px Arial,sans-serif;fill:#17212b}.section{font:700 20px Arial,sans-serif;fill:#17212b}.label{font:600 17px Arial,sans-serif;fill:#17212b}.small{font:400 14px Arial,sans-serif;fill:#44515d}.edge{stroke:#8b98a5;stroke-width:2}.chosen{stroke:#287052;stroke-width:4}</style></defs>
  <rect class="bg" width="1200" height="760"/><text class="title" x="65" y="60">Decoding decides how probabilities become a sequence</text><text class="small" x="65" y="90">The branch values are illustrative next-token probabilities.</text><rect class="panel" x="430" y="112" width="340" height="65" rx="6"/><text class="section" x="475" y="153">PROMPT: "The system"</text>
  <rect class="panel" x="65" y="210" width="335" height="450" rx="6"/><rect class="blue" x="65" y="210" width="335" height="65" rx="6"/><text class="section" x="192" y="251">GREEDY</text><text class="small" x="95" y="305">choose the largest probability at each step</text><circle class="blue" cx="230" cy="350" r="28"/><text class="label" x="214" y="356">start</text><line class="chosen" x1="230" y1="378" x2="150" y2="445"/><line class="edge" x1="230" y1="378" x2="310" y2="445"/><rect class="green" x="95" y="445" width="110" height="55" rx="4"/><text class="label" x="117" y="469">is</text><text class="small" x="117" y="490">0.55</text><rect class="muted" x="255" y="445" width="110" height="55" rx="4"/><text class="label" x="272" y="469">can</text><text class="small" x="275" y="490">0.30</text><line class="chosen" x1="150" y1="500" x2="150" y2="550"/><rect class="green" x="95" y="550" width="110" height="55" rx="4"/><text class="label" x="112" y="583">ready</text><text class="small" x="95" y="632">deterministic; local choices are final</text>
  <rect class="panel" x="432" y="210" width="335" height="450" rx="6"/><rect class="orange" x="432" y="210" width="335" height="65" rx="6"/><text class="section" x="548" y="251">SAMPLING</text><text class="small" x="462" y="305">draw from the probability distribution</text><circle class="orange" cx="598" cy="350" r="28"/><text class="label" x="582" y="356">start</text><line class="edge" x1="598" y1="378" x2="518" y2="445"/><line class="chosen" x1="598" y1="378" x2="678" y2="445"/><rect class="muted" x="463" y="445" width="110" height="55" rx="4"/><text class="label" x="485" y="469">is</text><text class="small" x="485" y="490">0.55</text><rect class="green" x="623" y="445" width="110" height="55" rx="4"/><text class="label" x="640" y="469">can</text><text class="small" x="643" y="490">0.30</text><line class="chosen" x1="678" y1="500" x2="678" y2="550"/><rect class="green" x="623" y="550" width="110" height="55" rx="4"/><text class="label" x="640" y="583">adapt</text><text class="small" x="462" y="632">variable output; lower branches can be chosen</text>
  <rect class="panel" x="799" y="210" width="336" height="450" rx="6"/><rect class="green" x="799" y="210" width="336" height="65" rx="6"/><text class="section" x="901" y="251">BEAM SEARCH</text><text class="small" x="829" y="305">retain top-k partial sequences</text><circle class="green" cx="967" cy="350" r="28"/><text class="label" x="951" y="356">start</text><line class="chosen" x1="967" y1="378" x2="862" y2="440"/><line class="chosen" x1="967" y1="378" x2="967" y2="440"/><line class="edge" x1="967" y1="378" x2="1072" y2="440"/><rect class="green" x="824" y="440" width="76" height="48" rx="4"/><text class="label" x="848" y="470">is</text><rect class="green" x="929" y="440" width="76" height="48" rx="4"/><text class="label" x="942" y="470">can</text><rect class="muted" x="1034" y="440" width="76" height="48" rx="4"/><text class="label" x="1042" y="470">will</text><line class="chosen" x1="862" y1="488" x2="862" y2="535"/><line class="chosen" x1="967" y1="488" x2="967" y2="535"/><rect class="green" x="818" y="535" width="88" height="50" rx="4"/><text class="small" x="832" y="565">is ready</text><rect class="green" x="917" y="535" width="100" height="50" rx="4"/><text class="small" x="929" y="565">can adapt</text><text class="small" x="829" y="632">broader search; more candidates stay active</text>
  <text class="small" x="65" y="710">Decoding strategy changes determinism, diversity, and the amount of search work.</text>
</svg>
