<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Comparison of word, character, and subword tokenization</title>
  <desc id="desc">The sentence We can't reconfigure Qubitron! is split three ways, showing word-level unknown-token risk, character-level sequence growth, and subword decomposition of a rare word.</desc>
  <defs><style>.bg{fill:#f7f8fa}.panel{fill:#fff;stroke:#1f2933;stroke-width:2}.word{fill:#e8eef9;stroke:#355c9a;stroke-width:2}.char{fill:#fff0d6;stroke:#9a6518;stroke-width:2}.sub{fill:#dcefe5;stroke:#287052;stroke-width:2}.warn{fill:#f5dede;stroke:#9b3d3d;stroke-width:2}.title{font:700 30px Arial,sans-serif;fill:#17212b}.section{font:700 20px Arial,sans-serif;fill:#17212b}.label{font:600 18px Arial,sans-serif;fill:#17212b}.small{font:400 15px Arial,sans-serif;fill:#44515d}.token{font:600 16px Arial,sans-serif;fill:#17212b}</style></defs>
  <rect class="bg" width="1200" height="760"/><text class="title" x="65" y="60">One string can imply very different token sequences</text><text class="small" x="65" y="90">Illustrative boundaries; actual output depends on a tokenizer's learned vocabulary and rules.</text>
  <rect class="panel" x="65" y="120" width="1070" height="80" rx="6"/><text class="section" x="95" y="153">INPUT TEXT</text><text class="label" x="95" y="181">We can't reconfigure Qubitron!</text>
  <rect class="panel" x="65" y="225" width="1070" height="125" rx="6"/><rect class="word" x="65" y="225" width="190" height="125" rx="6"/><text class="section" x="112" y="266">WORD</text><text class="small" x="91" y="296">large vocabulary</text><text class="small" x="98" y="320">OOV risk</text>
  <g class="token"><rect class="word" x="285" y="258" width="65" height="50" rx="4"/><text x="306" y="289">We</text><rect class="word" x="365" y="258" width="90" height="50" rx="4"/><text x="381" y="289">can't</text><rect class="word" x="470" y="258" width="125" height="50" rx="4"/><text x="484" y="289">reconfigure</text><rect class="warn" x="610" y="258" width="150" height="50" rx="4"/><text x="628" y="289">[UNK]</text><rect class="word" x="775" y="258" width="48" height="50" rx="4"/><text x="795" y="289">!</text></g><text class="small" x="855" y="288">rare word may be unknown</text>
  <rect class="panel" x="65" y="375" width="1070" height="125" rx="6"/><rect class="char" x="65" y="375" width="190" height="125" rx="6"/><text class="section" x="94" y="416">CHARACTER</text><text class="small" x="94" y="446">small vocabulary</text><text class="small" x="88" y="470">longer sequence</text>
  <g class="token"><rect class="char" x="285" y="408" width="43" height="50" rx="4"/><text x="300" y="439">W</text><rect class="char" x="337" y="408" width="43" height="50" rx="4"/><text x="353" y="439">e</text><rect class="char" x="389" y="408" width="43" height="50" rx="4"/><text x="404" y="439">c</text><rect class="char" x="441" y="408" width="43" height="50" rx="4"/><text x="456" y="439">a</text><rect class="char" x="493" y="408" width="43" height="50" rx="4"/><text x="510" y="439">n</text><rect class="char" x="545" y="408" width="43" height="50" rx="4"/><text x="562" y="439">'</text><rect class="char" x="597" y="408" width="43" height="50" rx="4"/><text x="613" y="439">t</text><text class="label" x="660" y="440">...</text><rect class="char" x="705" y="408" width="43" height="50" rx="4"/><text x="720" y="439">Q</text><rect class="char" x="757" y="408" width="43" height="50" rx="4"/><text x="773" y="439">u</text><rect class="char" x="809" y="408" width="43" height="50" rx="4"/><text x="825" y="439">b</text><rect class="char" x="861" y="408" width="43" height="50" rx="4"/><text x="879" y="439">i</text><text class="label" x="925" y="440">...</text></g><text class="small" x="980" y="438">many steps</text>
  <rect class="panel" x="65" y="525" width="1070" height="125" rx="6"/><rect class="sub" x="65" y="525" width="190" height="125" rx="6"/><text class="section" x="105" y="566">SUBWORD</text><text class="small" x="86" y="596">frequent chunks</text><text class="small" x="85" y="620">rare strings split</text>
  <g class="token"><rect class="sub" x="285" y="558" width="65" height="50" rx="4"/><text x="306" y="589">We</text><rect class="sub" x="365" y="558" width="60" height="50" rx="4"/><text x="383" y="589">can</text><rect class="sub" x="440" y="558" width="42" height="50" rx="4"/><text x="455" y="589">'t</text><rect class="sub" x="497" y="558" width="55" height="50" rx="4"/><text x="512" y="589">re</text><rect class="sub" x="567" y="558" width="105" height="50" rx="4"/><text x="582" y="589">configure</text><rect class="sub" x="687" y="558" width="58" height="50" rx="4"/><text x="703" y="589">Qu</text><rect class="sub" x="760" y="558" width="70" height="50" rx="4"/><text x="776" y="589">bit</text><rect class="sub" x="845" y="558" width="70" height="50" rx="4"/><text x="862" y="589">ron</text><rect class="sub" x="930" y="558" width="42" height="50" rx="4"/><text x="947" y="589">!</text></g><text class="small" x="995" y="588">no OOV</text>
  <text class="small" x="65" y="705">Tradeoff: vocabulary size, sequence length, and behavior on strings not stored as whole tokens.</text>
</svg>
