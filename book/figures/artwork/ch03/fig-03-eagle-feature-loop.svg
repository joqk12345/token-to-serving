<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">EAGLE feature-level speculative decoding loop</title><desc id="desc">Input tokens use the target model embedding, a small predictor proposes future final-layer features, the target language-model head maps features to token candidates, and tree attention validates candidate branches with the target model.</desc>
  <defs><style>.bg{fill:#f7f8fa}.panel{fill:#fff;stroke:#1f2933;stroke-width:2}.model{fill:#e8eef9;stroke:#355c9a;stroke-width:2}.feature{fill:#ece8f3;stroke:#65517e;stroke-width:2}.target{fill:#fff0d6;stroke:#9a6518;stroke-width:2}.accept{fill:#dcefe5;stroke:#287052;stroke-width:2}.title{font:700 30px Arial,sans-serif;fill:#17212b}.section{font:700 20px Arial,sans-serif;fill:#17212b}.label{font:600 18px Arial,sans-serif;fill:#17212b}.small{font:400 15px Arial,sans-serif;fill:#44515d}.arrow{stroke:#53616d;stroke-width:3;fill:none;marker-end:url(#arrow)}.loop{stroke:#65517e;stroke-width:3;fill:none;marker-end:url(#purple)}</style><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#53616d"/></marker><marker id="purple" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#65517e"/></marker></defs>
  <rect class="bg" width="1200" height="760"/><text class="title" x="65" y="60">EAGLE speculates on features, then validates token branches</text><text class="small" x="65" y="90">Advanced sidebar: a conceptual view of the feature-level proposal path.</text><rect class="feature" x="900" y="28" width="235" height="55" rx="6"/><text class="label" x="932" y="62">ADVANCED SIDEBAR</text>
  <rect class="panel" x="65" y="230" width="145" height="130" rx="6"/><text class="section" x="95" y="270">TOKENS</text><text class="label" x="95" y="310">t1  t2  t3</text><path class="arrow" d="M210 295 L270 295"/>
  <rect class="model" x="280" y="205" width="190" height="180" rx="6"/><text class="section" x="320" y="245">TARGET</text><text class="section" x="304" y="272">EMBEDDING</text><text class="small" x="315" y="320">token representations</text><text class="small" x="315" y="347">are reused</text><path class="arrow" d="M470 295 L530 295"/>
  <rect class="feature" x="540" y="180" width="220" height="230" rx="6"/><text class="section" x="578" y="220">SMALL FEATURE</text><text class="section" x="598" y="247">PREDICTOR</text><rect class="panel" x="585" y="285" width="130" height="55" rx="4"/><text class="label" x="608" y="319">f(t + 1)</text><text class="small" x="573" y="375">predict final-layer features</text><path class="arrow" d="M760 295 L820 295"/>
  <rect class="model" x="830" y="205" width="180" height="180" rx="6"/><text class="section" x="861" y="245">TARGET LM</text><text class="section" x="886" y="272">HEAD</text><text class="small" x="859" y="320">features to token</text><text class="small" x="877" y="347">candidates</text><path class="arrow" d="M1010 295 L1060 295"/>
  <rect class="accept" x="1070" y="220" width="100" height="150" rx="6"/><text class="section" x="1088" y="260">TREE</text><circle cx="1120" cy="295" r="8" fill="#287052"/><line x1="1120" y1="303" x2="1095" y2="330" stroke="#287052" stroke-width="2"/><line x1="1120" y1="303" x2="1145" y2="330" stroke="#287052" stroke-width="2"/><circle cx="1095" cy="336" r="7" fill="#287052"/><circle cx="1145" cy="336" r="7" fill="#287052"/>
  <rect class="target" x="350" y="500" width="500" height="105" rx="6"/><text class="section" x="480" y="540">TARGET MODEL VALIDATION</text><text class="small" x="430" y="575">tree attention checks candidate branches and accepts a valid prefix</text><path class="arrow" d="M1120 370 C1120 455 830 455 830 491"/><path class="loop" d="M350 552 C240 552 240 410 350 395"/><text class="small" x="78" y="530">accepted tokens become</text><text class="small" x="96" y="552">the next context</text>
  <rect class="panel" x="65" y="650" width="1070" height="55" rx="6"/><text class="small" x="95" y="683">Key distinction: the proposal model predicts internal features; the target head and target model still participate in token selection and validation.</text>
</svg>
