<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Tiny byte pair encoding merge loop</title><desc id="desc">A small corpus begins as characters. The frequent pair a t is merged into at, then c at becomes cat, illustrating repeated pair counting and vocabulary growth.</desc>
  <defs><style>.bg{fill:#f7f8fa}.panel{fill:#fff;stroke:#1f2933;stroke-width:2}.base{fill:#e8eef9;stroke:#355c9a;stroke-width:2}.hot{fill:none;stroke:#9a6518;stroke-width:3}.new{fill:#dcefe5;stroke:#287052;stroke-width:2}.title{font:700 30px Arial,sans-serif;fill:#17212b}.section{font:700 20px Arial,sans-serif;fill:#17212b}.label{font:600 18px Arial,sans-serif;fill:#17212b}.small{font:400 15px Arial,sans-serif;fill:#44515d}.arrow{stroke:#53616d;stroke-width:3;fill:none;marker-end:url(#arrow)}</style><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#53616d"/></marker></defs>
  <rect class="bg" width="1200" height="760"/><text class="title" x="65" y="60">BPE grows a vocabulary by merging frequent pairs</text><text class="small" x="65" y="90">Toy corpus and counts are illustrative; each merge adds one symbol to the vocabulary.</text>
  <rect class="panel" x="65" y="130" width="260" height="450" rx="6"/><text class="section" x="95" y="170">1. START SMALL</text><text class="small" x="95" y="200">split words into characters</text>
  <g class="label"><text x="95" y="260">c  a  t</text><text x="95" y="310">c  a  t</text><text x="95" y="360">b  a  t</text><text x="95" y="410">r  a  t  t  l  e</text></g><rect class="hot" x="105" y="228" width="58" height="45" rx="4"/><rect class="hot" x="105" y="278" width="58" height="45" rx="4"/><rect class="hot" x="105" y="328" width="58" height="45" rx="4"/><rect class="hot" x="105" y="378" width="58" height="45" rx="4"/><text class="small" x="95" y="475">count adjacent pairs</text><text class="label" x="95" y="508">(a, t) appears 4 times</text>
  <path class="arrow" d="M325 355 L400 355"/>
  <rect class="panel" x="410" y="130" width="310" height="450" rx="6"/><text class="section" x="440" y="170">2. MERGE a + t</text><text class="small" x="440" y="200">add new symbol: at</text>
  <g class="label"><text x="440" y="260">c</text><rect class="new" x="480" y="228" width="65" height="45" rx="4"/><text x="501" y="258">at</text><text x="440" y="310">c</text><rect class="new" x="480" y="278" width="65" height="45" rx="4"/><text x="501" y="308">at</text><text x="440" y="360">b</text><rect class="new" x="480" y="328" width="65" height="45" rx="4"/><text x="501" y="358">at</text><text x="440" y="410">r</text><rect class="new" x="480" y="378" width="65" height="45" rx="4"/><text x="501" y="408">at</text><text x="560" y="410">t  l  e</text></g><text class="small" x="440" y="475">count pairs again</text><text class="label" x="440" y="508">(c, at) appears 2 times</text>
  <path class="arrow" d="M720 355 L795 355"/>
  <rect class="panel" x="805" y="130" width="330" height="450" rx="6"/><text class="section" x="835" y="170">3. MERGE c + at</text><text class="small" x="835" y="200">add new symbol: cat</text><rect class="new" x="835" y="230" width="90" height="50" rx="4"/><text class="label" x="864" y="262">cat</text><rect class="new" x="835" y="295" width="90" height="50" rx="4"/><text class="label" x="864" y="327">cat</text><text class="label" x="835" y="395">b  at</text><text class="label" x="835" y="445">r  at  t  l  e</text><text class="small" x="835" y="500">repeat until target vocabulary size</text>
  <path class="arrow" d="M970 535 C970 630 270 630 270 590"/><rect class="new" x="445" y="650" width="310" height="50" rx="6"/><text class="label" x="484" y="681">vocabulary grows one merge at a time</text>
</svg>
