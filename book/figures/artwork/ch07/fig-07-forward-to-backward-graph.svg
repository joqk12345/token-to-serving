<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc"><title id="title">Reverse-mode autodiff transforms a forward graph</title><desc id="desc">A small forward graph computes u equals a times b, y equals u plus c, and loss L. Reverse-mode gradient rules propagate from L back to c, u, a, and b while reusing the saved values a and b.</desc><defs><style>.b{fill:#f7f8fa}.p{fill:#fff;stroke:#1f2933;stroke-width:2}.x{fill:#e8eef9;stroke:#355c9a;stroke-width:2}.y{fill:#dcefe5;stroke:#287052;stroke-width:2}.z{fill:#fff0d6;stroke:#9a6518;stroke-width:2}.t{font:700 30px Arial;fill:#17212b}.h{font:700 18px Arial;fill:#17212b}.s{font:400 15px Arial;fill:#44515d}.f{stroke:#355c9a;stroke-width:3;fill:none;marker-end:url(#fm)}.g{stroke:#287052;stroke-width:3;fill:none;marker-end:url(#gm)}.d{stroke:#9a6518;stroke-width:2;stroke-dasharray:6 5;fill:none}</style><marker id="fm" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0L10 5L0 10z" fill="#355c9a"/></marker><marker id="gm" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0L10 5L0 10z" fill="#287052"/></marker></defs><rect class="b" width="1200" height="760"/><text class="t" x="65" y="60">Autodiff generates a backward computation</text><text class="s" x="65" y="90">Tiny scalar graph for mechanism only; saved forward values support local gradient rules.</text><rect class="p" x="65" y="135" width="1070" height="500" rx="6"/><text class="h" x="95" y="175">FORWARD VALUES</text>
<rect class="x" x="105" y="225" width="85" height="65" rx="5"/><text class="h" x="142" y="265">a</text><rect class="x" x="105" y="330" width="85" height="65" rx="5"/><text class="h" x="142" y="370">b</text><path class="f" d="M190 257L275 300M190 362L275 320"/><rect class="x" x="285" y="270" width="130" height="80" rx="40"/><text class="h" x="320" y="305">multiply</text><text class="s" x="327" y="330">u = a b</text><rect class="x" x="285" y="420" width="85" height="65" rx="5"/><text class="h" x="322" y="460">c</text><path class="f" d="M415 310L500 340M370 452L500 375"/><rect class="x" x="510" y="325" width="130" height="80" rx="40"/><text class="h" x="555" y="360">add</text><text class="s" x="540" y="385">y = u + c</text><path class="f" d="M640 365L730 365"/><rect class="z" x="740" y="325" width="110" height="80" rx="5"/><text class="h" x="785" y="360">L</text><text class="s" x="768" y="385">loss</text>
<text class="h" x="900" y="175">REVERSE-MODE GRADIENTS</text><path class="g" d="M795 420C760 540 650 540 600 420"/><text class="s" x="675" y="565">upstream dL/dy</text><path class="g" d="M550 420C500 560 390 560 350 365"/><path class="g" d="M550 420C520 600 350 600 330 495"/><path class="g" d="M330 365C300 520 190 520 155 410"/><path class="g" d="M350 365C360 500 225 535 155 305"/><rect class="y" x="890" y="235" width="205" height="260" rx="6"/><text class="h" x="925" y="275">BACKWARD RULES</text><text class="s" x="920" y="320">add: pass gradient</text><text class="s" x="920" y="355">multiply:</text><text class="s" x="935" y="385">dL/da uses b</text><text class="s" x="935" y="415">dL/db uses a</text><path class="d" d="M190 257C500 170 775 170 890 330M190 362C500 210 775 210 890 390"/><text class="s" x="65" y="690">The backward graph is a program transformation; it may retain forward values when derivative rules require them.</text></svg>
