<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc"><title id="title">TPU compiler tiling targets a systolic matrix unit</title><desc id="desc">HLO shape and layout decisions create matrix tiles. A and B tiles stream into a grid of multiply-accumulate cells in a TPU MXU, and partial sums accumulate toward an output tile.</desc><defs><style>.b{fill:#f7f8fa}.p{fill:#fff;stroke:#1f2933;stroke-width:2}.x{fill:#e8eef9;stroke:#355c9a;stroke-width:2}.y{fill:#dcefe5;stroke:#287052;stroke-width:2}.z{fill:#fff0d6;stroke:#9a6518;stroke-width:2}.cell{fill:#f3e8fa;stroke:#70428e;stroke-width:1.5}.t{font:700 30px Arial;fill:#17212b}.h{font:700 18px Arial;fill:#17212b}.s{font:400 15px Arial;fill:#44515d}.a{stroke:#53616d;stroke-width:3;fill:none;marker-end:url(#m)}</style><marker id="m" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0L10 5L0 10z" fill="#53616d"/></marker></defs><rect class="b" width="1200" height="760"/><text class="t" x="65" y="60">The backend shapes matrix work for the TPU MXU</text><text class="s" x="65" y="90">TPU-specific execution sketch; systolic-array details do not describe every accelerator.</text><rect class="p" x="65" y="135" width="1070" height="500" rx="6"/><rect class="x" x="100" y="245" width="200" height="210" rx="6"/><text class="h" x="150" y="285">HLO SHAPE</text><text class="h" x="145" y="315">+ LAYOUT</text><text class="s" x="135" y="355">choose tile dimensions</text><text class="s" x="135" y="385">arrange operands</text><text class="s" x="135" y="415">schedule movement</text><path class="a" d="M300 350L390 350"/><rect class="y" x="400" y="270" width="155" height="160" rx="6"/><text class="h" x="448" y="310">TILES</text><rect class="x" x="430" y="335" width="95" height="35"/><text class="s" x="462" y="359">A tile</text><rect class="z" x="430" y="380" width="95" height="35"/><text class="s" x="462" y="404">B tile</text><path class="a" d="M555 350L650 350"/><text class="h" x="735" y="205">TPU MXU — SYSTOLIC DATAFLOW</text><g class="cell"><rect x="700" y="250" width="70" height="70"/><rect x="780" y="250" width="70" height="70"/><rect x="860" y="250" width="70" height="70"/><rect x="940" y="250" width="70" height="70"/><rect x="700" y="330" width="70" height="70"/><rect x="780" y="330" width="70" height="70"/><rect x="860" y="330" width="70" height="70"/><rect x="940" y="330" width="70" height="70"/><rect x="700" y="410" width="70" height="70"/><rect x="780" y="410" width="70" height="70"/><rect x="860" y="410" width="70" height="70"/><rect x="940" y="410" width="70" height="70"/></g><text class="s" x="710" y="290">MAC</text><text class="s" x="790" y="290">MAC</text><text class="s" x="870" y="290">MAC</text><text class="s" x="950" y="290">MAC</text><path class="a" d="M650 300L690 300M650 380L690 380M735 230L735 245M815 230L815 245M895 230L895 245M975 230L975 245M1010 365L1080 365"/><rect class="z" x="1040" y="405" width="70" height="100" rx="4"/><text class="s" x="1058" y="440">output</text><text class="s" x="1062" y="465">tile</text><text class="s" x="65" y="690">Compiler tiling and layout are part of the target contract: they determine how matrix operands feed structured compute.</text></svg>
