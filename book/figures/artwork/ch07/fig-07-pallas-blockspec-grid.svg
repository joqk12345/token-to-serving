<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc"><title id="title">Pallas BlockSpec maps program IDs to tensor slices</title><desc id="desc">A two-dimensional program grid selects a block coordinate. BlockSpec maps that coordinate to a highlighted slice of a global HBM tensor. The slice appears as a VMEM reference consumed by one block program.</desc><defs><style>.b{fill:#f7f8fa}.p{fill:#fff;stroke:#1f2933;stroke-width:2}.x{fill:#e8eef9;stroke:#355c9a;stroke-width:2}.y{fill:#dcefe5;stroke:#287052;stroke-width:2}.z{fill:#fff0d6;stroke:#9a6518;stroke-width:2}.v{fill:#f3e8fa;stroke:#70428e;stroke-width:2}.cell{fill:#fff;stroke:#53616d;stroke-width:1.5}.sel{fill:#e8eef9;stroke:#355c9a;stroke-width:3}.t{font:700 30px Arial;fill:#17212b}.h{font:700 18px Arial;fill:#17212b}.s{font:400 15px Arial;fill:#44515d}.a{stroke:#53616d;stroke-width:3;fill:none;marker-end:url(#m)}</style><marker id="m" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0L10 5L0 10z" fill="#53616d"/></marker></defs><rect class="b" width="1200" height="760"/><text class="t" x="65" y="60">BlockSpec connects a program grid to tensor blocks</text><text class="s" x="65" y="90">Pallas/TPU-oriented memory names: the block program receives references, not a copied global tensor.</text><rect class="p" x="65" y="135" width="1070" height="500" rx="6"/><text class="h" x="95" y="180">PROGRAM GRID</text><g class="cell"><rect x="95" y="215" width="55" height="55"/><rect x="150" y="215" width="55" height="55"/><rect x="205" y="215" width="55" height="55"/><rect x="95" y="270" width="55" height="55"/><rect x="150" y="270" width="55" height="55"/><rect x="205" y="270" width="55" height="55"/></g><rect class="sel" x="150" y="270" width="55" height="55"/><text class="s" x="105" y="355">program ID = (1, 1)</text><path class="a" d="M260 295L360 295"/><rect class="y" x="370" y="235" width="175" height="120" rx="6"/><text class="h" x="410" y="275">BLOCKSPEC</text><text class="s" x="405" y="310">map (1,1) → slice</text><text class="s" x="405" y="335">tile shape + index</text><path class="a" d="M545 295L630 295"/><text class="h" x="660" y="180">HBM TENSOR</text><g class="cell"><rect x="640" y="215" width="70" height="70"/><rect x="710" y="215" width="70" height="70"/><rect x="780" y="215" width="70" height="70"/><rect x="850" y="215" width="70" height="70"/><rect x="640" y="285" width="70" height="70"/><rect x="710" y="285" width="70" height="70"/><rect x="780" y="285" width="70" height="70"/><rect x="850" y="285" width="70" height="70"/><rect x="640" y="355" width="70" height="70"/><rect x="710" y="355" width="70" height="70"/><rect x="780" y="355" width="70" height="70"/><rect x="850" y="355" width="70" height="70"/></g><rect class="sel" x="710" y="285" width="140" height="70"/><text class="s" x="735" y="325">selected block</text><path class="a" d="M850 320L950 420"/><rect class="z" x="885" y="430" width="200" height="130" rx="6"/><text class="h" x="930" y="470">VMEM REF</text><text class="s" x="925" y="505">local block view</text><text class="s" x="915" y="535">used by block program</text><text class="s" x="65" y="690">Grid coordinates define repeated work; BlockSpec supplies the mapping from each program instance to global tensor slices.</text></svg>
