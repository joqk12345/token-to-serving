<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc"><title id="title">Pallas software pipeline overlaps transfer and compute</title><desc id="desc">A timeline has HBM load, VMEM compute, and store lanes. Loads for tiles t plus one and t plus two overlap computation on earlier tiles, using staged VMEM buffers.</desc><defs><style>.b{fill:#f7f8fa}.p{fill:#fff;stroke:#1f2933;stroke-width:2}.load{fill:#e8eef9;stroke:#355c9a;stroke-width:2}.comp{fill:#dcefe5;stroke:#287052;stroke-width:2}.store{fill:#fff0d6;stroke:#9a6518;stroke-width:2}.t{font:700 30px Arial;fill:#17212b}.h{font:700 18px Arial;fill:#17212b}.s{font:400 15px Arial;fill:#44515d}.axis{stroke:#53616d;stroke-width:2;fill:none;marker-end:url(#m)}.dash{stroke:#9aa3aa;stroke-width:1.5;stroke-dasharray:6 5}</style><marker id="m" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0L10 5L0 10z" fill="#53616d"/></marker></defs><rect class="b" width="1200" height="760"/><text class="t" x="65" y="60">Software pipelining stages the next tile early</text><text class="s" x="65" y="90">Conceptual Pallas timeline; useful overlap depends on tile size, buffers, dependencies, and hardware scheduling.</text><rect class="p" x="65" y="140" width="1070" height="470" rx="6"/><text class="h" x="95" y="200">HBM LOAD</text><text class="h" x="95" y="335">VMEM COMPUTE</text><text class="h" x="95" y="470">STORE</text><path class="axis" d="M245 545L1080 545"/><text class="s" x="1045" y="575">time</text><line class="dash" x1="430" y1="185" x2="430" y2="525"/><line class="dash" x1="650" y1="185" x2="650" y2="525"/><line class="dash" x1="870" y1="185" x2="870" y2="525"/>
<rect class="load" x="260" y="165" width="190" height="70" rx="5"/><text class="h" x="320" y="205">load tile t</text><rect class="load" x="480" y="165" width="190" height="70" rx="5"/><text class="h" x="520" y="205">load tile t+1</text><rect class="load" x="700" y="165" width="190" height="70" rx="5"/><text class="h" x="740" y="205">load tile t+2</text><rect class="comp" x="480" y="300" width="190" height="70" rx="5"/><text class="h" x="520" y="340">compute tile t</text><rect class="comp" x="700" y="300" width="190" height="70" rx="5"/><text class="h" x="725" y="340">compute tile t+1</text><rect class="comp" x="920" y="300" width="170" height="70" rx="5"/><text class="h" x="940" y="340">compute tile t+2</text><rect class="store" x="700" y="435" width="190" height="70" rx="5"/><text class="h" x="748" y="475">store tile t</text><rect class="store" x="920" y="435" width="170" height="70" rx="5"/><text class="h" x="945" y="475">store tile t+1</text><text class="s" x="465" y="270">next HBM transfer overlaps current VMEM compute</text><text class="s" x="65" y="675">Overlap consumes staging buffers and adds scheduling constraints; it is a latency-hiding mechanism, not a guaranteed speedup.</text></svg>
