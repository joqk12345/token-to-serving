<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc"><title id="title">Compiler choices change buffer lifetimes and memory traffic</title><desc id="desc">An unfused three-operation graph writes and reads two intermediate HBM buffers. An optimized graph fuses compatible operations and assigns a shorter-lived buffer. Qualitative memory timelines compare live ranges.</desc><defs><style>.b{fill:#f7f8fa}.p{fill:#fff;stroke:#1f2933;stroke-width:2}.op{fill:#e8eef9;stroke:#355c9a;stroke-width:2}.buf{fill:#fff0d6;stroke:#9a6518;stroke-width:2}.f{fill:#dcefe5;stroke:#287052;stroke-width:2}.t{font:700 30px Arial;fill:#17212b}.h{font:700 18px Arial;fill:#17212b}.s{font:400 15px Arial;fill:#44515d}.c{font:700 14px Arial;fill:#53616d}.a{stroke:#53616d;stroke-width:3;fill:none;marker-end:url(#m)}</style><marker id="m" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0L10 5L0 10z" fill="#53616d"/></marker></defs><rect class="b" width="1200" height="760"/><text class="t" x="65" y="60">Optimization changes where intermediates live</text><text class="s" x="65" y="90">Qualitative XLA example; fusion and buffer reuse depend on shapes, layouts, operations, and backend choices.</text><rect class="p" x="65" y="135" width="515" height="500" rx="6"/><text class="h" x="95" y="175">UNFUSED GRAPH</text><rect class="op" x="95" y="220" width="105" height="65" rx="5"/><text class="h" x="125" y="260">op 1</text><path class="a" d="M200 252L245 252"/><rect class="buf" x="255" y="210" width="130" height="85" rx="5"/><text class="h" x="285" y="245">buffer A</text><text class="s" x="278" y="272">HBM write/read</text><path class="a" d="M385 252L430 252"/><rect class="op" x="440" y="220" width="105" height="65" rx="5"/><text class="h" x="470" y="260">op 2</text><path class="a" d="M492 285L492 330"/><rect class="buf" x="425" y="340" width="135" height="85" rx="5"/><text class="h" x="455" y="375">buffer B</text><text class="s" x="450" y="402">HBM write/read</text><rect class="op" x="255" y="355" width="105" height="65" rx="5"/><text class="h" x="285" y="395">op 3</text><path class="a" d="M425 382L370 382"/><text class="c" x="95" y="480">LIVE-RANGE SKETCH</text><text class="s" x="95" y="520">A</text><rect class="buf" x="125" y="500" width="300" height="25" rx="3"/><text class="s" x="95" y="565">B</text><rect class="buf" x="240" y="545" width="250" height="25" rx="3"/>
<rect class="p" x="620" y="135" width="515" height="500" rx="6"/><text class="h" x="650" y="175">FUSED / PLANNED GRAPH</text><rect class="f" x="700" y="220" width="270" height="105" rx="6"/><text class="h" x="765" y="260">fused op 1 + op 2</text><text class="s" x="755" y="290">intermediate kept inside kernel</text><path class="a" d="M835 325L835 370"/><rect class="op" x="770" y="380" width="130" height="70" rx="5"/><text class="h" x="805" y="422">op 3</text><text class="c" x="650" y="500">LIVE-RANGE SKETCH</text><text class="s" x="650" y="540">assigned buffer</text><rect class="f" x="765" y="520" width="210" height="25" rx="3"/><text class="s" x="650" y="585">Layout, fusion, and assignment jointly determine storage and traffic.</text><text class="s" x="65" y="690">A compiler can remove some intermediate boundaries or reuse storage; it does not guarantee fewer transfers for every program.</text></svg>
