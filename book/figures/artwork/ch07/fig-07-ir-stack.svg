<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc"><title id="title">JAX and XLA compilation stack</title><desc id="desc">A layered stack descends from Python and JAX transformations through JAXpr, StableHLO, HLO, backend IR, executable code, and device hardware. StableHLO marks a portability-oriented boundary; backend IR begins hardware-specific lowering.</desc><defs><style>.b{fill:#f7f8fa}.p{fill:#fff;stroke:#1f2933;stroke-width:2}.x{fill:#e8eef9;stroke:#355c9a;stroke-width:2}.y{fill:#dcefe5;stroke:#287052;stroke-width:2}.z{fill:#fff0d6;stroke:#9a6518;stroke-width:2}.v{fill:#f3e8fa;stroke:#70428e;stroke-width:2}.t{font:700 30px Arial;fill:#17212b}.h{font:700 18px Arial;fill:#17212b}.s{font:400 15px Arial;fill:#44515d}.c{font:700 14px Arial;fill:#53616d}.dash{stroke:#53616d;stroke-width:2;stroke-dasharray:8 6}</style></defs><rect class="b" width="1200" height="760"/><text class="t" x="65" y="60">IR boundaries separate intent from target execution</text><text class="s" x="65" y="90">JAX/XLA-oriented stack; other compiler ecosystems may use different representations and boundaries.</text><rect class="p" x="65" y="130" width="1070" height="520" rx="6"/>
<rect class="x" x="270" y="165" width="520" height="60" rx="5"/><text class="h" x="445" y="202">Python + JAX transformations</text><rect class="x" x="300" y="240" width="460" height="60" rx="5"/><text class="h" x="495" y="277">JAXpr</text><rect class="y" x="330" y="315" width="400" height="60" rx="5"/><text class="h" x="480" y="352">StableHLO</text><line class="dash" x1="175" y1="390" x2="985" y2="390"/><text class="c" x="800" y="378">PORTABILITY-ORIENTED BOUNDARY</text><rect class="y" x="360" y="405" width="340" height="60" rx="5"/><text class="h" x="512" y="442">HLO</text><rect class="z" x="390" y="480" width="280" height="60" rx="5"/><text class="h" x="475" y="517">Backend IR</text><line class="dash" x1="175" y1="555" x2="985" y2="555"/><text class="c" x="755" y="543">HARDWARE-SPECIFIC LOWERING</text><rect class="v" x="420" y="570" width="220" height="55" rx="5"/><text class="h" x="470" y="605">Executable → device</text><text class="s" x="835" y="210">user semantics</text><text class="s" x="835" y="285">captured primitives</text><text class="s" x="835" y="350">portable operators</text><text class="s" x="835" y="440">optimization IR</text><text class="s" x="835" y="515">target code generation</text><text class="s" x="65" y="700">Each representation preserves different information for transformations, portability, optimization, layout, buffers, and target code generation.</text></svg>
