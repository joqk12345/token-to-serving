<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc"><title id="title">From Python function to accelerator execution</title><desc id="desc">Python code is traced into a graph, lowered through JAX and XLA intermediate representations, optimized, compiled by a backend, and dispatched as an executable to an accelerator.</desc><defs><style>.b{fill:#f7f8fa}.p{fill:#fff;stroke:#1f2933;stroke-width:2}.x{fill:#e8eef9;stroke:#355c9a;stroke-width:2}.y{fill:#dcefe5;stroke:#287052;stroke-width:2}.z{fill:#fff0d6;stroke:#9a6518;stroke-width:2}.v{fill:#f3e8fa;stroke:#70428e;stroke-width:2}.t{font:700 30px Arial;fill:#17212b}.h{font:700 18px Arial;fill:#17212b}.s{font:400 15px Arial;fill:#44515d}.c{font:700 14px Arial;fill:#53616d}.a{stroke:#53616d;stroke-width:3;fill:none;marker-end:url(#m)}</style><marker id="m" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0L10 5L0 10z" fill="#53616d"/></marker></defs><rect class="b" width="1200" height="760"/><text class="t" x="65" y="60">A framework turns Python into device work</text><text class="s" x="65" y="90">JAX/XLA-oriented example; other framework and compiler stacks use different boundaries.</text><rect class="p" x="65" y="140" width="1070" height="460" rx="6"/>
<rect class="x" x="95" y="275" width="150" height="110" rx="6"/><text class="h" x="135" y="320">PYTHON</text><text class="s" x="125" y="350">model function</text><path class="a" d="M245 330L300 330"/><text class="c" x="255" y="305">TRACE</text><rect class="x" x="310" y="275" width="165" height="110" rx="6"/><text class="h" x="345" y="320">JAXPR / GRAPH</text><text class="s" x="347" y="350">captured primitives</text><path class="a" d="M475 330L530 330"/><text class="c" x="480" y="305">LOWER</text><rect class="y" x="540" y="260" width="170" height="140" rx="6"/><text class="h" x="574" y="305">STABLEHLO</text><text class="s" x="584" y="335">portable ops</text><text class="h" x="605" y="375">HLO</text><path class="a" d="M710 330L765 330"/><text class="c" x="715" y="305">OPTIMIZE</text><rect class="z" x="775" y="275" width="150" height="110" rx="6"/><text class="h" x="805" y="320">BACKEND</text><text class="s" x="798" y="350">target codegen</text><path class="a" d="M925 330L980 330"/><rect class="v" x="990" y="250" width="115" height="160" rx="6"/><text class="h" x="1010" y="295">DEVICE</text><text class="s" x="1007" y="330">executable</text><text class="s" x="1005" y="360">accelerator</text><text class="s" x="65" y="670">The accelerator runs a scheduled executable with concrete operations, buffers, layouts, and kernels—not the Python source directly.</text></svg>
