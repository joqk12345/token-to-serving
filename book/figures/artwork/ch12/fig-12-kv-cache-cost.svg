<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc"><title id="title">KV cache grows with token positions across layers</title><desc id="desc">Four layer rows and six token columns show paired key and value cells. New columns are added at each decode step for every layer.</desc><defs><style>.b{fill:#f7f8fa}.p{fill:#fff;stroke:#1f2933;stroke-width:2}.k{fill:#e8eef9;stroke:#355c9a;stroke-width:1.5}.v{fill:#dcefe5;stroke:#287052;stroke-width:1.5}.new{stroke:#9a6518;stroke-width:4}.t{font:700 30px Arial;fill:#17212b}.h{font:700 17px Arial;fill:#17212b}.s{font:400 15px Arial;fill:#44515d}.a{stroke:#9a6518;stroke-width:3;fill:none;marker-end:url(#m)}</style><marker id="m" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0L10 5L0 10z" fill="#9a6518"/></marker></defs><rect class="b" width="1200" height="760"/><text class="t" x="65" y="60">Each decode token extends KV state at every layer</text><text class="s" x="65" y="90">No byte formula is shown; size also depends on layers, head structure, dimensions, precision, and runtime layout.</text><rect class="p" x="65" y="135" width="1070" height="500" rx="6"/><text class="h" x="95" y="220">layer 0</text><text class="h" x="95" y="310">layer 1</text><text class="h" x="95" y="400">layer 2</text><text class="h" x="95" y="490">layer 3</text><g><text class="s" x="240" y="180">tok 0</text><text class="s" x="380" y="180">tok 1</text><text class="s" x="520" y="180">tok 2</text><text class="s" x="660" y="180">tok 3</text><text class="s" x="800" y="180">tok 4</text><text class="s" x="940" y="180">new tok 5</text></g><g>
<rect class="k" x="210" y="195" width="55" height="45"/><rect class="v" x="265" y="195" width="55" height="45"/><rect class="k" x="350" y="195" width="55" height="45"/><rect class="v" x="405" y="195" width="55" height="45"/><rect class="k" x="490" y="195" width="55" height="45"/><rect class="v" x="545" y="195" width="55" height="45"/><rect class="k" x="630" y="195" width="55" height="45"/><rect class="v" x="685" y="195" width="55" height="45"/><rect class="k" x="770" y="195" width="55" height="45"/><rect class="v" x="825" y="195" width="55" height="45"/><rect class="k new" x="910" y="195" width="55" height="45"/><rect class="v new" x="965" y="195" width="55" height="45"/>
<rect class="k" x="210" y="285" width="55" height="45"/><rect class="v" x="265" y="285" width="55" height="45"/><rect class="k" x="350" y="285" width="55" height="45"/><rect class="v" x="405" y="285" width="55" height="45"/><rect class="k" x="490" y="285" width="55" height="45"/><rect class="v" x="545" y="285" width="55" height="45"/><rect class="k" x="630" y="285" width="55" height="45"/><rect class="v" x="685" y="285" width="55" height="45"/><rect class="k" x="770" y="285" width="55" height="45"/><rect class="v" x="825" y="285" width="55" height="45"/><rect class="k new" x="910" y="285" width="55" height="45"/><rect class="v new" x="965" y="285" width="55" height="45"/>
<rect class="k" x="210" y="375" width="55" height="45"/><rect class="v" x="265" y="375" width="55" height="45"/><rect class="k" x="350" y="375" width="55" height="45"/><rect class="v" x="405" y="375" width="55" height="45"/><rect class="k" x="490" y="375" width="55" height="45"/><rect class="v" x="545" y="375" width="55" height="45"/><rect class="k" x="630" y="375" width="55" height="45"/><rect class="v" x="685" y="375" width="55" height="45"/><rect class="k" x="770" y="375" width="55" height="45"/><rect class="v" x="825" y="375" width="55" height="45"/><rect class="k new" x="910" y="375" width="55" height="45"/><rect class="v new" x="965" y="375" width="55" height="45"/>
<rect class="k" x="210" y="465" width="55" height="45"/><rect class="v" x="265" y="465" width="55" height="45"/><rect class="k" x="350" y="465" width="55" height="45"/><rect class="v" x="405" y="465" width="55" height="45"/><rect class="k" x="490" y="465" width="55" height="45"/><rect class="v" x="545" y="465" width="55" height="45"/><rect class="k" x="630" y="465" width="55" height="45"/><rect class="v" x="685" y="465" width="55" height="45"/><rect class="k" x="770" y="465" width="55" height="45"/><rect class="v" x="825" y="465" width="55" height="45"/><rect class="k new" x="910" y="465" width="55" height="45"/><rect class="v new" x="965" y="465" width="55" height="45"/></g><text class="s" x="220" y="565">blue = key · green = value</text><path class="a" d="M965 560L965 520"/><text class="s" x="980" y="565">decode step adds one K/V pair per layer</text><text class="s" x="65" y="690">KV cache is persistent serving state, so admission depends on memory as well as available compute.</text></svg>
