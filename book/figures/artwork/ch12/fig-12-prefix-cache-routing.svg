<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc"><title id="title">Cache-aware routing can reuse shared prompt prefixes</title><desc id="desc">Three request prompts share a system-prefix path and then diverge. A cache-aware scheduler routes two matching requests to worker A, which holds the prefix cache, while a nonmatching request goes to worker B and performs its own prefill.</desc><defs><style>.b{fill:#f7f8fa}.p{fill:#fff;stroke:#1f2933;stroke-width:2}.pre{fill:#e8eef9;stroke:#355c9a;stroke-width:2}.hit{fill:#dcefe5;stroke:#287052;stroke-width:2}.miss{fill:#fff0d6;stroke:#9a6518;stroke-width:2}.sch{fill:#f3e8fa;stroke:#70428e;stroke-width:2}.t{font:700 30px Arial;fill:#17212b}.h{font:700 17px Arial;fill:#17212b}.s{font:400 15px Arial;fill:#44515d}.a{stroke:#53616d;stroke-width:3;fill:none;marker-end:url(#m)}</style><marker id="m" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0L10 5L0 10z" fill="#53616d"/></marker></defs><rect class="b" width="1200" height="760"/><text class="t" x="65" y="60">Prefix reuse requires cache-aware placement</text><text class="s" x="65" y="90">A shared prefix does not guarantee a hit; routing, residency, capacity, and eviction policy determine reuse.</text><rect class="p" x="65" y="135" width="1070" height="500" rx="6"/><text class="h" x="95" y="185">REQUEST PREFIX TREE</text><rect class="pre" x="95" y="285" width="190" height="90" rx="5"/><text class="h" x="125" y="325">shared system prefix</text><text class="s" x="135" y="352">cached candidate</text><path class="a" d="M285 330L380 245M285 330L380 330M285 330L380 425"/><rect class="hit" x="390" y="205" width="130" height="70" rx="5"/><text class="h" x="425" y="247">request A</text><rect class="hit" x="390" y="295" width="130" height="70" rx="5"/><text class="h" x="425" y="337">request B</text><rect class="miss" x="390" y="385" width="130" height="70" rx="5"/><text class="h" x="425" y="427">request C</text><path class="a" d="M520 240L625 320M520 330L625 335M520 420L625 365"/><rect class="sch" x="635" y="275" width="190" height="130" rx="6"/><text class="h" x="675" y="315">CACHE-AWARE</text><text class="h" x="690" y="342">SCHEDULER</text><text class="s" x="675" y="375">match prefix residency</text><path class="a" d="M825 325L910 245M825 355L910 455"/><rect class="hit" x="920" y="195" width="175" height="120" rx="6"/><text class="h" x="965" y="235">WORKER A</text><text class="s" x="945" y="270">prefix cache resident</text><text class="s" x="960" y="295">A/B may reuse</text><rect class="miss" x="920" y="405" width="175" height="120" rx="6"/><text class="h" x="965" y="445">WORKER B</text><text class="s" x="950" y="480">no matching state</text><text class="s" x="960" y="505">C runs prefill</text><text class="s" x="65" y="690">Cache-aware scheduling adds memory locality to the admission decision instead of considering queue order alone.</text></svg>
