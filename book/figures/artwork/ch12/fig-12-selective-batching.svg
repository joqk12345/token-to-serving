<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc"><title id="title">Selective batching separates shared operators from request-specific attention</title><desc id="desc">A request batch runs shared linear normalization and elementwise operators together, then branches into request-specific attention and KV cache paths before rejoining for batched work.</desc><defs><style>.b{fill:#f7f8fa}.p{fill:#fff;stroke:#1f2933;stroke-width:2}.x{fill:#e8eef9;stroke:#355c9a;stroke-width:2}.y{fill:#dcefe5;stroke:#287052;stroke-width:2}.z{fill:#fff0d6;stroke:#9a6518;stroke-width:2}.t{font:700 30px Arial;fill:#17212b}.h{font:700 18px Arial;fill:#17212b}.s{font:400 15px Arial;fill:#44515d}.a{stroke:#53616d;stroke-width:3;fill:none;marker-end:url(#m)}</style><marker id="m" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0L10 5L0 10z" fill="#53616d"/></marker></defs><rect class="b" width="1200" height="760"/><text class="t" x="65" y="60">Not every Transformer operation batches the same way</text><text class="s" x="65" y="90">Conceptual selective batching; no ORCA-specific implementation structure is assumed.</text><rect class="p" x="65" y="135" width="1070" height="500" rx="6"/><rect class="x" x="95" y="305" width="150" height="100" rx="5"/><text class="h" x="125" y="345">REQUEST BATCH</text><text class="s" x="125" y="375">different lengths</text><path class="a" d="M245 355L335 355"/><rect class="y" x="345" y="285" width="210" height="140" rx="6"/><text class="h" x="390" y="325">BATCHED OPS</text><text class="s" x="390" y="360">linear · norm</text><text class="s" x="390" y="390">elementwise</text><path class="a" d="M555 335L650 245M555 375L650 465"/><rect class="z" x="660" y="195" width="230" height="130" rx="6"/><text class="h" x="710" y="235">ATTENTION PATH</text><text class="s" x="700" y="270">request-specific lengths</text><text class="s" x="700" y="298">and attention state</text><rect class="z" x="660" y="405" width="230" height="130" rx="6"/><text class="h" x="715" y="445">KV CACHE PATH</text><text class="s" x="700" y="480">per-request addresses</text><text class="s" x="700" y="508">and cache contents</text><path class="a" d="M890 260L970 345M890 470L970 385"/><rect class="y" x="980" y="315" width="125" height="100" rx="5"/><text class="h" x="1015" y="355">REJOIN</text><text class="s" x="1010" y="385">next ops</text><text class="s" x="65" y="690">Selective batching preserves shared GPU work while respecting request-specific attention and cache state.</text></svg>
