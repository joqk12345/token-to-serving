<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc"><title id="title">Inference changes shape from prefill to decode</title><desc id="desc">Prompt tokens enter one bulk prefill phase. Repeated decode steps each append one generated token and extend the KV cache.</desc><defs><style>.b{fill:#f7f8fa}.p{fill:#fff;stroke:#1f2933;stroke-width:2}.pr{fill:#e8eef9;stroke:#355c9a;stroke-width:2}.pf{fill:#dcefe5;stroke:#287052;stroke-width:2}.de{fill:#fff0d6;stroke:#9a6518;stroke-width:2}.kv{fill:#f3e8fa;stroke:#70428e;stroke-width:2}.t{font:700 30px Arial;fill:#17212b}.h{font:700 18px Arial;fill:#17212b}.s{font:400 15px Arial;fill:#44515d}.a{stroke:#53616d;stroke-width:3;fill:none;marker-end:url(#m)}</style><marker id="m" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0L10 5L0 10z" fill="#53616d"/></marker></defs><rect class="b" width="1200" height="760"/><text class="t" x="65" y="60">Prefill and decode expose different work shapes</text><text class="s" x="65" y="90">Qualitative timeline; latency depends on model, hardware, prompt, batch, precision, and runtime.</text><rect class="p" x="65" y="135" width="1070" height="500" rx="6"/><rect class="pr" x="95" y="265" width="210" height="100" rx="5"/><text class="h" x="135" y="305">PROMPT TOKENS</text><text class="s" x="130" y="338">t₀ t₁ t₂ … tₙ</text><path class="a" d="M305 315L375 315"/><rect class="pf" x="385" y="245" width="220" height="140" rx="6"/><text class="h" x="460" y="290">PREFILL</text><text class="s" x="425" y="325">process prompt context</text><text class="s" x="425" y="355">initialize KV cache</text><path class="a" d="M605 315L665 315"/><rect class="de" x="675" y="255" width="115" height="120" rx="5"/><text class="h" x="700" y="295">DECODE 1</text><text class="s" x="710" y="330">+ token</text><rect class="de" x="815" y="255" width="115" height="120" rx="5"/><text class="h" x="840" y="295">DECODE 2</text><text class="s" x="850" y="330">+ token</text><rect class="de" x="955" y="255" width="115" height="120" rx="5"/><text class="h" x="980" y="295">DECODE 3</text><text class="s" x="990" y="330">+ token</text><path class="a" d="M790 315L805 315M930 315L945 315"/><text class="h" x="95" y="470">KV CACHE GROWTH</text><rect class="kv" x="250" y="440" width="355" height="55"/><rect class="kv" x="675" y="440" width="115" height="55"/><rect class="kv" x="790" y="440" width="140" height="55"/><rect class="kv" x="930" y="440" width="140" height="55"/><text class="s" x="280" y="475">prompt state</text><text class="s" x="700" y="475">+1</text><text class="s" x="840" y="475">+1</text><text class="s" x="980" y="475">+1</text><text class="s" x="65" y="690">Prefill processes many input positions together; decode is sequential per request but can batch iterations across requests.</text></svg>
