<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc"><title id="title">Continuous batching updates membership between iterations</title><desc id="desc">Five decode-iteration columns show active requests. A and C complete and leave; newly admitted D and E enter later iterations while B continues.</desc><defs><style>.b{fill:#f7f8fa}.p{fill:#fff;stroke:#1f2933;stroke-width:2}.act{fill:#e8eef9;stroke:#355c9a;stroke-width:2}.new{fill:#dcefe5;stroke:#287052;stroke-width:2}.done{fill:#fff0d6;stroke:#9a6518;stroke-width:2}.t{font:700 30px Arial;fill:#17212b}.h{font:700 18px Arial;fill:#17212b}.s{font:400 15px Arial;fill:#44515d}</style></defs><rect class="b" width="1200" height="760"/><text class="t" x="65" y="60">Continuous batching reschedules at iteration boundaries</text><text class="s" x="65" y="90">Admission and removal are conceptual; individual serving engines use different policies.</text><rect class="p" x="65" y="135" width="1070" height="500" rx="6"/><g><text class="h" x="160" y="190">ITER 1</text><text class="h" x="350" y="190">ITER 2</text><text class="h" x="540" y="190">ITER 3</text><text class="h" x="730" y="190">ITER 4</text><text class="h" x="920" y="190">ITER 5</text></g><g class="act"><rect x="125" y="225" width="140" height="60"/><rect x="315" y="225" width="140" height="60"/><rect x="125" y="315" width="140" height="60"/><rect x="315" y="315" width="140" height="60"/><rect x="505" y="315" width="140" height="60"/><rect x="695" y="315" width="140" height="60"/><rect x="885" y="315" width="140" height="60"/><rect x="125" y="405" width="140" height="60"/></g><text class="h" x="185" y="263">A</text><text class="h" x="375" y="263">A ✓</text><text class="h" x="185" y="353">B</text><text class="h" x="375" y="353">B</text><text class="h" x="565" y="353">B</text><text class="h" x="755" y="353">B</text><text class="h" x="945" y="353">B</text><text class="h" x="185" y="443">C ✓</text><rect class="new" x="315" y="405" width="140" height="60"/><rect class="new" x="505" y="405" width="140" height="60"/><rect class="new" x="695" y="405" width="140" height="60"/><text class="h" x="375" y="443">D new</text><text class="h" x="565" y="443">D</text><text class="h" x="755" y="443">D</text><rect class="new" x="505" y="495" width="140" height="60"/><rect class="new" x="695" y="495" width="140" height="60"/><rect class="new" x="885" y="495" width="140" height="60"/><text class="h" x="565" y="533">E new</text><text class="h" x="755" y="533">E</text><text class="h" x="945" y="533">E</text><text class="s" x="120" y="600">scheduler removes completed requests and admits queued work between model iterations</text><text class="s" x="65" y="690">Iteration-level scheduling improves flexibility under variable output lengths but still trades admission, latency, compute, and KV memory.</text></svg>
