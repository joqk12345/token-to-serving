<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc"><title id="title">An inference scheduler runs a request and memory control loop</title><desc id="desc">A generic loop moves from request queue to admission and batch formation, model step, streamed token and stop checks, memory-state update or free, then back to scheduling.</desc><defs><style>.b{fill:#f7f8fa}.p{fill:#fff;stroke:#1f2933;stroke-width:2}.x{fill:#e8eef9;stroke:#355c9a;stroke-width:2}.y{fill:#dcefe5;stroke:#287052;stroke-width:2}.z{fill:#fff0d6;stroke:#9a6518;stroke-width:2}.v{fill:#f3e8fa;stroke:#70428e;stroke-width:2}.t{font:700 30px Arial;fill:#17212b}.h{font:700 17px Arial;fill:#17212b}.s{font:400 15px Arial;fill:#44515d}.a{stroke:#53616d;stroke-width:3;fill:none;marker-end:url(#m)}</style><marker id="m" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0L10 5L0 10z" fill="#53616d"/></marker></defs><rect class="b" width="1200" height="760"/><text class="t" x="65" y="60">Serving is a repeated scheduling and memory loop</text><text class="s" x="65" y="90">Architecture-level control flow; no engine-specific class structure is assumed.</text><rect class="p" x="65" y="135" width="1070" height="500" rx="6"/><rect class="x" x="95" y="290" width="165" height="110" rx="6"/><text class="h" x="135" y="330">REQUEST QUEUE</text><text class="s" x="125" y="365">new + waiting work</text><path class="a" d="M260 345L345 345"/><rect class="y" x="355" y="270" width="190" height="150" rx="6"/><text class="h" x="405" y="310">SCHEDULER</text><text class="s" x="395" y="345">admit requests</text><text class="s" x="395" y="375">form model-step batch</text><path class="a" d="M545 345L630 345"/><rect class="z" x="640" y="290" width="160" height="110" rx="6"/><text class="h" x="680" y="330">MODEL STEP</text><text class="s" x="680" y="365">prefill / decode</text><path class="a" d="M800 345L885 345"/><rect class="v" x="895" y="270" width="190" height="150" rx="6"/><text class="h" x="935" y="310">TOKEN + RESULT</text><text class="s" x="935" y="345">stream output</text><text class="s" x="935" y="375">check stop condition</text><path class="a" d="M990 420L990 500L720 500"/><rect class="x" x="475" y="465" width="245" height="105" rx="6"/><text class="h" x="520" y="505">MEMORY MANAGER</text><text class="s" x="515" y="540">extend KV · retain · free completed</text><path class="a" d="M475 518C300 518 300 420 405 420"/><text class="s" x="65" y="690">Scheduler and memory decisions occur on the serving critical path between repeated model iterations.</text></svg>
