<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc"><title id="title">Request-level batches wait for the longest generation</title><desc id="desc">Three request rows begin together. Requests A and C finish early, but their batch slots remain tied up while longer request B continues.</desc><defs><style>.b{fill:#f7f8fa}.p{fill:#fff;stroke:#1f2933;stroke-width:2}.run{fill:#e8eef9;stroke:#355c9a;stroke-width:2}.idle{fill:#fff0d6;stroke:#9a6518;stroke-width:2;stroke-dasharray:7 5}.t{font:700 30px Arial;fill:#17212b}.h{font:700 18px Arial;fill:#17212b}.s{font:400 15px Arial;fill:#44515d}.axis{stroke:#53616d;stroke-width:2;fill:none;marker-end:url(#m)}</style><marker id="m" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0L10 5L0 10z" fill="#53616d"/></marker></defs><rect class="b" width="1200" height="760"/><text class="t" x="65" y="60">A fixed request batch inherits the longest output</text><text class="s" x="65" y="90">Illustrative lengths only; no utilization percentage or workload distribution is implied.</text><rect class="p" x="65" y="135" width="1070" height="500" rx="6"/><text class="h" x="95" y="240">request A</text><rect class="run" x="230" y="205" width="300" height="55"/><rect class="idle" x="530" y="205" width="500" height="55"/><text class="s" x="555" y="240">finished · slot remains tied to batch</text><text class="h" x="95" y="355">request B</text><rect class="run" x="230" y="320" width="800" height="55"/><text class="s" x="850" y="355">longest generation</text><text class="h" x="95" y="470">request C</text><rect class="run" x="230" y="435" width="430" height="55"/><rect class="idle" x="660" y="435" width="370" height="55"/><text class="s" x="680" y="470">finished · waiting</text><path class="axis" d="M210 550L1060 550"/><text class="s" x="1025" y="580">time</text><text class="s" x="65" y="690">The scheduling problem is batch membership: completed slots cannot admit new work until the fixed batch ends.</text></svg>
