<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc"><title id="title">A naive layer pipeline leaves devices idle</title><desc id="desc">Four stage rows show one unsplit batch moving forward through stages 0 to 3 and backward through stages 3 to 0. Most timeline cells are idle, revealing large pipeline bubbles.</desc><defs><style>.b{fill:#f7f8fa}.p{fill:#fff;stroke:#1f2933;stroke-width:2}.f{fill:#e8eef9;stroke:#355c9a;stroke-width:2}.bw{fill:#dcefe5;stroke:#287052;stroke-width:2}.idle{fill:#fff0d6;stroke:#d6b477;stroke-width:1}.t{font:700 30px Arial;fill:#17212b}.h{font:700 18px Arial;fill:#17212b}.s{font:400 15px Arial;fill:#44515d}.axis{stroke:#53616d;stroke-width:2;fill:none;marker-end:url(#m)}</style><marker id="m" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0L10 5L0 10z" fill="#53616d"/></marker></defs><rect class="b" width="1200" height="760"/><text class="t" x="65" y="60">One batch does not fill a multi-stage pipeline</text><text class="s" x="65" y="90">Illustrative four-stage schedule; no bubble-size formula is implied.</text><rect class="p" x="65" y="135" width="1070" height="500" rx="6"/><g><text class="h" x="95" y="230">stage 0</text><text class="h" x="95" y="320">stage 1</text><text class="h" x="95" y="410">stage 2</text><text class="h" x="95" y="500">stage 3</text></g>
<g class="idle"><rect x="220" y="190" width="100" height="55"/><rect x="320" y="190" width="100" height="55"/><rect x="420" y="190" width="100" height="55"/><rect x="520" y="190" width="100" height="55"/><rect x="620" y="190" width="100" height="55"/><rect x="720" y="190" width="100" height="55"/><rect x="820" y="190" width="100" height="55"/><rect x="220" y="280" width="700" height="55"/><rect x="220" y="370" width="700" height="55"/><rect x="220" y="460" width="700" height="55"/></g>
<rect class="f" x="220" y="190" width="100" height="55"/><text class="h" x="255" y="225">F</text><rect class="f" x="320" y="280" width="100" height="55"/><text class="h" x="355" y="315">F</text><rect class="f" x="420" y="370" width="100" height="55"/><text class="h" x="455" y="405">F</text><rect class="f" x="520" y="460" width="100" height="55"/><text class="h" x="555" y="495">F</text><rect class="bw" x="620" y="460" width="100" height="55"/><text class="h" x="655" y="495">B</text><rect class="bw" x="720" y="370" width="100" height="55"/><text class="h" x="755" y="405">B</text><rect class="bw" x="820" y="280" width="100" height="55"/><text class="h" x="855" y="315">B</text><rect class="bw" x="920" y="190" width="100" height="55"/><text class="h" x="955" y="225">B</text><path class="axis" d="M200 560L1050 560"/><text class="s" x="1015" y="590">time</text><text class="s" x="400" y="610">cream cells = idle stage time / pipeline bubble</text><text class="s" x="65" y="690">Partitioning layers makes the model fit, but scheduling only one work item leaves most devices waiting.</text></svg>
