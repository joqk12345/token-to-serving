<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc"><title id="title">GPipe-style micro-batches fill pipeline stages</title><desc id="desc">Four stage rows show four forward micro-batches moving diagonally through a pipeline. Warmup and drain regions remain idle, while the central region has multiple stages active on different micro-batches.</desc><defs><style>.b{fill:#f7f8fa}.p{fill:#fff;stroke:#1f2933;stroke-width:2}.m1{fill:#e8eef9;stroke:#355c9a;stroke-width:2}.m2{fill:#dcefe5;stroke:#287052;stroke-width:2}.m3{fill:#fff0d6;stroke:#9a6518;stroke-width:2}.m4{fill:#f3e8fa;stroke:#70428e;stroke-width:2}.t{font:700 30px Arial;fill:#17212b}.h{font:700 17px Arial;fill:#17212b}.s{font:400 15px Arial;fill:#44515d}.axis{stroke:#53616d;stroke-width:2;fill:none;marker-end:url(#m)}</style><marker id="m" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0L10 5L0 10z" fill="#53616d"/></marker></defs><rect class="b" width="1200" height="760"/><text class="t" x="65" y="60">Micro-batches create independent pipeline work</text><text class="s" x="65" y="90">GPipe-style forward fill; warmup and drain remain, and more in-flight work can increase activation storage.</text><rect class="p" x="65" y="135" width="1070" height="500" rx="6"/><text class="h" x="95" y="230">stage 0</text><text class="h" x="95" y="320">stage 1</text><text class="h" x="95" y="410">stage 2</text><text class="h" x="95" y="500">stage 3</text><text class="s" x="220" y="175">WARMUP</text><text class="s" x="535" y="175">MULTIPLE STAGES ACTIVE</text><text class="s" x="940" y="175">DRAIN</text>
<g><rect class="m1" x="220" y="195" width="105" height="55"/><text class="h" x="250" y="230">F·mb1</text><rect class="m2" x="325" y="195" width="105" height="55"/><text class="h" x="355" y="230">F·mb2</text><rect class="m3" x="430" y="195" width="105" height="55"/><text class="h" x="460" y="230">F·mb3</text><rect class="m4" x="535" y="195" width="105" height="55"/><text class="h" x="565" y="230">F·mb4</text><rect class="m1" x="325" y="285" width="105" height="55"/><text class="h" x="355" y="320">F·mb1</text><rect class="m2" x="430" y="285" width="105" height="55"/><text class="h" x="460" y="320">F·mb2</text><rect class="m3" x="535" y="285" width="105" height="55"/><text class="h" x="565" y="320">F·mb3</text><rect class="m4" x="640" y="285" width="105" height="55"/><text class="h" x="670" y="320">F·mb4</text><rect class="m1" x="430" y="375" width="105" height="55"/><text class="h" x="460" y="410">F·mb1</text><rect class="m2" x="535" y="375" width="105" height="55"/><text class="h" x="565" y="410">F·mb2</text><rect class="m3" x="640" y="375" width="105" height="55"/><text class="h" x="670" y="410">F·mb3</text><rect class="m4" x="745" y="375" width="105" height="55"/><text class="h" x="775" y="410">F·mb4</text><rect class="m1" x="535" y="465" width="105" height="55"/><text class="h" x="565" y="500">F·mb1</text><rect class="m2" x="640" y="465" width="105" height="55"/><text class="h" x="670" y="500">F·mb2</text><rect class="m3" x="745" y="465" width="105" height="55"/><text class="h" x="775" y="500">F·mb3</text><rect class="m4" x="850" y="465" width="105" height="55"/><text class="h" x="880" y="500">F·mb4</text></g><path class="axis" d="M200 560L1050 560"/><text class="s" x="1015" y="590">time</text><text class="s" x="65" y="690">Micro-batching reduces idle gaps after warmup; it does not remove pipeline bubbles or activation-memory costs.</text></svg>
