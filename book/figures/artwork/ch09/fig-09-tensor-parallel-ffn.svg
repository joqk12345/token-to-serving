<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc"><title id="title">Tensor-parallel FFN splits matrix work across devices</title><desc id="desc">An input activation is sent to two devices. The first FFN projection is column-partitioned, producing local hidden features. The second projection is row-partitioned, producing partial outputs that are combined by a collective into the logical FFN output.</desc><defs><style>.b{fill:#f7f8fa}.p{fill:#fff;stroke:#1f2933;stroke-width:2}.x{fill:#e8eef9;stroke:#355c9a;stroke-width:2}.y{fill:#dcefe5;stroke:#287052;stroke-width:2}.z{fill:#fff0d6;stroke:#9a6518;stroke-width:2}.v{fill:#f3e8fa;stroke:#70428e;stroke-width:2}.t{font:700 30px Arial;fill:#17212b}.h{font:700 18px Arial;fill:#17212b}.s{font:400 15px Arial;fill:#44515d}.a{stroke:#53616d;stroke-width:3;fill:none;marker-end:url(#m)}</style><marker id="m" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0L10 5L0 10z" fill="#53616d"/></marker></defs><rect class="b" width="1200" height="760"/><text class="t" x="65" y="60">Tensor parallelism partitions FFN matrix operations</text><text class="s" x="65" y="90">Symbolic two-device layout; exact partitions and collectives depend on the implementation.</text><rect class="p" x="65" y="135" width="1070" height="500" rx="6"/><rect class="x" x="95" y="320" width="115" height="85" rx="5"/><text class="h" x="135" y="355">X</text><text class="s" x="115" y="382">input activation</text><path class="a" d="M210 350L275 265M210 375L275 460"/>
<rect class="y" x="285" y="205" width="180" height="120" rx="6"/><text class="h" x="325" y="245">DEVICE 0</text><text class="s" x="315" y="275">column shard W₁⁽⁰⁾</text><text class="s" x="325" y="302">local hidden H₀</text><rect class="y" x="285" y="405" width="180" height="120" rx="6"/><text class="h" x="325" y="445">DEVICE 1</text><text class="s" x="315" y="475">column shard W₁⁽¹⁾</text><text class="s" x="325" y="502">local hidden H₁</text><path class="a" d="M465 265L540 265M465 465L540 465"/><rect class="z" x="550" y="205" width="180" height="120" rx="6"/><text class="h" x="595" y="245">ROW SHARD</text><text class="s" x="580" y="275">H₀ W₂⁽⁰⁾</text><text class="s" x="585" y="302">partial O₀</text><rect class="z" x="550" y="405" width="180" height="120" rx="6"/><text class="h" x="595" y="445">ROW SHARD</text><text class="s" x="580" y="475">H₁ W₂⁽¹⁾</text><text class="s" x="585" y="502">partial O₁</text><path class="a" d="M730 265L820 335M730 465L820 390"/><rect class="v" x="830" y="315" width="150" height="100" rx="50"/><text class="h" x="860" y="355">COLLECTIVE</text><text class="s" x="865" y="385">combine partials</text><path class="a" d="M980 365L1035 365"/><rect class="x" x="1045" y="325" width="65" height="80" rx="5"/><text class="h" x="1068" y="372">O</text><text class="s" x="65" y="690">The partition reduces per-device matrix work but introduces communication where the logical layer result must be assembled.</text></svg>
