<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc"><title id="title">Data parallelism replicates while model parallelism partitions</title><desc id="desc">The left panel shows identical model replicas processing different data shards and synchronizing gradients. The right panel shows one model split into stages on different devices with activations crossing partition boundaries.</desc><defs><style>.b{fill:#f7f8fa}.p{fill:#fff;stroke:#1f2933;stroke-width:2}.d{fill:#e8eef9;stroke:#355c9a;stroke-width:2}.m{fill:#dcefe5;stroke:#287052;stroke-width:2}.g{fill:#fff0d6;stroke:#9a6518;stroke-width:2}.t{font:700 30px Arial;fill:#17212b}.h{font:700 19px Arial;fill:#17212b}.s{font:400 15px Arial;fill:#44515d}.a{stroke:#53616d;stroke-width:3;fill:none;marker-end:url(#x)}</style><marker id="x" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0L10 5L0 10z" fill="#53616d"/></marker></defs><rect class="b" width="1200" height="760"/><text class="t" x="65" y="60">Replication and partitioning solve different constraints</text><text class="s" x="65" y="90">Conceptual contrast; production systems commonly compose both forms.</text><rect class="p" x="65" y="135" width="510" height="500" rx="6"/><text class="h" x="95" y="180">DATA PARALLEL</text><text class="s" x="95" y="210">same model · different data</text><rect class="d" x="105" y="260" width="130" height="65" rx="5"/><text class="h" x="135" y="300">shard A</text><path class="a" d="M235 292L290 292"/><rect class="m" x="300" y="245" width="210" height="95" rx="5"/><text class="h" x="345" y="285">full model θ</text><text class="s" x="350" y="315">replica on worker 0</text><rect class="d" x="105" y="430" width="130" height="65" rx="5"/><text class="h" x="135" y="470">shard B</text><path class="a" d="M235 462L290 462"/><rect class="m" x="300" y="415" width="210" height="95" rx="5"/><text class="h" x="345" y="455">full model θ</text><text class="s" x="350" y="485">replica on worker 1</text><path class="a" d="M405 340L405 405"/><text class="s" x="420" y="380">gradient sync</text>
<rect class="p" x="625" y="135" width="510" height="500" rx="6"/><text class="h" x="655" y="180">MODEL PARALLEL</text><text class="s" x="655" y="210">one model · partitioned computation/state</text><rect class="m" x="665" y="320" width="125" height="105" rx="5"/><text class="h" x="695" y="360">stage 0</text><text class="s" x="686" y="390">device group A</text><path class="a" d="M790 372L850 372"/><text class="s" x="795" y="345">activation</text><rect class="g" x="860" y="320" width="125" height="105" rx="5"/><text class="h" x="890" y="360">stage 1</text><text class="s" x="881" y="390">device group B</text><path class="a" d="M985 372L1045 372"/><text class="s" x="989" y="345">activation</text><rect class="m" x="1055" y="335" width="55" height="75" rx="5"/><text class="h" x="1075" y="380">O</text><text class="s" x="655" y="500">Boundary traffic includes activations, activation gradients, or partial tensor results.</text><text class="s" x="65" y="690">Data parallelism mainly synchronizes gradients; model parallelism adds communication inside the model execution graph.</text></svg>
