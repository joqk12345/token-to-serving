<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc"><title id="title">Attention heads can be partitioned across devices</title><desc id="desc">Input projections feed four attention heads. Device zero computes heads zero and one, device one computes heads two and three. Their head outputs are concatenated or laid out for an output projection, which may require a collective or layout transition.</desc><defs><style>.b{fill:#f7f8fa}.p{fill:#fff;stroke:#1f2933;stroke-width:2}.x{fill:#e8eef9;stroke:#355c9a;stroke-width:2}.y{fill:#dcefe5;stroke:#287052;stroke-width:2}.z{fill:#fff0d6;stroke:#9a6518;stroke-width:2}.t{font:700 30px Arial;fill:#17212b}.h{font:700 18px Arial;fill:#17212b}.s{font:400 15px Arial;fill:#44515d}.a{stroke:#53616d;stroke-width:3;fill:none;marker-end:url(#m)}</style><marker id="m" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0L10 5L0 10z" fill="#53616d"/></marker></defs><rect class="b" width="1200" height="760"/><text class="t" x="65" y="60">Head-local attention exposes a partition boundary</text><text class="s" x="65" y="90">Head computation is independent, but the complete attention block may still require output communication.</text><rect class="p" x="65" y="135" width="1070" height="500" rx="6"/><rect class="x" x="95" y="310" width="140" height="100" rx="5"/><text class="h" x="130" y="350">Q / K / V</text><text class="s" x="118" y="380">input projections</text><path class="a" d="M235 350L310 275M235 370L310 465"/><rect class="y" x="320" y="205" width="290" height="160" rx="6"/><text class="h" x="420" y="245">DEVICE 0</text><rect class="x" x="350" y="275" width="105" height="60" rx="5"/><text class="h" x="375" y="312">head 0</text><rect class="x" x="475" y="275" width="105" height="60" rx="5"/><text class="h" x="500" y="312">head 1</text><rect class="y" x="320" y="405" width="290" height="160" rx="6"/><text class="h" x="420" y="445">DEVICE 1</text><rect class="x" x="350" y="475" width="105" height="60" rx="5"/><text class="h" x="375" y="512">head 2</text><rect class="x" x="475" y="475" width="105" height="60" rx="5"/><text class="h" x="500" y="512">head 3</text><path class="a" d="M610 285L710 335M610 485L710 400"/><rect class="z" x="720" y="305" width="190" height="125" rx="6"/><text class="h" x="755" y="345">HEAD OUTPUTS</text><text class="s" x="750" y="375">concatenate / layout</text><text class="s" x="755" y="402">transition as needed</text><path class="a" d="M910 368L970 368"/><rect class="x" x="980" y="315" width="125" height="105" rx="5"/><text class="h" x="1012" y="355">OUTPUT</text><text class="h" x="995" y="385">PROJECTION</text><text class="s" x="65" y="690">Partitioning heads does not by itself make the entire attention block communication-free.</text></svg>
