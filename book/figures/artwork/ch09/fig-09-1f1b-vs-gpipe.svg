<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc"><title id="title">All-forward-then-backward compared with 1F1B</title><desc id="desc">Two conceptual timelines compare a GPipe-style schedule that completes several forward micro-batches before backward with a one-forward-one-backward schedule that alternates work after warmup, shortening some activation lifetimes.</desc><defs><style>.b{fill:#f7f8fa}.p{fill:#fff;stroke:#1f2933;stroke-width:2}.f{fill:#e8eef9;stroke:#355c9a;stroke-width:2}.bw{fill:#dcefe5;stroke:#287052;stroke-width:2}.act{stroke:#9a6518;stroke-width:3}.t{font:700 30px Arial;fill:#17212b}.h{font:700 18px Arial;fill:#17212b}.s{font:400 15px Arial;fill:#44515d}.axis{stroke:#53616d;stroke-width:2;fill:none;marker-end:url(#m)}</style><marker id="m" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0L10 5L0 10z" fill="#53616d"/></marker></defs><rect class="b" width="1200" height="760"/><text class="t" x="65" y="60">1F1B starts backward work earlier</text><text class="s" x="65" y="90">Conceptual single-stage view after warmup; memory effects depend on stage count, micro-batches, and schedule details.</text><rect class="p" x="65" y="135" width="1070" height="500" rx="6"/><text class="h" x="95" y="205">ALL FORWARD, THEN BACKWARD</text><g><rect class="f" x="330" y="175" width="110" height="60" rx="4"/><text class="h" x="365" y="212">F1</text><rect class="f" x="440" y="175" width="110" height="60" rx="4"/><text class="h" x="475" y="212">F2</text><rect class="f" x="550" y="175" width="110" height="60" rx="4"/><text class="h" x="585" y="212">F3</text><rect class="f" x="660" y="175" width="110" height="60" rx="4"/><text class="h" x="695" y="212">F4</text><rect class="bw" x="770" y="175" width="110" height="60" rx="4"/><text class="h" x="805" y="212">B4</text><rect class="bw" x="880" y="175" width="110" height="60" rx="4"/><text class="h" x="915" y="212">B3</text><rect class="bw" x="990" y="175" width="110" height="60" rx="4"/><text class="h" x="1025" y="212">B2</text></g><line class="act" x1="385" y1="260" x2="1045" y2="260"/><text class="s" x="555" y="285">earlier forward activations remain live longer</text>
<text class="h" x="95" y="390">ONE-FORWARD-ONE-BACKWARD</text><g><rect class="f" x="330" y="360" width="110" height="60" rx="4"/><text class="h" x="365" y="397">F1</text><rect class="f" x="440" y="360" width="110" height="60" rx="4"/><text class="h" x="475" y="397">F2</text><rect class="bw" x="550" y="360" width="110" height="60" rx="4"/><text class="h" x="585" y="397">B1</text><rect class="f" x="660" y="360" width="110" height="60" rx="4"/><text class="h" x="695" y="397">F3</text><rect class="bw" x="770" y="360" width="110" height="60" rx="4"/><text class="h" x="805" y="397">B2</text><rect class="f" x="880" y="360" width="110" height="60" rx="4"/><text class="h" x="915" y="397">F4</text><rect class="bw" x="990" y="360" width="110" height="60" rx="4"/><text class="h" x="1025" y="397">B3</text></g><line class="act" x1="385" y1="445" x2="605" y2="445"/><text class="s" x="555" y="475">some backward work releases activations earlier</text><path class="axis" d="M300 535L1100 535"/><text class="s" x="1065" y="565">time</text><text class="s" x="65" y="690">1F1B changes utilization and activation lifetime; it does not remove stage imbalance or boundary communication.</text></svg>
