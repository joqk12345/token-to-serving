<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc"><title id="title">Data pipeline and tensor parallelism compose</title><desc id="desc">An illustrative nested group diagram shows two data-parallel replicas. Each replica contains two pipeline stages, and each stage contains a two-device tensor-parallel group. Labels name the distinct communication and scheduling pressure on each axis.</desc><defs><style>.b{fill:#f7f8fa}.p{fill:#fff;stroke:#1f2933;stroke-width:2}.dp{fill:#e8eef9;stroke:#355c9a;stroke-width:2}.pp{fill:#dcefe5;stroke:#287052;stroke-width:2}.tp{fill:#fff0d6;stroke:#9a6518;stroke-width:2}.t{font:700 30px Arial;fill:#17212b}.h{font:700 18px Arial;fill:#17212b}.s{font:400 15px Arial;fill:#44515d}.a{stroke:#53616d;stroke-width:3;fill:none;marker-end:url(#m)}</style><marker id="m" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0L10 5L0 10z" fill="#53616d"/></marker></defs><rect class="b" width="1200" height="760"/><text class="t" x="65" y="60">Three parallel axes form one distributed program</text><text class="s" x="65" y="90">Illustrative grouping only; the diagram does not prescribe a concrete cluster size.</text><rect class="p" x="65" y="135" width="1070" height="500" rx="6"/><rect class="dp" x="95" y="190" width="440" height="350" rx="8"/><text class="h" x="115" y="225">DATA-PARALLEL REPLICA A</text><rect class="pp" x="120" y="250" width="185" height="240" rx="6"/><text class="h" x="150" y="285">PIPELINE STAGE 0</text><rect class="tp" x="145" y="320" width="135" height="55" rx="5"/><text class="s" x="165" y="353">TP device 0</text><rect class="tp" x="145" y="395" width="135" height="55" rx="5"/><text class="s" x="165" y="428">TP device 1</text><rect class="pp" x="325" y="250" width="185" height="240" rx="6"/><text class="h" x="355" y="285">PIPELINE STAGE 1</text><rect class="tp" x="350" y="320" width="135" height="55" rx="5"/><text class="s" x="370" y="353">TP device 0</text><rect class="tp" x="350" y="395" width="135" height="55" rx="5"/><text class="s" x="370" y="428">TP device 1</text><path class="a" d="M305 370L325 370"/>
<rect class="dp" x="665" y="190" width="440" height="350" rx="8"/><text class="h" x="685" y="225">DATA-PARALLEL REPLICA B</text><rect class="pp" x="690" y="250" width="185" height="240" rx="6"/><text class="h" x="720" y="285">PIPELINE STAGE 0</text><rect class="tp" x="715" y="320" width="135" height="55" rx="5"/><text class="s" x="735" y="353">TP device 0</text><rect class="tp" x="715" y="395" width="135" height="55" rx="5"/><text class="s" x="735" y="428">TP device 1</text><rect class="pp" x="895" y="250" width="185" height="240" rx="6"/><text class="h" x="925" y="285">PIPELINE STAGE 1</text><rect class="tp" x="920" y="320" width="135" height="55" rx="5"/><text class="s" x="940" y="353">TP device 0</text><rect class="tp" x="920" y="395" width="135" height="55" rx="5"/><text class="s" x="940" y="428">TP device 1</text><path class="a" d="M875 370L895 370M535 365L665 365"/><text class="s" x="540" y="345">gradient sync</text><text class="s" x="165" y="575">tensor: fast collectives · pipeline: balanced stages + micro-batches · data: gradient synchronization</text><text class="s" x="65" y="690">Changing any degree changes memory ownership, communication groups, and scheduling pressure on the other axes.</text></svg>
