<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc"><title id="title">Memory-bound and compute-bound kernel intuition</title><desc id="desc">A low-arithmetic-intensity lane shows repeated bytes moved and idle compute, while a high-reuse lane shows fewer loads feeding more arithmetic. This is conceptual, not a roofline chart.</desc><defs><style>.bg{fill:#f7f8fa}.panel{fill:#fff;stroke:#1f2933;stroke-width:2}.mem{fill:#fff0d6;stroke:#9a6518;stroke-width:2}.compute{fill:#e8eef9;stroke:#355c9a;stroke-width:2}.good{fill:#dcefe5;stroke:#287052;stroke-width:2}.idle{fill:#eceff2;stroke:#8b98a5;stroke-width:2}.title{font:700 30px Arial,sans-serif;fill:#17212b}.section{font:700 20px Arial,sans-serif;fill:#17212b}.label{font:600 18px Arial,sans-serif;fill:#17212b}.small{font:400 15px Arial,sans-serif;fill:#44515d}.arrow{stroke:#53616d;stroke-width:3;fill:none;marker-end:url(#a)}</style><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10z" fill="#53616d"/></marker></defs><rect class="bg" width="1200" height="760"/><text class="title" x="65" y="60">Arithmetic units can still wait for data</text><text class="small" x="65" y="90">Conceptual comparison, not a formal roofline model.</text>
<rect class="panel" x="65" y="130" width="510" height="500" rx="6"/><rect class="mem" x="65" y="130" width="510" height="70" rx="6"/><text class="section" x="220" y="173">MEMORY-BOUND</text><text class="label" x="100" y="245">Low arithmetic per byte</text><g><rect class="mem" x="100" y="275" width="95" height="55" rx="4"/><text class="label" x="124" y="309">LOAD</text><path class="arrow" d="M195 302L245 302"/><rect class="compute" x="255" y="275" width="95" height="55" rx="4"/><text class="label" x="282" y="309">ADD</text><rect class="idle" x="370" y="275" width="160" height="55" rx="4"/><text class="small" x="400" y="308">compute waits</text><rect class="mem" x="100" y="360" width="95" height="55" rx="4"/><text class="label" x="124" y="394">LOAD</text><path class="arrow" d="M195 387L245 387"/><rect class="compute" x="255" y="360" width="95" height="55" rx="4"/><text class="label" x="282" y="394">ADD</text><rect class="idle" x="370" y="360" width="160" height="55" rx="4"/><text class="small" x="400" y="393">compute waits</text></g><text class="small" x="100" y="475">Many bytes cross the memory path</text><text class="small" x="100" y="505">for little useful arithmetic.</text>
<rect class="panel" x="625" y="130" width="510" height="500" rx="6"/><rect class="good" x="625" y="130" width="510" height="70" rx="6"/><text class="section" x="780" y="173">COMPUTE-BOUND</text><text class="label" x="660" y="245">Higher reuse / arithmetic intensity</text><rect class="mem" x="660" y="285" width="105" height="70" rx="4"/><text class="label" x="684" y="326">LOAD</text><path class="arrow" d="M765 320L820 320"/><rect class="compute" x="830" y="260" width="260" height="190" rx="5"/><text class="section" x="900" y="300">REUSED DATA</text><g class="label"><text x="865" y="350">MUL</text><text x="950" y="350">ADD</text><text x="1030" y="350">MUL</text><text x="865" y="405">ADD</text><text x="950" y="405">MUL</text><text x="1030" y="405">ADD</text></g><text class="small" x="660" y="500">Loaded values feed more useful arithmetic</text><text class="small" x="660" y="530">before replacement.</text><rect class="good" x="300" y="660" width="600" height="50" rx="6"/><text class="label" x="370" y="692">Arithmetic intensity = useful arithmetic / bytes moved</text></svg>
