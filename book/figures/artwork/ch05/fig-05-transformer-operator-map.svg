<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc"><title id="title">Transformer block operator categories</title><desc id="desc">A Transformer block dataflow is annotated with GEMM, reduction, elementwise, and memory-movement categories across attention, normalization, residual, and feed-forward operations.</desc><defs><style>.bg{fill:#f7f8fa}.panel{fill:#fff;stroke:#1f2933;stroke-width:2}.gemm{fill:#e8eef9;stroke:#355c9a;stroke-width:2}.reduce{fill:#fff0d6;stroke:#9a6518;stroke-width:2}.elem{fill:#dcefe5;stroke:#287052;stroke-width:2}.move{fill:#ece8f3;stroke:#65517e;stroke-width:2}.title{font:700 30px Arial,sans-serif;fill:#17212b}.section{font:700 20px Arial,sans-serif;fill:#17212b}.label{font:600 17px Arial,sans-serif;fill:#17212b}.small{font:400 14px Arial,sans-serif;fill:#44515d}.arrow{stroke:#53616d;stroke-width:3;fill:none;marker-end:url(#a)}</style><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0,0L10,5L0,10z" fill="#53616d"/></marker></defs><rect class="bg" width="1200" height="760"/><text class="title" x="65" y="60">A Transformer block is a mixed kernel workload</text><text class="small" x="65" y="90">The map emphasizes operator classes, not full model architecture.</text>
<rect class="panel" x="65" y="135" width="1070" height="455" rx="6"/><text class="section" x="95" y="175">BLOCK DATAFLOW</text><rect class="reduce" x="95" y="230" width="125" height="80" rx="5"/><text class="label" x="113" y="263">LayerNorm</text><text class="small" x="127" y="291">reduction</text><path class="arrow" d="M220 270L260 270"/><rect class="gemm" x="270" y="220" width="145" height="100" rx="5"/><text class="label" x="296" y="255">QKV projection</text><text class="small" x="321" y="285">GEMM</text><path class="arrow" d="M415 270L455 270"/><rect class="move" x="465" y="220" width="135" height="100" rx="5"/><text class="label" x="486" y="255">reshape /</text><text class="label" x="490" y="280">transpose</text><path class="arrow" d="M600 270L640 270"/><rect class="reduce" x="650" y="220" width="130" height="100" rx="5"/><text class="label" x="681" y="255">softmax</text><text class="small" x="683" y="285">reduction</text><path class="arrow" d="M780 270L820 270"/><rect class="gemm" x="830" y="220" width="140" height="100" rx="5"/><text class="label" x="851" y="255">attention out</text><text class="small" x="878" y="285">GEMM</text><path class="arrow" d="M970 270L1010 270"/><rect class="elem" x="1020" y="220" width="85" height="100" rx="5"/><text class="label" x="1033" y="255">dropout</text><text class="small" x="1035" y="285">element</text>
<path class="arrow" d="M1062 320L1062 370L158 370L158 405"/><rect class="elem" x="95" y="415" width="125" height="80" rx="5"/><text class="label" x="118" y="448">residual add</text><text class="small" x="126" y="477">elementwise</text><path class="arrow" d="M220 455L285 455"/><rect class="reduce" x="295" y="415" width="125" height="80" rx="5"/><text class="label" x="317" y="448">LayerNorm</text><text class="small" x="327" y="477">reduction</text><path class="arrow" d="M420 455L485 455"/><rect class="gemm" x="495" y="405" width="180" height="100" rx="5"/><text class="label" x="527" y="440">FFN projections</text><text class="small" x="561" y="470">GEMM</text><text class="small" x="540" y="491">+ activation</text><path class="arrow" d="M675 455L740 455"/><rect class="elem" x="750" y="415" width="160" height="80" rx="5"/><text class="label" x="778" y="448">dropout + add</text><text class="small" x="778" y="477">fusion candidate</text><rect class="move" x="950" y="405" width="155" height="100" rx="5"/><text class="label" x="976" y="440">buffer reuse</text><text class="small" x="974" y="470">memory movement</text>
<g><rect class="gemm" x="130" y="635" width="160" height="45" rx="4"/><text class="label" x="183" y="664">GEMM</text><rect class="reduce" x="330" y="635" width="160" height="45" rx="4"/><text class="label" x="368" y="664">REDUCTION</text><rect class="elem" x="530" y="635" width="160" height="45" rx="4"/><text class="label" x="560" y="664">ELEMENTWISE</text><rect class="move" x="730" y="635" width="220" height="45" rx="4"/><text class="label" x="770" y="664">MEMORY / LAYOUT</text></g><text class="small" x="65" y="720">Fast GEMMs do not remove the cost of reductions, launches, layouts, and intermediate tensors.</text></svg>
