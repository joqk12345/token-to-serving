<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc"><title id="title">Naive versus tiled matrix multiplication data movement</title><desc id="desc">Naive output threads repeatedly fetch matrix rows and columns from global memory. A tiled block cooperatively loads A and B tiles into shared memory, synchronizes, and reuses them for partial sums.</desc><defs><style>.bg{fill:#f7f8fa}.panel{fill:#fff;stroke:#1f2933;stroke-width:2}.global{fill:#fff0d6;stroke:#9a6518;stroke-width:2}.shared{fill:#dcefe5;stroke:#287052;stroke-width:2}.compute{fill:#e8eef9;stroke:#355c9a;stroke-width:2}.title{font:700 30px Arial,sans-serif;fill:#17212b}.section{font:700 20px Arial,sans-serif;fill:#17212b}.label{font:600 18px Arial,sans-serif;fill:#17212b}.small{font:400 15px Arial,sans-serif;fill:#44515d}.arrow{stroke:#53616d;stroke-width:3;fill:none;marker-end:url(#a)}.repeat{stroke:#9a6518;stroke-width:3;fill:none;marker-end:url(#o)}</style><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0,0L10,5L0,10z" fill="#53616d"/></marker><marker id="o" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0,0L10,5L0,10z" fill="#9a6518"/></marker></defs><rect class="bg" width="1200" height="760"/><text class="title" x="65" y="60">Tiling changes where operands live while reused</text><text class="small" x="65" y="90">Both paths compute the same matrix product; the data route differs.</text>
<rect class="panel" x="65" y="130" width="510" height="535" rx="6"/><text class="section" x="215" y="172">NAIVE: RELOAD</text><rect class="global" x="105" y="220" width="160" height="105" rx="5"/><text class="label" x="137" y="260">GLOBAL A</text><text class="small" x="138" y="290">rows</text><rect class="global" x="375" y="220" width="160" height="105" rx="5"/><text class="label" x="407" y="260">GLOBAL B</text><text class="small" x="407" y="290">columns</text><rect class="compute" x="200" y="410" width="240" height="110" rx="5"/><text class="label" x="230" y="451">one output thread</text><text class="small" x="236" y="485">accumulates C[i,j]</text><path class="repeat" d="M185 325C185 370 245 370 270 400"/><path class="repeat" d="M455 325C455 370 395 370 370 400"/><path class="repeat" d="M270 410C245 360 185 360 185 335"/><text class="small" x="125" y="565">Other output threads request overlapping</text><text class="small" x="125" y="590">rows and columns again.</text>
<rect class="panel" x="625" y="130" width="510" height="535" rx="6"/><text class="section" x="770" y="172">TILED: LOAD ONCE, REUSE</text><rect class="global" x="660" y="210" width="170" height="75" rx="5"/><text class="label" x="704" y="255">A TILE</text><rect class="global" x="930" y="210" width="170" height="75" rx="5"/><text class="label" x="974" y="255">B TILE</text><path class="arrow" d="M745 285L795 340"/><path class="arrow" d="M1015 285L965 340"/><rect class="shared" x="750" y="350" width="260" height="105" rx="5"/><text class="label" x="786" y="390">SHARED MEMORY TILES</text><text class="small" x="808" y="425">__syncthreads()</text><path class="arrow" d="M880 455L880 500"/><rect class="compute" x="750" y="510" width="260" height="95" rx="5"/><text class="label" x="803" y="550">THREAD BLOCK</text><text class="small" x="792" y="580">reuse tiles for partial sums</text><text class="small" x="65" y="715">Tiling trades shared-memory capacity and synchronization for fewer repeated global-memory reads.</text></svg>
