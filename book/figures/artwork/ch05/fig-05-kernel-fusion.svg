<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc"><title id="title">Separate versus fused elementwise kernels</title><desc id="desc">The separate path launches A plus B, writes intermediate C to global memory, reads C in a second kernel, adds D, and writes E. The fused path loads A, B, and D and writes E once.</desc><defs><style>.bg{fill:#f7f8fa}.panel{fill:#fff;stroke:#1f2933;stroke-width:2}.kernel{fill:#e8eef9;stroke:#355c9a;stroke-width:2}.memory{fill:#fff0d6;stroke:#9a6518;stroke-width:2}.fused{fill:#dcefe5;stroke:#287052;stroke-width:2}.title{font:700 30px Arial,sans-serif;fill:#17212b}.section{font:700 20px Arial,sans-serif;fill:#17212b}.label{font:600 18px Arial,sans-serif;fill:#17212b}.small{font:400 15px Arial,sans-serif;fill:#44515d}.arrow{stroke:#53616d;stroke-width:3;fill:none;marker-end:url(#a)}</style><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0,0L10,5L0,10z" fill="#53616d"/></marker></defs><rect class="bg" width="1200" height="760"/><text class="title" x="65" y="60">Fusion removes an intermediate memory boundary</text><text class="small" x="65" y="90">Example: E = A + B + D.</text>
<rect class="panel" x="65" y="130" width="1070" height="250" rx="6"/><text class="section" x="95" y="170">BEFORE: TWO LAUNCHES</text><rect class="memory" x="95" y="220" width="120" height="75" rx="5"/><text class="label" x="130" y="265">A, B</text><path class="arrow" d="M215 257L275 257"/><rect class="kernel" x="285" y="205" width="180" height="105" rx="5"/><text class="label" x="318" y="245">KERNEL 1</text><text class="small" x="324" y="277">C = A + B</text><path class="arrow" d="M465 257L525 257"/><rect class="memory" x="535" y="205" width="170" height="105" rx="5"/><text class="label" x="564" y="245">GLOBAL MEMORY</text><text class="small" x="573" y="277">write C, then read C</text><path class="arrow" d="M705 257L765 257"/><rect class="kernel" x="775" y="205" width="180" height="105" rx="5"/><text class="label" x="808" y="245">KERNEL 2</text><text class="small" x="814" y="277">E = C + D</text><path class="arrow" d="M955 257L1010 257"/><rect class="memory" x="1020" y="220" width="85" height="75" rx="5"/><text class="label" x="1051" y="265">E</text>
<rect class="panel" x="65" y="420" width="1070" height="220" rx="6"/><text class="section" x="95" y="460">AFTER: ONE FUSED LAUNCH</text><rect class="memory" x="160" y="505" width="150" height="75" rx="5"/><text class="label" x="199" y="550">A, B, D</text><path class="arrow" d="M310 542L440 542"/><rect class="fused" x="450" y="490" width="300" height="105" rx="5"/><text class="label" x="530" y="530">FUSED KERNEL</text><text class="small" x="531" y="563">E = A + B + D</text><path class="arrow" d="M750 542L880 542"/><rect class="memory" x="890" y="505" width="150" height="75" rx="5"/><text class="label" x="953" y="550">E</text><text class="small" x="65" y="695">Fusion can reduce launch overhead and avoid writing and rereading C; applicability depends on operator and implementation constraints.</text></svg>
