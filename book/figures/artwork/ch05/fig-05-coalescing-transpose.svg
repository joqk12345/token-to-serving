<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc"><title id="title">Coalesced and strided matrix transpose access</title><desc id="desc">Adjacent warp lanes read adjacent row-major addresses, stage a tile in shared memory, transpose it, then write adjacent output addresses. A direct column access is shown as strided.</desc><defs><style>.bg{fill:#f7f8fa}.panel{fill:#fff;stroke:#1f2933;stroke-width:2}.good{fill:#dcefe5;stroke:#287052;stroke-width:2}.bad{fill:#f5dede;stroke:#9b3d3d;stroke-width:2}.shared{fill:#e8eef9;stroke:#355c9a;stroke-width:2}.note{fill:#fff0d6;stroke:#9a6518;stroke-width:2}.title{font:700 30px Arial,sans-serif;fill:#17212b}.section{font:700 20px Arial,sans-serif;fill:#17212b}.label{font:600 18px Arial,sans-serif;fill:#17212b}.small{font:400 15px Arial,sans-serif;fill:#44515d}.arrow{stroke:#53616d;stroke-width:3;fill:none;marker-end:url(#a)}</style><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0,0L10,5L0,10z" fill="#53616d"/></marker></defs><rect class="bg" width="1200" height="760"/><text class="title" x="65" y="60">A correct transpose can still use memory poorly</text><text class="small" x="65" y="90">Adjacent warp lanes should access adjacent addresses when possible.</text>
<rect class="panel" x="65" y="135" width="430" height="485" rx="6"/><text class="section" x="95" y="175">ROW-MAJOR INPUT</text><text class="small" x="95" y="205">warp lanes 0 1 2 3</text><g><rect class="good" x="105" y="240" width="70" height="60"/><rect class="good" x="175" y="240" width="70" height="60"/><rect class="good" x="245" y="240" width="70" height="60"/><rect class="good" x="315" y="240" width="70" height="60"/><g class="label"><text x="132" y="277">0</text><text x="202" y="277">1</text><text x="272" y="277">2</text><text x="342" y="277">3</text></g></g><text class="label" x="105" y="335">COALESCED READ</text><text class="small" x="105" y="365">adjacent lanes -> adjacent addresses</text><g><rect class="bad" x="105" y="415" width="70" height="45"/><rect class="bad" x="105" y="460" width="70" height="45"/><rect class="bad" x="105" y="505" width="70" height="45"/><rect class="bad" x="105" y="550" width="70" height="45"/></g><text class="label" x="210" y="470">DIRECT COLUMN PATH</text><text class="small" x="210" y="500">adjacent lanes reach</text><text class="small" x="210" y="525">strided addresses</text>
<path class="arrow" d="M495 375L555 375"/><rect class="shared" x="565" y="220" width="250" height="310" rx="6"/><text class="section" x="602" y="260">SHARED-MEMORY TILE</text><g stroke="#355c9a" fill="none"><path d="M610 300H770V460H610Z M650 300V460M690 300V460M730 300V460M610 340H770M610 380H770M610 420H770"/></g><path class="arrow" d="M635 445L755 325"/><text class="label" x="615" y="500">transpose inside tile</text>
<path class="arrow" d="M815 375L875 375"/><rect class="panel" x="885" y="135" width="250" height="485" rx="6"/><text class="section" x="915" y="175">ROW-MAJOR OUTPUT</text><g><rect class="good" x="915" y="240" width="45" height="60"/><rect class="good" x="960" y="240" width="45" height="60"/><rect class="good" x="1005" y="240" width="45" height="60"/><rect class="good" x="1050" y="240" width="45" height="60"/></g><text class="label" x="915" y="335">COALESCED WRITE</text><text class="small" x="915" y="365">adjacent output addresses</text><rect class="note" x="915" y="445" width="190" height="100" rx="5"/><text class="label" x="943" y="480">BANK CONFLICTS</text><text class="small" x="937" y="510">separate shared-memory</text><text class="small" x="970" y="532">layout concern</text><text class="small" x="65" y="690">The tile changes the access route, not the mathematical transpose.</text></svg>
